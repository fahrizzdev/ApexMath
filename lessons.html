<!DOCTYPE html>
<html lang="en">
<script>
// Apply saved theme immediately to prevent flash ‚ÄĒ reads URL param or localStorage
(function(){
  const params = new URLSearchParams(window.location.search);
  const t = params.get('theme') || localStorage.getItem('apexmath_theme') || '';
  if(t) localStorage.setItem('apexmath_theme', t);
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ApexMath Lessons</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ed;--bg2:#eae6df;--surface:#fff;
  --border:rgba(0,0,0,0.08);--text:#1a1916;--text2:#6b6860;--text3:#a8a49d;
  --accent:#2d5a27;--accent-light:rgba(45,90,39,0.08);--accent-mid:rgba(45,90,39,0.18);
  --red:#c0392b;--red-light:rgba(192,57,43,0.08);
  --gold:#92700a;--gold-bg:rgba(146,112,10,0.08);
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
[data-theme="slate"]{--bg:#f0f2f5;--bg2:#e8ebef;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#1a1c20;--text2:#636870;--text3:#9fa4ad;--accent:#1a56db;--accent-light:rgba(26,86,219,0.07);--accent-mid:rgba(26,86,219,0.16)}
[data-theme="sand"]{--bg:#faf6f0;--bg2:#f2ece2;--surface:#fff;--border:rgba(0,0,0,0.07);--text:#2a2218;--text2:#7a6e62;--text3:#b0a99f;--accent:#b45309;--accent-light:rgba(180,83,9,0.07);--accent-mid:rgba(180,83,9,0.16)}
[data-theme="ink"]{--bg:#1c1c1e;--bg2:#252528;--surface:#2c2c2f;--border:rgba(255,255,255,0.08);--text:#f0ede8;--text2:#9b978f;--text3:#5a5750;--accent:#a8c5a0;--accent-light:rgba(168,197,160,0.08);--accent-mid:rgba(168,197,160,0.18)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}

/* ‚ĒÄ‚ĒÄ SIDEBAR ‚ĒÄ‚ĒÄ */
.sidebar{
  width:280px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  height:100vh;position:sticky;top:0;
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-head{
  padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.sidebar-logo{font-family:'DM Serif Display',serif;font-size:1rem;letter-spacing:-.02em;color:var(--text)}
.sidebar-logo em{color:var(--accent);font-style:normal}
.sidebar-back{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);background:none;border:none;cursor:pointer;padding:.25rem;transition:color .2s}
.sidebar-back:hover{color:var(--accent)}
.sidebar-search{padding:.7rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-search input{width:100%;padding:.45rem .7rem;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;border-radius:4px}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-scroll{overflow-y:auto;flex:1;padding-bottom:2rem}
.level-group{border-bottom:1px solid var(--border)}
.level-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.65rem 1rem;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);background:none;border:none;width:100%;text-align:left;
  transition:background .15s;
}
.level-header:hover{background:var(--bg)}
.level-header.open{color:var(--accent);background:var(--accent-light)}
.level-arrow{font-size:.5rem;transition:transform .2s}
.level-header.open .level-arrow{transform:rotate(90deg)}
.lesson-list{display:none;flex-direction:column}
.level-header.open + .lesson-list{display:flex}
.lesson-btn{
  display:flex;align-items:center;gap:.6rem;
  padding:.55rem 1rem .55rem 1.5rem;
  background:none;border:none;cursor:pointer;text-align:left;
  transition:background .15s;border-left:2px solid transparent;
  font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text2);
  line-height:1.35;
}
.lesson-btn:hover{background:var(--bg);color:var(--text)}
.lesson-btn.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.lesson-btn.done .lb-dot{background:var(--accent)}
.lb-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;border:1.5px solid currentColor;opacity:.4}
.lesson-btn.active .lb-dot{background:var(--accent);opacity:1;border-color:var(--accent)}
.lesson-btn.done .lb-dot{background:var(--accent);opacity:.6;border-color:var(--accent)}

/* ‚ĒÄ‚ĒÄ MAIN CONTENT ‚ĒÄ‚ĒÄ */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.main-inner{max-width:740px;margin:0 auto;padding:2.5rem 2.5rem 5rem;width:100%}

/* Lesson nav */
.lesson-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:1rem}
.lesson-nav-btn{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.38rem .85rem;background:none;border:1.5px solid var(--border);color:var(--text2);cursor:pointer;border-radius:4px;transition:all .2s}
.lesson-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.lesson-nav-btn:disabled{opacity:.3;cursor:default}
.lesson-crumb{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}

/* Lesson header */
.lesson-eyebrow{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.65rem}
.lesson-title{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:-.03em;color:var(--text);line-height:1.1;margin-bottom:.5rem}
.lesson-tagline{font-size:.95rem;color:var(--text2);line-height:1.75;margin-bottom:2rem;max-width:560px}

/* Progress bar */
.lesson-progress{height:3px;background:var(--bg2);margin-bottom:2rem;border-radius:99px;overflow:hidden}
.lesson-progress-fill{height:100%;background:var(--accent);transition:width .5s ease;border-radius:99px}

/* Content blocks */
.block{margin-bottom:2rem}
.block-label{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.block-label-icon{font-size:.85rem}

/* Concept box */
.concept-box{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:1.5rem;line-height:1.8;font-size:.95rem;color:var(--text2)}
.concept-box strong{color:var(--text);font-weight:500}
.concept-box .big-idea{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--text);line-height:1.4;margin-bottom:.75rem;letter-spacing:-.01em}
.concept-box .analogy{background:var(--gold-bg);border-left:3px solid var(--gold,#92700a);padding:.75rem 1rem;margin-top:.85rem;font-size:.88rem;border-radius:0 4px 4px 0}

/* Key formula box */
.formula-box{background:linear-gradient(135deg,var(--accent-light),rgba(45,90,39,.04));border:1.5px solid var(--accent-mid);border-radius:8px;padding:1.25rem 1.5rem;text-align:center}
.formula-display{font-family:'DM Mono',monospace;font-size:1.4rem;letter-spacing:.04em;color:var(--accent);margin-bottom:.4rem}
.formula-caption{font-size:.8rem;color:var(--text2);line-height:1.6}

/* Worked example */
.example-card{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:.85rem}
.example-header{background:var(--bg2);padding:.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.example-label{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.example-q{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--text);letter-spacing:-.01em}
.example-body{padding:1.25rem}
.step-list{display:flex;flex-direction:column;gap:.6rem}
.step{display:flex;gap:.85rem;align-items:flex-start}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:.55rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-content{flex:1;font-size:.9rem;color:var(--text2);line-height:1.7}
.step-content strong{color:var(--text);font-weight:500}
.step-content .math{font-family:'DM Mono',monospace;font-size:.88rem;background:var(--bg);border:1px solid var(--border);padding:.15rem .4rem;border-radius:3px;display:inline-block;color:var(--text)}
.step-content .math.answer{background:var(--accent-light);border-color:var(--accent-mid);color:var(--accent)}

/* Common mistakes */
.mistake-box{background:var(--red-light);border:1.5px solid rgba(192,57,43,.2);border-radius:8px;padding:1.1rem 1.25rem}
.mistake-item{display:flex;gap:.75rem;margin-bottom:.65rem;font-size:.88rem;line-height:1.65}
.mistake-item:last-child{margin-bottom:0}
.mistake-x{color:var(--red);font-size:.9rem;flex-shrink:0;margin-top:.1rem}
.mistake-text{color:var(--text2)}
.mistake-text strong{color:var(--red)}

/* Try it */
.tryit-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:1.5rem;transition:border-color .25s}
.tryit-card.answered-right{border-color:var(--accent);background:var(--accent-light)}
.tryit-card.answered-wrong{border-color:var(--red)}
.tryit-q{font-family:'DM Serif Display',serif;font-size:1.1rem;letter-spacing:-.01em;color:var(--text);margin-bottom:1.1rem;line-height:1.4}
.tryit-opts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.85rem}
.tryit-opt{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:var(--bg);border:1.5px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;text-align:left;font-size:.9rem;color:var(--text2)}
.tryit-opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.tryit-opt.correct{border-color:var(--accent)!important;background:var(--accent-light)!important;color:var(--accent)!important}
.tryit-opt.wrong{border-color:var(--red)!important;background:var(--red-light)!important;color:var(--red)!important}
.tryit-opt.disabled{cursor:default;pointer-events:none}
.tryit-letter{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.06em;color:var(--text3);flex-shrink:0;width:18px}
.tryit-hint-btn{background:none;border:none;font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);cursor:pointer;padding:0;margin-bottom:.75rem;display:flex;align-items:center;gap:.3rem;transition:color .2s}
.tryit-hint-btn:hover{color:var(--gold,#92700a)}
.tryit-hint{background:var(--gold-bg);border:1px solid rgba(146,112,10,.2);border-radius:5px;padding:.7rem .9rem;font-size:.86rem;color:var(--text2);line-height:1.7;margin-bottom:.75rem;display:none}
.tryit-hint.show{display:block;animation:fadeUp .25s ease}
.tryit-feedback{padding:.85rem 1rem;border-radius:6px;font-size:.88rem;line-height:1.7;display:none;animation:fadeUp .3s ease}
.tryit-feedback.right{background:var(--accent-light);color:var(--accent);display:block}
.tryit-feedback.wrong{background:var(--red-light);color:var(--red);display:block}
.tryit-feedback strong{font-weight:600}

/* Check section */
.check-section{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.check-header{background:var(--bg2);padding:.85rem 1.25rem;font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.check-body{padding:1.25rem;display:flex;flex-direction:column;gap:1.1rem}
.check-q{font-size:.92rem;color:var(--text);margin-bottom:.6rem;line-height:1.55}
.check-opts{display:flex;flex-direction:column;gap:.35rem}
.check-opt{display:flex;align-items:center;gap:.65rem;padding:.6rem .85rem;background:var(--bg);border:1.5px solid var(--border);border-radius:5px;cursor:pointer;transition:all .15s;font-size:.86rem;color:var(--text2)}
.check-opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-light)}
.check-opt.correct{border-color:var(--accent)!important;background:var(--accent-light)!important;color:var(--accent)!important}
.check-opt.wrong{border-color:var(--red)!important;background:var(--red-light)!important;color:var(--red)!important}
.check-opt.disabled{cursor:default;pointer-events:none}
.check-fb{font-size:.82rem;padding:.6rem .85rem;border-radius:4px;margin-top:.35rem;display:none;line-height:1.6}
.check-fb.show{display:block}
.check-fb.right{background:var(--accent-light);color:var(--accent)}
.check-fb.wrong{background:var(--red-light);color:var(--red)}
.check-score{display:none;text-align:center;padding:1.5rem;border-top:1px solid var(--border)}
.check-score.show{display:block}
.check-score-num{font-family:'DM Serif Display',serif;font-size:2.5rem;letter-spacing:-.03em;color:var(--text)}
.check-score-label{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:.25rem}
.check-score-msg{font-size:.88rem;color:var(--text2);margin-top:.6rem;line-height:1.6}

/* Done section */
.lesson-done{background:var(--accent-light);border:2px solid var(--accent-mid);border-radius:10px;padding:2rem;text-align:center;display:none}
.lesson-done.show{display:block;animation:fadeUp .4s ease}
.lesson-done-icon{font-size:2.5rem;margin-bottom:.75rem}
.lesson-done-title{font-family:'DM Serif Display',serif;font-size:1.5rem;letter-spacing:-.02em;color:var(--accent);margin-bottom:.35rem}
.lesson-done-sub{font-size:.88rem;color:var(--text2);line-height:1.65;margin-bottom:1.25rem}
.next-lesson-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;background:var(--accent);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px;transition:all .2s}
.next-lesson-btn:hover{opacity:.85;transform:translateY(-1px)}

/* Info tags */
.info-tag{display:inline-flex;align-items:center;gap:.3rem;font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .55rem;border:1px solid var(--border);border-radius:99px;color:var(--text3);margin-right:.3rem;margin-bottom:.5rem}
.info-tag.time{border-color:var(--accent-mid);color:var(--accent);background:var(--accent-light)}

/* Home screen */
.home-screen{display:flex;flex-direction:column;align-items:flex-start;padding:2.5rem 2.5rem 5rem;max-width:740px;margin:0 auto}
.home-eyebrow{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
.home-h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:-.035em;color:var(--text);line-height:1.08;margin-bottom:.75rem}
.home-sub{font-size:.96rem;color:var(--text2);line-height:1.75;max-width:500px;margin-bottom:2.5rem}
.level-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem;width:100%}
.level-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.level-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.level-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.level-card:hover::before{transform:scaleX(1)}
.lc-emoji{font-size:1.5rem;margin-bottom:.5rem}
.lc-name{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);letter-spacing:-.01em;margin-bottom:.25rem}
.lc-sub{font-size:.78rem;color:var(--text2);line-height:1.6}
.lc-count{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:.5rem}
.lc-prog{height:3px;background:var(--bg2);border-radius:99px;margin-top:.4rem;overflow:hidden}
.lc-prog-fill{height:100%;background:var(--accent);border-radius:99px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Mobile */
@media(max-width:700px){
  body{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar-scroll{max-height:280px}
  .main-inner{padding:1.5rem 1.25rem 4rem}
  .home-screen{padding:1.5rem 1.25rem 4rem}
  .level-cards{grid-template-columns:1fr}
}
</style>
</head>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-logo">Apex<em>Math</em> Lessons</div>
    <button class="sidebar-back" onclick="window.location.href='index.html'">‚Üź Back</button>
  </div>
  <div class="sidebar-search">
    <input type="text" id="search-input" placeholder="Search lessons‚Ä¶" oninput="filterLessons(this.value)"/>
  </div>
  <div class="sidebar-scroll" id="sidebar-nav"></div>
</aside>

<!-- MAIN -->
<main class="main" id="main-content">

</main>

L('0-01',{
  tagline:"Numbers have positions, and each position has a name. Understanding place value is what makes the entire number system make sense.",
  concept:`<div class="big-idea">Every digit in a number has a place, and that place tells you its value.</div>
In the number <strong>4,726</strong>, the digits don't all mean the same thing:
<br><br>‚ÄĘ The <strong>4</strong> is in the thousands place ‚Üí it means 4,000<br>‚ÄĘ The <strong>7</strong> is in the hundreds place ‚Üí it means 700<br>‚ÄĘ The <strong>2</strong> is in the tens place ‚Üí it means 20<br>‚ÄĘ The <strong>6</strong> is in the ones place ‚Üí it means 6
<br><br>So 4,726 = 4,000 + 700 + 20 + 6. This is called <strong>expanded form</strong>.
<div class="analogy">ūüí° Think of it like an address. "42 Oak Street" ‚ÄĒ the 4 means 40, not 4, because it's in the tens position. Same idea with numbers.</div>`,

L('0-05',{
  tagline:"When a math problem has multiple operations, you can't just go left to right. There's a specific order ‚ÄĒ and everyone has to use the same one so we all get the same answer.",
  concept:`<div class="big-idea">PEMDAS: Parentheses, Exponents, Multiplication, Division, Addition, Subtraction.</div>
Without a shared order of operations, 2 + 3 √ó 4 could mean (2+3)√ó4 = 20, OR 2+(3√ó4) = 14. We'd get different answers. That's chaos.
<br><br>So mathematicians agreed: <strong>multiplication always happens before addition, unless parentheses say otherwise</strong>.
<br><br>The full order:
<br>1. <strong>P</strong>arentheses ‚ÄĒ anything in ( ) first
<br>2. <strong>E</strong>xponents ‚ÄĒ powers like 3¬≤
<br>3. <strong>M/D</strong> ‚ÄĒ Multiplication and Division, left to right
<br>4. <strong>A/S</strong> ‚ÄĒ Addition and Subtraction, left to right
<div class="analogy">ūüí° Remember: "Please Excuse My Dear Aunt Sally" ‚ÄĒ or just PEMDAS. M and D have equal priority (go left to right). Same for A and S.</div>`,
  formula:{display:'P ‚Üí E ‚Üí M/D ‚Üí A/S',caption:'Always work through this order. For M/D and A/S, work left to right when both appear.'},
  examples:[
    {label:'Example 1',q:'Evaluate: 2 + 3 √ó 4',steps:[
      {t:'Check for parentheses or exponents',d:'None here.'},
      {t:'Multiplication first',d:'3 √ó 4 = <span class="math">12</span>'},
      {t:'Now add',d:'2 + 12 = <span class="math answer">14</span>'},
    ]},
    {label:'Example 2',q:'Evaluate: (5 + 1)¬≤ √∑ 4 ‚ąí 2',steps:[
      {t:'Parentheses first',d:'(5 + 1) = <span class="math">6</span>'},
      {t:'Exponents next',d:'6¬≤ = <span class="math">36</span>'},
      {t:'Division (left to right with multiplication)',d:'36 √∑ 4 = <span class="math">9</span>'},
      {t:'Subtraction last',d:'9 ‚ąí 2 = <span class="math answer">7</span>'},
    ]},
    {label:'Example 3',q:'Evaluate: 12 √∑ 4 √ó 3',steps:[
      {t:'Division and multiplication ‚ÄĒ go left to right',d:'12 √∑ 4 = <span class="math">3</span> (do this first because it\'s leftmost)'},
      {t:'Now multiply',d:'3 √ó 3 = <span class="math answer">9</span>'},
    ]},
  ],
  tryit:{q:'What is 8 + 2 √ó (5 ‚ąí 1)?',opts:['40','16','24','10'],ans:1,hint:'Do the parentheses first: 5 ‚ąí 1 = ?. Then multiply, then add.',feedback:'Parentheses: 5‚ąí1=4. Multiply: 2√ó4=8. Add: 8+8 = 16.'},
  mistakes:[
    {wrong:'Going left to right always: 2+3√ó4 = 5√ó4 = 20',right:'Multiplication comes before addition. 3√ó4=12 first, then 2+12=14.'},
    {wrong:'Doing M before D regardless of position',right:'M and D have equal rank. Go left to right: 12 √∑ 4 √ó 3 ‚Üí do the √∑ first because it\'s on the left.'},
  ],
  check:[

    {q:'Evaluate: 20 √∑ (2 + 3) √ó 2',opts:['8','2','4','40'],ans:0,fb:'Parentheses: 2+3=5. Then left to right: 20√∑5=4, then 4√ó2=8.'},
    {q:'Which is calculated first in 6 √ó 2 + 8 √∑ 4?',opts:['6 √ó 2','2 + 8','8 √∑ 4','The whole expression'],ans:0,fb:'M/D happen before A/S. Both 6√ó2 and 8√∑4 happen before addition, but 6√ó2 is leftmost.'},
  ]

L('0-07',{
  tagline:"A fraction isn't just 'part of something' ‚ÄĒ it's a division problem. Once you see it that way, fractions stop being scary.",
  concept:`<div class="big-idea">A fraction a/b means: divide a into b equal parts and take a of them.</div>
The <strong>denominator</strong> (bottom number) tells you how many equal pieces the whole is cut into.<br>
The <strong>numerator</strong> (top number) tells you how many of those pieces you have.
<br><br>So 3/4 means: cut something into 4 equal pieces, and you have 3 of them.
<br><br><strong>Equivalent fractions</strong>: 1/2 = 2/4 = 3/6 = 50/100. They all represent the same amount ‚ÄĒ you just cut the same thing into more pieces.
<br><br><strong>Simplifying</strong>: divide top and bottom by the same number (their GCF). 6/8 ‚Üí divide both by 2 ‚Üí 3/4.
<div class="analogy">ūüí° 1/2 of a pizza and 2/4 of the same pizza is the exact same amount ‚ÄĒ just cut differently. Equivalent fractions are the same size, different cuts.</div>`,
  formula:{display:'a/b means a √∑ b',caption:'The fraction bar IS a division sign. 3/4 = 3 √∑ 4 = 0.75'},
  examples:[
    {label:'Example 1',q:'Are 2/3 and 8/12 equivalent?',steps:[
      {t:'Multiply 2/3 to get 12 in denominator',d:'3 √ó 4 = 12, so multiply top too: 2 √ó 4 = 8'},
      {t:'Compare',d:'2/3 = 8/12 ‚úď ‚Üí <span class="math answer">Yes, they are equivalent</span>'},
    ]},
    {label:'Example 2',q:'Simplify 18/24.',steps:[
      {t:'Find the GCF of 18 and 24',d:'Factors of 18: 1,2,3,6,9,18 | Factors of 24: 1,2,3,4,6,8,12,24 ‚Üí GCF = 6'},
      {t:'Divide both by GCF',d:'18√∑6 = 3, 24√∑6 = 4 ‚Üí <span class="math answer">3/4</span>'},
    ]},
  ],
  tryit:{q:'Which fraction is equivalent to 2/5?',opts:['4/8','6/15','3/8','5/10'],ans:1,hint:'Multiply both the top and bottom of 2/5 by the same number.',feedback:'2√ó3=6 and 5√ó3=15, so 2/5 = 6/15. Check: 4/8=1/2, 3/8 is different, 5/10=1/2.'},
  mistakes:[
    {wrong:'Adding numerator and denominator to simplify: 6/8 ‚Üí 6+2/8+2 = 8/10',right:'Simplify by dividing both by their GCF: 6√∑2/8√∑2 = 3/4.'},
    {wrong:'Thinking bigger denominator means bigger fraction',right:'1/10 is smaller than 1/3 ‚ÄĒ more pieces means each piece is smaller.'},
  ],
  check:[
    {q:'Simplify 12/16.',opts:['3/4','6/8','4/5','2/3'],ans:0,fb:'GCF of 12 and 16 is 4. 12√∑4=3, 16√∑4=4. Answer: 3/4.'},
    {q:'Which fraction is NOT equivalent to 1/3?',opts:['2/6','4/12','3/8','5/15'],ans:2,fb:'3/8: 1√ó8=8 ‚Č† 3√ó3=9. Not equivalent. All others multiply to equal 1/3.'},
    {q:'What is 3/4 as a division problem?',opts:['4 √∑ 3','3 √∑ 4','3 √ó 4','4 √ó 3'],ans:1,fb:'The fraction bar means divide. 3/4 = 3 √∑ 4 = 0.75.'},
  ]
});

  concept:`<div class="big-idea">Percent means "per hundred." 40% = 40/100 = 0.40.</div>

L('1-01',{
  tagline:"A variable is just a box with a label on it. That's it. Once you see it that way, algebra makes way more sense.",
  concept:`<div class="big-idea">A variable is a symbol (usually a letter) that represents an unknown or changing number.</div>
Instead of writing "some number," we write x. Instead of "the price," we write p.
<br><br>Variables let us write <strong>general rules</strong> that work for any number:
<br>‚ÄĘ Area of a rectangle: A = length √ó width (works for ALL rectangles, not just one)
<br>‚ÄĘ The rule "double a number and add 3" becomes: 2x + 3
<br><br>An <strong>expression</strong> has numbers and variables: 3x + 7<br>
An <strong>equation</strong> has an equals sign: 3x + 7 = 22 (making a claim that's either true or false)<br>
A <strong>solution</strong> is the value that makes the equation true.
<div class="analogy">ūüí° Think of x like a mystery box. The equation is a clue: "The mystery box, doubled, plus 3, equals 11." Your job is to figure out what's in the box.</div>`,

L('1-04',{
  tagline:"Two-step equations are the backbone of algebra. Master this and you can solve almost any basic equation by following the same simple process every time.",
  concept:`<div class="big-idea">To solve an equation, undo everything that was done to the variable ‚ÄĒ in reverse order.</div>
In 2x + 3 = 11, two things happened to x: it was multiplied by 2, then 3 was added.
<br>To undo: first remove the 3 (subtract), then remove the 2 (divide). <strong>Last thing done gets undone first.</strong>
<br><br>The golden rule: <strong>whatever you do to one side, you must do to the other side</strong>. The equation is like a scale ‚ÄĒ keep it balanced.
<br><br>Steps:<br>1. Move constants to the right (add or subtract)<br>2. Isolate the variable (multiply or divide)<br>3. Check your answer by substituting back
<div class="analogy">ūüí° Think of the equation as a mystery box (x) that has been wrapped twice. The outer wrapping is +3. Unwrap that first (‚ąí3 from both sides). The inner wrapping is √ó2. Unwrap that next (√∑2 from both sides).</div>`,
  formula:{display:'2x + 3 = 11  ‚Üí  x = 4',caption:'Subtract 3 from both sides, then divide both sides by 2'},
  examples:[
    {label:'Example 1',q:'Solve: 3x + 5 = 20',steps:[
      {t:'Subtract 5 from both sides',d:'3x + 5 ‚ąí 5 = 20 ‚ąí 5 ‚Üí <span class="math">3x = 15</span>'},
      {t:'Divide both sides by 3',d:'3x √∑ 3 = 15 √∑ 3 ‚Üí <span class="math answer">x = 5</span>'},
      {t:'Check: plug x = 5 back in',d:'3(5) + 5 = 15 + 5 = 20 ‚úď'},
    ]},
    {label:'Example 2',q:'Solve: x/4 ‚ąí 2 = 6',steps:[
      {t:'Add 2 to both sides',d:'x/4 = 8'},
      {t:'Multiply both sides by 4',d:'x = <span class="math answer">32</span>'},
      {t:'Check',d:'32/4 ‚ąí 2 = 8 ‚ąí 2 = 6 ‚úď'},

L('1-08',{
  tagline:"Slope is the most important idea in all of early algebra. It shows up in physics, economics, data science, and everywhere else. Get this right.",
  concept:`<div class="big-idea">Slope measures steepness ‚ÄĒ how much y changes for every 1 unit x increases.</div>
If a line goes up 3 for every 1 it goes right, the slope is 3. If it goes down 2 for every 1 right, slope is ‚ąí2. Flat line: slope is 0. Vertical line: slope is undefined.
<br><br><strong>Rise over run:</strong> m = (y‚āā ‚ąí y‚āĀ) / (x‚āā ‚ąí x‚āĀ)
<br><br>Given two points, subtract the y-values (rise) and divide by the difference of x-values (run). Order matters ‚ÄĒ be consistent. If you start with point 1 on top for y, start with point 1 on top for x too.
<br><br><strong>Sign of slope tells direction:</strong><br>
‚ÄĘ Positive ‚Üí line goes up left to right<br>‚ÄĘ Negative ‚Üí line goes down left to right<br>‚ÄĘ Zero ‚Üí horizontal<br>‚ÄĘ Undefined ‚Üí vertical
<div class="analogy">ūüí° Imagine walking along the line from left to right. Slope tells you: for every step forward, do you go up, down, or stay flat ‚ÄĒ and by how much?</div>`,
  formula:{display:'m = (y‚āā ‚ąí y‚āĀ) / (x‚āā ‚ąí x‚āĀ)',caption:'m is the standard letter for slope. Rise over run.'},
  examples:[
    {label:'Example 1',q:'Find the slope through (2, 3) and (6, 11).',steps:[
      {t:'Label your points',d:'(x‚āĀ,y‚āĀ) = (2,3) and (x‚āā,y‚āā) = (6,11)'},
      {t:'Plug into formula',d:'m = (11‚ąí3) / (6‚ąí2)'},
      {t:'Simplify',d:'m = 8/4 = <span class="math answer">2</span>'},
    ]},
    {label:'Example 2',q:'Find the slope through (‚ąí1, 5) and (3, ‚ąí3).',steps:[
      {t:'Compute rise',d:'y‚āā ‚ąí y‚āĀ = ‚ąí3 ‚ąí 5 = <span class="math">‚ąí8</span>'},
      {t:'Compute run',d:'x‚āā ‚ąí x‚āĀ = 3 ‚ąí (‚ąí1) = <span class="math">4</span>'},
      {t:'Divide',d:'m = ‚ąí8/4 = <span class="math answer">‚ąí2</span>'},
    ]},
  ],
  tryit:{q:'What is the slope of the line through (1, 2) and (4, 8)?',opts:['2','6','1/2','3'],ans:0,hint:'Use (y‚āā‚ąíy‚āĀ)/(x‚āā‚ąíx‚āĀ). Subtract y-values, then divide by x-values subtracted.',feedback:'(8‚ąí2)/(4‚ąí1) = 6/3 = 2.'},
  mistakes:[

    {wrong:'Mixing up which point is "1" and which is "2"',right:'It doesn\'t matter which point you call #1 ‚ÄĒ just be consistent. Use the same order for both x and y.'},

    {q:'A line has slope 3. If x increases by 1, y increases by how much?',opts:['1','1/3','3','‚ąí3'],ans:2,fb:'Slope = rise/run. If run = 1, rise = slope = 3.'},
    {q:'What is the slope of a horizontal line?',opts:['1','undefined','0','‚ąí1'],ans:2,fb:'Horizontal lines have no rise (őĒy=0). 0/anything = 0.'},

L('1-09',{
  tagline:"y = mx + b is the most useful equation in all of algebra. Once you understand what m and b actually mean, you can graph any line and write any line's equation instantly.",
  concept:`<div class="big-idea">In y = mx + b, m is the slope and b is where the line crosses the y-axis.</div>
The <strong>y-intercept</strong> (b) is the starting point ‚ÄĒ where x = 0. It's the point (0, b) on the graph.
<br>The <strong>slope</strong> (m) tells you: for every 1 step right, go m steps up (or down if m is negative).
<br><br>To <strong>graph</strong> a line:<br>1. Plot the y-intercept (0, b)<br>2. From there, apply the slope (rise/run)<br>3. Draw the line through both points
<br><br>To <strong>write the equation</strong> from a graph:<br>1. Read off the y-intercept (b)<br>2. Find the slope from two points (m)<br>3. Plug both into y = mx + b
<div class="analogy">ūüí° A taxi starts with a $3 base fee (b = 3) and charges $2 per mile (m = 2). The total cost: y = 2x + 3. The base fee is the y-intercept. The cost per mile is the slope.</div>`,
  formula:{display:'y = mx + b',caption:'m = slope (steepness), b = y-intercept (where line hits y-axis)'},
  examples:[
    {label:'Example 1',q:'Graph y = 2x ‚ąí 3.',steps:[
      {t:'Identify b',d:'b = ‚ąí3, so start at (0, ‚ąí3)'},

      {t:'Draw the line',d:'Connect the points and extend in both directions.'},

    {label:'Example 2',q:'Write the equation of a line with slope 3 through (0, ‚ąí5).',steps:[
      {t:'m = 3 (given)',d:''},
      {t:'b = ‚ąí5 (y-intercept is given)',d:'The point (0, ‚ąí5) IS the y-intercept'},
      {t:'Plug into y = mx + b',d:'<span class="math answer">y = 3x ‚ąí 5</span>'},
    ]},
    {label:'Example 3',q:'Write the equation through (2, 7) and (4, 13).',steps:[
      {t:'Find slope',d:'m = (13‚ąí7)/(4‚ąí2) = 6/2 = <span class="math">3</span>'},
      {t:'Plug in one point to find b',d:'7 = 3(2) + b ‚Üí 7 = 6 + b ‚Üí b = 1'},

L('1-13',{
  tagline:"The quadratic formula is a guaranteed method to solve ANY quadratic equation. It always works, even when factoring fails.",
  concept:`<div class="big-idea">For any equation ax¬≤ + bx + c = 0, the solutions are x = (‚ąíb ¬Ī ‚ąö(b¬≤‚ąí4ac)) / 2a.</div>
You don't need to derive it ‚ÄĒ you need to use it. Here's what to do:

<br>3. Plug into the formula

<br><br>The <strong>discriminant</strong> (b¬≤ ‚ąí 4ac) tells you how many solutions exist:
<br>‚ÄĘ Positive ‚Üí 2 real solutions<br>‚ÄĘ Zero ‚Üí 1 repeated solution<br>‚ÄĘ Negative ‚Üí no real solutions (complex)
<div class="analogy">ūüí° The ¬Ī symbol means you solve twice: once with +, once with ‚ąí. That's why quadratics can have two solutions ‚ÄĒ the parabola can cross the x-axis at two points.</div>`,

      {t:'Two answers',d:'x = (‚ąí5+1)/2 = ‚ąí2 and x = (‚ąí5‚ąí1)/2 = ‚ąí3 ‚Üí <span class="math answer">x = ‚ąí2 or x = ‚ąí3</span>'},

L('2-01',{
  tagline:"Exponent rules let you simplify expressions with powers instantly. There are just 7 rules, and they all come from one idea.",
  concept:`<div class="big-idea">All exponent rules come from the definition: x‚ĀŅ means x multiplied by itself n times.</div>
<strong>The 7 rules:</strong><br>
1. <strong>Product rule:</strong> xŠĶÉ √ó xŠĶá = xŠĶÉ‚ĀļŠĶá (same base? add exponents)<br>
2. <strong>Quotient rule:</strong> xŠĶÉ / xŠĶá = xŠĶÉ‚ĀĽŠĶá (same base? subtract)<br>
3. <strong>Power rule:</strong> (xŠĶÉ)ŠĶá = xŠĶÉŠĶá (power to power? multiply)<br>
4. <strong>Zero exponent:</strong> x‚Āį = 1 (anything to the 0 = 1)<br>
5. <strong>Negative exponent:</strong> x‚ĀĽŠĶÉ = 1/xŠĶÉ<br>
6. <strong>Product to a power:</strong> (xy)ŠĶÉ = xŠĶÉyŠĶÉ<br>
7. <strong>Quotient to a power:</strong> (x/y)ŠĶÉ = xŠĶÉ/yŠĶÉ
<div class="analogy">ūüí° Why does x¬≥ √ó x¬≤ = x‚ĀĶ? Count: (x¬∑x¬∑x) √ó (x¬∑x) = x¬∑x¬∑x¬∑x¬∑x = x‚ĀĶ. You're just counting the total number of x's. That's why you ADD the exponents.</div>`,
  formula:{display:'xŠĶÉ √ó xŠĶá = xŠĶÉ‚ĀļŠĶá    xŠĶÉ / xŠĶá = xŠĶÉ‚ĀĽŠĶá    (xŠĶÉ)ŠĶá = xŠĶÉŠĶá',caption:'The three most-used rules. Only combine exponents when bases are the same.'},
  examples:[
    {label:'Example 1',q:'Simplify: x¬≥ √ó x‚Āī',steps:[
      {t:'Same base (x), so add exponents',d:'x¬≥‚Āļ‚Āī = <span class="math answer">x‚Ā∑</span>'},
    ]},
    {label:'Example 2',q:'Simplify: (2x¬≥)‚Āī',steps:[
      {t:'Apply power to both 2 and x¬≥',d:'2‚Āī √ó (x¬≥)‚Āī'},
      {t:'Compute each part',d:'16 √ó x¬Ļ¬≤ = <span class="math answer">16x¬Ļ¬≤</span>'},
    ]},
    {label:'Example 3',q:'Simplify: x‚ĀĽ¬≥',steps:[
      {t:'Negative exponent ‚Üí move to denominator',d:'x‚ĀĽ¬≥ = <span class="math answer">1/x¬≥</span>'},
    ]},
  ],
  tryit:{q:'Simplify: (x¬≤)¬≥ √ó x',opts:['x‚ĀĶ','x‚Ā∂','x‚Ā∑','x‚ĀĻ'],ans:2,hint:'First apply the power rule to (x¬≤)¬≥, then use the product rule with √óx.',feedback:'(x¬≤)¬≥ = x‚Ā∂. Then x‚Ā∂ √ó x¬Ļ = x‚Ā∑.'},
  mistakes:[
    {wrong:'Multiplying exponents for products: x¬≤ √ó x¬≥ = x‚Ā∂',right:'Product rule: ADD exponents. x¬≤ √ó x¬≥ = x‚ĀĶ.'},
    {wrong:'Applying rules across different bases: x¬≥ √ó y¬≥ = (xy)‚Ā∂',right:'You can only add/subtract exponents when the BASE is the same. x¬≥ √ó y¬≥ = (xy)¬≥, not anything with x‚Ā∂.'},
  ],
  check:[
    {q:'Simplify: x‚ĀĶ/x¬≤',opts:['x¬≥','x‚Ā∑','x¬≤¬∑‚ĀĶ','1/x¬≥'],ans:0,fb:'Quotient rule: subtract exponents. x‚ĀĶ‚ĀĽ¬≤ = x¬≥.'},
    {q:'What is (3x¬≤y)¬≤?',opts:['6x‚Āīy¬≤','9x¬≤y¬≤','9x‚Āīy¬≤','6x¬≤y'],ans:2,fb:'Square everything: 3¬≤=9, (x¬≤)¬≤=x‚Āī, y¬≤=y¬≤. Answer: 9x‚Āīy¬≤.'},

L('3-03',{
  tagline:"The Pythagorean theorem is one of the most famous facts in all of mathematics. It's been proved over 370 different ways. Here's what it means and how to use it.",
  concept:`<div class="big-idea">In a right triangle, the square of the hypotenuse equals the sum of the squares of the other two sides: a¬≤ + b¬≤ = c¬≤.</div>
The <strong>hypotenuse</strong> (c) is always the longest side ‚ÄĒ the one <strong>opposite</strong> the right angle.
<br>The other two sides (a and b) are called the <strong>legs</strong>.
<br><br>Uses:<br>‚ÄĘ Find a missing side: if you know two sides, you can find the third<br>‚ÄĘ Check if a triangle is a right triangle: if a¬≤+b¬≤=c¬≤, it is<br>‚ÄĘ Find distances on a coordinate plane (the direct "as the crow flies" distance)
<br><br><strong>Common triples to memorize:</strong> 3-4-5, 5-12-13, 8-15-17. Any multiple also works (6-8-10, etc.)

<br><br>The other quadrants mirror these with sign changes.
<div class="analogy">ūüí° Radians are just a different unit for angles. ŌÄ radians = 180¬į. So ŌÄ/6 = 30¬į, ŌÄ/4 = 45¬į, ŌÄ/3 = 60¬į, ŌÄ/2 = 90¬į. Convert: multiply by 180/ŌÄ for degrees.</div>`,

L('5-01',{
  tagline:"The derivative is the single most important concept in calculus. Before you touch any formulas, understand what it actually means.",
  concept:`<div class="big-idea">The derivative of a function at a point is the instantaneous rate of change ‚ÄĒ the slope of the curve at that exact point.</div>
Imagine you're driving. Your speed at any instant is your derivative ‚ÄĒ it's how fast your position is changing right now.
<br><br>On a graph, the derivative at point x = a is the slope of the <strong>tangent line</strong> to the curve at that point.
<br><br>Why is that hard? Because a line needs two points to define slope. But a tangent at one point... only has one point. The trick: take two points very close together and see what happens as they get infinitely close. That's a limit.
<br><br><strong>Notation:</strong> f'(x), dy/dx, y' ‚ÄĒ all mean "the derivative of y with respect to x."
<div class="analogy">ūüí° The difference between average speed and instantaneous speed: average speed over a trip is total distance √∑ total time. Instantaneous speed (what your speedometer shows) is the derivative of position. Calculus gives you the speedometer.</div>`,

    ]},
    {label:'Example 2 ‚ÄĒ Interpretation',q:'If a position function is p(t) = t¬≤, what is the velocity at t = 3 seconds?',steps:[

L('5-03',{
  tagline:"The power rule is the most-used derivative rule in all of calculus. Learn it once, use it forever.",
  concept:`<div class="big-idea">To differentiate x‚ĀŅ: bring the exponent down in front, then reduce the exponent by 1. d/dx[x‚ĀŅ] = nx‚ĀŅ‚ĀĽ¬Ļ</div>
That's it. Works for any power ‚ÄĒ positive, negative, fraction.
<br><br>Examples:<br>
‚ÄĘ d/dx[x¬≥] = 3x¬≤ (exponent 3 comes down, new exponent is 2)<br>
‚ÄĘ d/dx[x] = 1 (x = x¬Ļ, so 1¬∑x‚Āį = 1)<br>
‚ÄĘ d/dx[5] = 0 (constants have no x, their rate of change is zero)<br>
‚ÄĘ d/dx[x‚ĀĽ¬≤] = ‚ąí2x‚ĀĽ¬≥<br>
‚ÄĘ d/dx[‚ąöx] = d/dx[x^(1/2)] = (1/2)x^(‚ąí1/2) = 1/(2‚ąöx)
<br><br>For a sum/difference, differentiate term by term.<br>
For a constant times a function: d/dx[cf(x)] = c¬∑f'(x) ‚ÄĒ pull the constant out.
<div class="analogy">ūüí° Think of it as a factory: every x‚ĀŅ that goes in comes out as nx‚ĀŅ‚ĀĽ¬Ļ. The exponent gets "cloned" to the front, then the original exponent shrinks by 1.</div>`,
  formula:{display:'d/dx[x‚ĀŅ] = nx‚ĀŅ‚ĀĽ¬Ļ',caption:'Bring down the exponent, reduce by 1. Works for all real n.'},
  examples:[

      {t:'Rewrite as a power',d:'1/x¬≤ = x‚ĀĽ¬≤'},

L('5-05',{
  tagline:"The chain rule unlocks composite functions ‚ÄĒ functions inside functions. It's the most important differentiation technique after the power rule.",
  concept:`<div class="big-idea">For a composite function f(g(x)), the derivative is f'(g(x)) ¬∑ g'(x). Derivative of outside times derivative of inside.</div>
Think of it as peeling layers of an onion: differentiate the outer layer (leaving the inner layer unchanged), then multiply by the derivative of the inner layer.
<br><br>Steps:<br>
1. Identify the outer function f and inner function g<br>
2. Differentiate f (treat g(x) like a single variable)<br>
3. Multiply by g'(x)
<br><br>Examples of identifying layers:<br>
‚ÄĘ sin(3x): outer = sin, inner = 3x<br>
‚ÄĘ (x¬≤+1)‚ĀĶ: outer = ()‚ĀĶ, inner = x¬≤+1<br>
‚ÄĘ e^(x¬≥): outer = eň£, inner = x¬≥
<div class="analogy">ūüí° You're wearing a shirt inside a jacket. To "undo" your outfit: take off jacket first (differentiate outer), then take off shirt (multiply by derivative of inner). Can't just yank the shirt ‚ÄĒ jacket has to come off in the right way.</div>`,
  formula:{display:"d/dx[f(g(x))] = f'(g(x)) ¬∑ g'(x)",caption:'Outside derivative (evaluated at inside) TIMES inside derivative'},
  examples:[

      {t:'Outer function: ()‚Āī, Inner: 3x+2',d:''},

L('5-14',{
  tagline:"The Fundamental Theorem of Calculus is the most important theorem in all of calculus. It reveals that differentiation and integration are inverse operations.",
  concept:`<div class="big-idea">Part 1: If F(x) = ‚ąę‚āźň£ f(t)dt, then F'(x) = f(x). Part 2: ‚ąę‚āźŠĶá f(x)dx = F(b) ‚ąí F(a).</div>
<strong>Part 2 is what you use most.</strong> It says: to compute the definite integral (area under f from a to b), find any antiderivative F, then compute F(b) ‚ąí F(a).
<br><br>This is huge. Before this theorem, computing areas required summing infinite tiny rectangles. Now you just need an antiderivative and two subtraction steps.
<br><br><strong>Process for ‚ąę‚āźŠĶá f(x)dx:</strong><br>
1. Find the antiderivative F(x)<br>
2. Compute F(b) ‚ąí F(a)<br>
3. Done.
<div class="analogy">ūüí° Imagine filling a bathtub. The rate the water flows in is f(t). The total water added from time a to b is ‚ąę‚āźŠĶá f(t)dt = F(b)‚ąíF(a). Integration counts up all the tiny drips over time into a total. The FTC says the total is just the antiderivative evaluated at the endpoints.</div>`,
  formula:{display:'‚ąę‚āźŠĶá f(x)dx = F(b) ‚ąí F(a)',caption:'Where F is any antiderivative of f (F\'=f). Evaluate at top limit minus bottom limit.'},
  examples:[
    {label:'Example 1',q:'Evaluate ‚ąę‚āĀ¬≥ x¬≤ dx.',steps:[
      {t:'Find antiderivative of x¬≤',d:'F(x) = x¬≥/3'},
      {t:'Evaluate at b=3 and a=1',d:'F(3) = 27/3 = 9, F(1) = 1/3'},
      {t:'Subtract: F(b) ‚ąí F(a)',d:'9 ‚ąí 1/3 = <span class="math answer">26/3</span>'},
    ]},
    {label:'Example 2',q:'Evaluate ‚ąę‚āÄ¬≤ (3x¬≤ + 2) dx.',steps:[
      {t:'Antiderivative term by term',d:'F(x) = x¬≥ + 2x'},
      {t:'F(2) = 8 + 4 = 12',d:''},
      {t:'F(0) = 0',d:''},
      {t:'Answer: 12 ‚ąí 0 = <span class="math answer">12</span>',d:''},
    ]},
  ],
  tryit:{q:'Evaluate ‚ąę‚āÄ¬Ļ 4x¬≥ dx.',opts:['1','4','3','2'],ans:0,hint:'Antiderivative of 4x¬≥ is x‚Āī. Then evaluate at x=1 and x=0.',feedback:'F(x) = x‚Āī. F(1)‚ąíF(0) = 1‚ąí0 = 1.'},
  mistakes:[

    {wrong:'Evaluating a before b: F(a)‚ąíF(b)',right:'Upper limit minus lower limit: F(b)‚ąíF(a). Top minus bottom.'},

    {q:'What antiderivative do you use for ‚ąę x¬≥ dx?',opts:['3x¬≤','x‚Āī/4','x‚Āī','3x‚Āī'],ans:1,fb:'Reverse power rule: increase exponent by 1, divide by new exponent. x¬≥ ‚Üí x‚Āī/4.'},
    {q:'The FTC connects differentiation and integration by showing they are:',opts:['The same operation','Inverse operations','Unrelated','Both equivalent to limits'],ans:1,fb:'The FTC reveals that differentiation and integration are inverses ‚ÄĒ like multiplication and division.'},

L('6-02',{
  tagline:"Integration by parts is to integration what the product rule is to differentiation. It lets you integrate products of functions.",
  concept:`<div class="big-idea">‚ąęu dv = uv ‚ąí ‚ąęv du. Choose u and dv wisely ‚ÄĒ that's the whole skill.</div>
This comes directly from the product rule reversed. It trades a hard integral for (hopefully) an easier one.
<br><br><strong>LIATE rule for choosing u:</strong> Pick the first type from this list:
<br>L ‚ÄĒ Logarithm (ln x)<br>I ‚ÄĒ Inverse trig (arctan x)<br>A ‚ÄĒ Algebraic (x¬≤, x, etc.)<br>T ‚ÄĒ Trig (sin x, cos x)<br>E ‚ÄĒ Exponential (eň£)
<br><br>Then dv = everything else.
<br><br>Steps:<br>1. Pick u (use LIATE)<br>2. Differentiate to get du<br>3. dv = everything remaining<br>4. Integrate to get v<br>5. Apply formula: uv ‚ąí ‚ąęv du
<div class="analogy">ūüí° You have ‚ąęx¬∑eň£ dx. Which is easier to differentiate vs. integrate? x gets simpler when differentiated (‚Üí1). eň£ stays the same. So u=x, dv=eň£dx. The product rule runs in reverse.</div>`,
  formula:{display:'‚ąęu dv = uv ‚ąí ‚ąęv du',caption:'LIATE: choose u as the first applicable type (L, I, A, T, E)'},
  examples:[
    {label:'Example 1',q:'Evaluate ‚ąęx¬∑eň£ dx.',steps:[
      {t:'Choose u and dv (LIATE: A before E)',d:'u = x, dv = eň£ dx'},
      {t:'Find du and v',d:'du = dx, v = eň£'},
      {t:'Apply formula',d:'‚ąęx¬∑eň£ dx = x¬∑eň£ ‚ąí ‚ąęeň£ dx'},
      {t:'Integrate',d:'= x¬∑eň£ ‚ąí eň£ + C = <span class="math answer">eň£(x‚ąí1) + C</span>'},
    ]},
    {label:'Example 2',q:'Evaluate ‚ąęln(x) dx.',steps:[
      {t:'LIATE: L comes first, so u = ln x',d:'dv = dx ‚Üí v = x'},
      {t:'du = 1/x dx',d:''},
      {t:'Apply formula',d:'x¬∑ln(x) ‚ąí ‚ąęx ¬∑ (1/x) dx = x¬∑ln(x) ‚ąí ‚ąę1 dx'},
      {t:'Integrate',d:'<span class="math answer">x¬∑ln(x) ‚ąí x + C</span>'},
    ]},
  ],
  tryit:{q:'For ‚ąęx¬∑cos(x) dx, what should u be?',opts:['cos(x)','x','dx','1'],ans:1,hint:'Use LIATE: A (algebraic) comes before T (trig).',feedback:'u = x (algebraic), dv = cos(x)dx (trig). Then: x¬∑sin(x) ‚ąí ‚ąęsin(x)dx = x¬∑sin(x) + cos(x) + C.'},

    {q:'‚ąęu dv = uv ‚ąí ?',opts:['‚ąęu dv','‚ąęv du','‚ąędu','uv'],ans:1,fb:'‚ąęu dv = uv ‚ąí ‚ąęv du.'},
    {q:'What is ‚ąęln(x) dx?',opts:['1/x + C','x¬∑ln(x) + C','x¬∑ln(x) ‚ąí x + C','ln(x)/x + C'],ans:2,fb:'IBP with u=ln(x), dv=dx: x¬∑ln(x) ‚ąí ‚ąęx¬∑(1/x)dx = x¬∑ln(x) ‚ąí x + C.'},

L('6-07',{
  tagline:"Series convergence is about whether an infinite sum has a finite answer. These tests tell you yes or no ‚ÄĒ and sometimes how much.",
  concept:`<div class="big-idea">An infinite series ‚ąĎa‚āô converges if the sum of infinitely many terms reaches a finite number. Otherwise it diverges (blows up or oscillates).</div>
<strong>The key tests:</strong>
<br><br><strong>1. Divergence Test:</strong> If lim(a‚āô) ‚Č† 0 as n‚Üí‚ąě, the series definitely diverges. (If a‚āô ‚Üí 0, the test is inconclusive.)
<br><br><strong>2. Geometric Series:</strong> ‚ąĎar‚ĀŅ converges if |r| < 1. Sum = a/(1‚ąír).
<br><br><strong>3. p-Series:</strong> ‚ąĎ1/nŠĶĖ converges if p > 1, diverges if p ‚Č§ 1.
<br><br><strong>4. Ratio Test:</strong> Compute L = lim|a‚āô‚āä‚āĀ/a‚āô|. If L < 1: converges. L > 1: diverges. L = 1: inconclusive.
<br><br><strong>5. Comparison Test:</strong> Compare to a known series.
<div class="analogy">ūüí° Think of it like stacking blocks. Do the blocks get small enough, fast enough, that the stack stays finite? The divergence test checks if the blocks are getting small at all. The ratio test checks how fast.</div>`,
  formula:{display:'Geometric: S = a/(1‚ąír) when |r| < 1',caption:'The geometric series is the only type with a clean closed-form sum formula'},
  examples:[
    {label:'Example 1',q:'Does ‚ąĎ(1/2)‚ĀŅ converge?',steps:[
      {t:'This is a geometric series',d:'a=1, r=1/2, |r|=1/2 < 1 ‚Üí converges'},
      {t:'Compute the sum',d:'S = 1/(1‚ąí1/2) = 1/(1/2) = <span class="math answer">2</span>'},
    ]},
    {label:'Example 2',q:'Does ‚ąĎ n/(n+1) converge?',steps:[
      {t:'Apply divergence test: find lim as n‚Üí‚ąě',d:'lim n/(n+1) = lim 1/(1+1/n) = 1'},
      {t:'Limit ‚Č† 0',d:'Series <span class="math answer">diverges</span> (divergence test)'},
    ]},
    {label:'Example 3',q:'Does ‚ąĎ 1/n¬≤ converge?',steps:[
      {t:'p-series with p=2',d:'p = 2 > 1 ‚Üí <span class="math answer">converges</span>'},
    ]},
  ],
  tryit:{q:'Does the series ‚ąĎ(3/4)‚ĀŅ converge?',opts:['Yes, sum = 4','Yes, sum = 3','No, it diverges','Cannot determine'],ans:0,hint:'Check if this is a geometric series. What is r? Is |r| < 1?',feedback:'Geometric series, r=3/4, |r|<1 ‚Üí converges. Sum = 1/(1‚ąí3/4) = 1/(1/4) = 4.'},

    {q:'What is the sum of the geometric series 1 + 1/3 + 1/9 + 1/27 + ...?',opts:['3/2','2','3','1/2'],ans:2,fb:'a=1, r=1/3. Sum = 1/(1‚ąí1/3) = 1/(2/3) = 3/2. Wait ‚ÄĒ let me recheck: a=1, r=1/3, S=1/(2/3)=3/2.'},

L('0-02',{
  tagline:"Adding and subtracting are things you've done forever ‚ÄĒ but now we're going to understand WHY the algorithms work, not just follow steps blindly.",
  concept:`<div class="big-idea">Addition combines groups. Subtraction removes or finds the difference.</div>
The standard algorithm works column by column, right to left, using <strong>regrouping</strong> (carrying/borrowing).
<br><br><strong>Addition regrouping:</strong> When a column adds to 10 or more, write the ones digit and carry the tens digit to the next column.
<br><br><strong>Subtraction borrowing:</strong> When the top digit is smaller than the bottom, borrow 10 from the next column left.
<br><br>Big trick: always line up your place values (ones under ones, tens under tens) before adding or subtracting.
<div class="analogy">ūüí° Think of each column as a separate pile. You can only carry to the next pile when yours overflows past 9. Borrowing is just asking your neighbor for 10.</div>`,
  formula:{display:'Line up ‚Üí right to left ‚Üí regroup',caption:'Always align place values before computing'},
  examples:[
    {label:'Example 1',q:'Add: 4,738 + 2,965',steps:[
      {t:'Add ones: 8+5=13',d:'Write 3, carry 1'},
      {t:'Add tens: 3+6+1=10',d:'Write 0, carry 1'},
      {t:'Add hundreds: 7+9+1=17',d:'Write 7, carry 1'},
      {t:'Add thousands: 4+2+1=7',d:'<span class="math answer">Result: 7,703</span>'},
    ]},
    {label:'Example 2',q:'Subtract: 5,002 ‚ąí 3,768',steps:[
      {t:'Ones: need to subtract 8 from 2 ‚ÄĒ borrow',d:'Borrow across zeros: 5,002 ‚Üí 4,9,9,12 ones. 12‚ąí8=4'},
      {t:'Tens: 9‚ąí6=3',d:'<span class="math">3</span>'},
      {t:'Hundreds: 9‚ąí7=2',d:'<span class="math">2</span>'},
      {t:'Thousands: 4‚ąí3=1',d:'<span class="math answer">Result: 1,234</span>'},
    ]},
  ],
  tryit:{q:'What is 7,041 ‚ąí 2,893?',opts:['4,148','4,152','5,148','4,248'],ans:0,hint:'Borrow from the thousands column when needed. 7,041 ‚ąí 2,893.',feedback:'7,041 ‚ąí 2,893: ones: 11‚ąí3=8 (borrow), tens: 3‚ąí9 need to borrow ‚Üí 13‚ąí9=4... work column by column. Answer: 4,148.'},
  mistakes:[
    {wrong:'Subtracting the smaller from larger in any order: 41‚ąí78 ‚Üí "just do 8‚ąí1=7"',right:'When top < bottom, you must borrow. Never flip the digits.'},
    {wrong:'Forgetting to carry: 8+5=13, writing 13 in the ones column',right:'Write only the ones digit (3) and carry the 1 to the next column.'},

    {q:'Which requires borrowing? 637‚ąí214, 500‚ąí125, 782‚ąí561',opts:['Only 637‚ąí214','Only 500‚ąí125','Both 500‚ąí125 and 637‚ąí214','All three'],ans:1,fb:'637‚ąí214: each top digit ‚Č• bottom (6>2,3>1,7>4) ‚ÄĒ no borrow. 500‚ąí125: 0‚ąí2 and 0‚ąí5 need borrowing. 782‚ąí561: 2>1 OK but check all ‚ÄĒ no borrowing needed.'},
  ]

L('0-03',{
  tagline:"Multiplication is just fast adding ‚ÄĒ but the algorithm lets you handle any size number without adding thousands of times.",
  concept:`<div class="big-idea">Multiplication is repeated addition. 6 √ó 4 means 6 added 4 times: 6+6+6+6 = 24.</div>
<strong>The multiplication algorithm</strong> (long multiplication) works by multiplying the top number by each digit of the bottom number, then adding the partial products.
<br><br>Key facts to have memorized (or be very quick at): the times tables 1‚Äď12.
<br><br>When multiplying by a multi-digit number, shift each partial product one place left for each digit position.
<br><br><strong>Estimation trick:</strong> round to check your answer. 47 √ó 23 ‚Čą 50 √ó 20 = 1,000. If your answer is 2,000 something's wrong.
<div class="analogy">ūüí° Multiplying 47 √ó 23: think of it as 47√ó3 plus 47√ó20. You're breaking the problem into two easier ones.</div>`,
  formula:{display:'a √ó b = b added a times',caption:'Or use the area model: split into tens and ones'},
  examples:[

      {t:'Multiply 34 by 6 (ones)',d:'34 √ó 6 = 204'},
      {t:'Multiply 34 by 2 (tens) ‚ÄĒ shift left one place',d:'34 √ó 20 = 680'},
      {t:'Add partial products',d:'204 + 680 = <span class="math answer">884</span>'},
    ]},
    {label:'Example 2',q:'Multiply: 123 √ó 45',steps:[
      {t:'123 √ó 5 (ones)',d:'615'},
      {t:'123 √ó 40 (tens)',d:'4,920'},
      {t:'Add',d:'615 + 4,920 = <span class="math answer">5,535</span>'},

  check:[

    {q:'Which is the correct first step for 234 √ó 56?',opts:['234 √ó 5','234 √ó 6','234 √ó 50','234 √ó 56 all at once'],ans:1,fb:'Start with the ones digit of the multiplier: 234 √ó 6.'},
    {q:'Estimate 89 √ó 41. Which is closest?',opts:['3,600','4,000','2,800','5,000'],ans:0,fb:'89 ‚Čą 90, 41 ‚Čą 40. 90√ó40 = 3,600.'},

L('0-04',{
  tagline:"Division is the opposite of multiplication ‚ÄĒ and once you see the connection, it clicks. Every division problem is really asking a multiplication question.",
  concept:`<div class="big-idea">a √∑ b asks: how many groups of b fit into a? Or: what times b equals a?</div>
<strong>Long division</strong> breaks a big problem into steps: Divide ‚Üí Multiply ‚Üí Subtract ‚Üí Bring down. Repeat.
<br><br>The number being divided is the <strong>dividend</strong>. The number dividing it is the <strong>divisor</strong>. The answer is the <strong>quotient</strong>. What's left over is the <strong>remainder</strong>.
<br><br>If 5 doesn't divide evenly into 23, the remainder is 23 ‚ąí (4√ó5) = 3. Written as 23 √∑ 5 = 4 R3.
<div class="analogy">ūüí° Division is like sharing equally. 24 cookies √∑ 4 friends = 6 each. If it doesn't divide evenly, some cookies are left over ‚ÄĒ that's the remainder.</div>`,
  formula:{display:'Divide ‚Üí Multiply ‚Üí Subtract ‚Üí Bring down',caption:'Repeat until no digits remain'},
  examples:[
    {label:'Example 1',q:'Divide: 756 √∑ 7',steps:[
      {t:'7 into 7 = 1',d:'Write 1 above the 7. 1√ó7=7, subtract: 0'},
      {t:'Bring down 5. 7 into 5 = 0',d:'Write 0. 0√ó7=0, subtract: 5'},
      {t:'Bring down 6. 7 into 56 = 8',d:'Write 8. 8√ó7=56, subtract: 0'},
      {t:'No remainder',d:'<span class="math answer">756 √∑ 7 = 108</span>'},
    ]},
    {label:'Example 2',q:'Divide: 845 √∑ 4',steps:[
      {t:'4 into 8 = 2',d:'Subtract 8, bring down 4'},
      {t:'4 into 04 = 1',d:'Subtract 4, bring down 5'},
      {t:'4 into 5 = 1 remainder 1',d:'<span class="math answer">845 √∑ 4 = 211 R1</span>'},
    ]},
  ],
  tryit:{q:'What is 936 √∑ 6?',opts:['156','146','166','152'],ans:0,hint:'6 into 9 = 1 R3. Bring down 3 ‚Üí 6 into 33 = 5 R3. Bring down 6 ‚Üí 6 into 36 = 6.',feedback:'9√∑6=1R3, bring down 3: 33√∑6=5R3, bring down 6: 36√∑6=6. Answer: 156.'},
  mistakes:[

    {wrong:'Forgetting to check with multiplication: quotient √ó divisor + remainder = dividend',right:'Always verify: 211 √ó 4 + 1 = 844 + 1 = 845 ‚úď'},
  ],
  check:[

  ]

L('0-06',{
  tagline:"GCF and LCM sound complicated but they're just about listing factors and multiples ‚ÄĒ and they become essential when you work with fractions.",
  concept:`<div class="big-idea">Factors divide evenly into a number. Multiples are what you get when you multiply a number by 1, 2, 3‚Ä¶</div>
<strong>Factor:</strong> 3 is a factor of 12 because 12 √∑ 3 = 4 (no remainder).
<br>Factors of 12: 1, 2, 3, 4, 6, 12
<br><br><strong>GCF (Greatest Common Factor):</strong> the biggest factor that two numbers share.
<br>GCF(12, 18): Factors of 12: {1,2,3,4,6,12}. Factors of 18: {1,2,3,6,9,18}. Shared: {1,2,3,6}. GCF = 6.
<br><br><strong>LCM (Least Common Multiple):</strong> the smallest number that both numbers divide into evenly.
<br>LCM(4, 6): Multiples of 4: 4,8,12,16‚Ä¶ Multiples of 6: 6,12,18‚Ä¶ First shared: 12. LCM = 12.
<div class="analogy">ūüí° GCF is used for simplifying fractions (divide by GCF). LCM is used for adding fractions (find common denominator = LCM of denominators).</div>`,
  formula:{display:'GCF: biggest shared factor | LCM: smallest shared multiple',caption:'Use prime factorization for larger numbers'},
  examples:[
    {label:'Example 1',q:'Find GCF(24, 36)',steps:[
      {t:'List factors of 24',d:'1, 2, 3, 4, 6, 8, 12, 24'},
      {t:'List factors of 36',d:'1, 2, 3, 4, 6, 9, 12, 18, 36'},
      {t:'Largest common factor',d:'<span class="math answer">GCF = 12</span>'},
    ]},
    {label:'Example 2',q:'Find LCM(8, 12)',steps:[
      {t:'Multiples of 8',d:'8, 16, <strong>24</strong>, 32, 40‚Ä¶'},
      {t:'Multiples of 12',d:'12, <strong>24</strong>, 36‚Ä¶'},
      {t:'First in common',d:'<span class="math answer">LCM = 24</span>'},
    ]},
  ],
  tryit:{q:'What is the GCF of 20 and 30?',opts:['5','10','20','2'],ans:1,hint:'List factors of each: 20 = {1,2,4,5,10,20}, 30 = {1,2,3,5,6,10,15,30}.',feedback:'Factors of 20: 1,2,4,5,10,20. Factors of 30: 1,2,3,5,6,10,15,30. Largest common: 10.'},
  mistakes:[
    {wrong:'Confusing GCF and LCM',right:'GCF is always ‚Č§ the smaller number. LCM is always ‚Č• the larger number. GCF(4,6)=2 (smaller). LCM(4,6)=12 (larger than 6).'},
    {wrong:'Stopping at any common factor instead of the GREATEST one',right:'GCF(12,18): 2 is common, 3 is common, 6 is common ‚ÄĒ but GCF = 6 (the greatest).'},
  ],
  check:[

    {q:'LCM(6, 9) = ?',opts:['3','18','54','6'],ans:1,fb:'Multiples of 6: 6,12,18. Multiples of 9: 9,18. LCM = 18.'},
    {q:'Why would you use LCM when adding 1/4 + 1/6?',opts:['To simplify the answer','To find the common denominator','To check if fractions are equivalent','To convert to decimals'],ans:1,fb:'LCM(4,6)=12. The common denominator is 12: 3/12 + 2/12 = 5/12.'},

});

L('0-08',{
  tagline:"Adding fractions is actually simple ‚ÄĒ you just need a common denominator first. Once you have that, you're just adding numerators.",
  concept:`<div class="big-idea">You can only add fractions if they have the same denominator (the same size pieces).</div>
If denominators are the same: just add the numerators. 2/7 + 3/7 = 5/7.
<br><br>If denominators are different:
<br>1. Find the LCM of the denominators (common denominator)
<br>2. Convert both fractions to that denominator
<br>3. Add or subtract the numerators
<br>4. Simplify if possible
<br><br>For <strong>mixed numbers</strong> (like 2‚Öď): convert to improper fractions first, or handle the whole and fractional parts separately.
<div class="analogy">ūüí° You can't add eighths and quarters directly ‚ÄĒ it's like adding apples and oranges. First convert: 1/4 = 2/8. Now you're adding eighths and eighths: 3/8 + 2/8 = 5/8.</div>`,
  formula:{display:'a/c + b/c = (a+b)/c',caption:'Same denominator: add numerators. Different denominators: find LCD first.'},
  examples:[
    {label:'Example 1',q:'Add: 1/3 + 1/4',steps:[
      {t:'Find LCD of 3 and 4',d:'LCM(3,4) = 12'},
      {t:'Convert both fractions',d:'1/3 = 4/12 (√ó4), 1/4 = 3/12 (√ó3)'},
      {t:'Add numerators',d:'4/12 + 3/12 = <span class="math answer">7/12</span>'},
    ]},
    {label:'Example 2',q:'Subtract: 3/4 ‚ąí 2/6',steps:[
      {t:'LCD(4,6) = 12',d:''},
      {t:'Convert',d:'3/4 = 9/12; 2/6 = 4/12'},
      {t:'Subtract',d:'9/12 ‚ąí 4/12 = <span class="math answer">5/12</span>'},

<br><br><strong>Multiplying decimals:</strong> multiply ignoring decimals, then count total decimal places in both numbers and place the point.

L('0-12',{
  tagline:"Negative numbers show up in temperature, debt, sea level, and scores. They're not scary ‚ÄĒ they're just numbers below zero.",
  concept:`<div class="big-idea">Negative numbers are numbers less than zero. ‚ąí3 means "3 below zero."</div>
The number line extends left of zero into negatives: ‚Ä¶‚ąí4, ‚ąí3, ‚ąí2, ‚ąí1, 0, 1, 2‚Ä¶
<br><br><strong>Absolute value |x|</strong> is the distance from zero ‚ÄĒ always positive. |‚ąí7| = 7. |4| = 4.
<br><br><strong>Adding negatives:</strong>
<br>‚ÄĘ Positive + positive = add, positive: 3 + 4 = 7
<br>‚ÄĘ Negative + negative = add, negative: ‚ąí3 + (‚ąí4) = ‚ąí7
<br>‚ÄĘ Opposite signs = subtract the distances, keep sign of larger: ‚ąí3 + 7 = 4; 3 + (‚ąí7) = ‚ąí4
<br><br><strong>Subtracting negatives:</strong> a ‚ąí (‚ąíb) = a + b. "Minus a negative = plus."
<br>5 ‚ąí (‚ąí3) = 5 + 3 = 8
<br><br><strong>Multiplying/Dividing:</strong> same signs = positive. Different signs = negative.
<div class="analogy">ūüí° Think of negatives as debt. You have $5 (positive). Spending $3 means ‚ąí3. If someone cancels your debt (subtracts a negative), that's the same as giving you money.</div>`,

L('1-02',{
  tagline:"Expressions are the sentences of algebra. You need to be able to read them, write them, and evaluate them ‚ÄĒ this is the foundation of everything.",
  concept:`<div class="big-idea">An expression is a combination of numbers, variables, and operations. It has no equals sign.</div>
<strong>Terms:</strong> parts of an expression separated by + or ‚ąí. In 3x¬≤ + 5x ‚ąí 7, the terms are 3x¬≤, 5x, and ‚ąí7.
<br><strong>Coefficients:</strong> the number in front of a variable. In 3x¬≤, the coefficient is 3.
<br><strong>Constants:</strong> terms with no variable. ‚ąí7 is a constant.
<br><strong>Like terms:</strong> terms with the same variable and exponent. 3x and 7x are like terms. 3x and 3x¬≤ are not.
<br><br><strong>Evaluating:</strong> substitute the given value for each variable, then compute.
<br>Evaluate 2x¬≤ ‚ąí 3x + 1 for x = 4: 2(16) ‚ąí 3(4) + 1 = 32 ‚ąí 12 + 1 = 21.
<br><br><strong>Simplifying:</strong> combine like terms. 4x + 3y ‚ąí x + 2y = 3x + 5y.
<div class="analogy">ūüí° Like terms are like piles of the same fruit. 4 apples + 3 oranges ‚ąí 1 apple = 3 apples + 3 oranges. You can only combine the apple piles with each other.</div>`,
  examples:[

    ]},
    {label:'Example 2',q:'Evaluate 3a ‚ąí 2b for a = 5, b = ‚ąí1',steps:[
      {t:'Substitute',d:'3(5) ‚ąí 2(‚ąí1)'},

L('1-03',{
  tagline:"One-step equations are the simplest case of solving ‚ÄĒ but the logic here (do the opposite to both sides) applies to every equation you'll ever solve.",
  concept:`<div class="big-idea">Solving an equation means finding the value of the variable that makes both sides equal.</div>
The strategy: whatever operation was done to the variable, do the opposite to both sides.
<br><br>‚ÄĘ Variable + a = b ‚Üí subtract a from both sides: x = b ‚ąí a

<br>‚ÄĘ a √ó variable = b ‚Üí divide both sides by a: x = b/a
<br>‚ÄĘ variable/a = b ‚Üí multiply both sides by a: x = ab
<br><br>Always check by substituting your answer back into the original equation.
<div class="analogy">ūüí° An equation is a balanced scale. Whatever you do to one side, you must do to the other to keep it balanced. Remove the 5 from x+5=12? Remove it from both sides: x=7.</div>`,

  mistakes:[

L('1-05',{
  tagline:"Multi-step equations are just one-step and two-step equations chained together. The process is always the same ‚ÄĒ simplify, then isolate.",
  concept:`<div class="big-idea">Clear the clutter first: distribute, combine like terms, then solve like a two-step equation.</div>
Standard strategy for any multi-step equation:
<br>1. <strong>Distribute</strong> if there are parentheses: 3(x+2) = 3x + 6
<br>2. <strong>Combine like terms</strong> on each side

<br>4. <strong>Isolate the variable</strong> (multiply/divide)
<br><br><strong>Variables on both sides:</strong> get them all on one side first.
<br>5x ‚ąí 3 = 2x + 9 ‚Üí subtract 2x from both sides ‚Üí 3x ‚ąí 3 = 9 ‚Üí x = 4
<div class="analogy">ūüí° Think of the equation as a messy room. First clean up each side (distribute, combine). Then move the furniture (variable terms) to one side. Then solve.</div>`,

L('1-06',{
  tagline:"Inequalities are like equations with a twist ‚ÄĒ instead of one exact answer, you get a range of answers. And there's just one new rule to learn.",
  concept:`<div class="big-idea">An inequality shows a range of values. Solve like an equation, with one extra rule: flip the sign when multiplying or dividing by a negative.</div>

<br><br><strong>Graphing on a number line:</strong>
<br>‚ÄĘ Open circle ‚óč for > or < (not including the endpoint)

L('1-10',{
  tagline:"A system of equations is two equations with the same variables. Solving it finds the one point where both are true simultaneously ‚ÄĒ where they intersect.",
  concept:`<div class="big-idea">A system of equations has 1 solution (the intersection point), no solution (parallel lines), or infinitely many solutions (same line).</div>
Three solving methods:
<br><br><strong>1. Substitution:</strong> solve one equation for one variable, substitute into the other.
<br><strong>2. Elimination:</strong> add/subtract the equations to cancel one variable.
<br><strong>3. Graphing:</strong> graph both lines, find where they cross.
<br><br>When to use each:
<br>‚ÄĘ Substitution: when one variable is already isolated (x = 3y + 1)
<br>‚ÄĘ Elimination: when coefficients can be easily matched
<div class="analogy">ūüí° Two friends are describing a mystery number: "It's twice mine plus 1" and "The sum of ours is 10." A system finds the one pair of numbers that satisfies both clues simultaneously.</div>`,

  concept:`<div class="big-idea">A polynomial is an expression with one or more terms with whole-number exponents: 3x¬≤, 5x + 2, x¬≥ ‚ąí 2x + 1.</div>

L('1-12',{
  tagline:"Factoring is FOIL in reverse ‚ÄĒ and it's one of the highest-leverage skills in algebra. Everything from solving quadratics to simplifying fractions requires it.",
  concept:`<div class="big-idea">Factoring means writing an expression as a product. x¬≤ + 5x + 6 = (x+2)(x+3).</div>

<br>Find two numbers that multiply to c and add to b.
<br>x¬≤ + 5x + 6: find two numbers √ó = 6 and + = 5 ‚Üí 2 and 3 ‚Üí (x+2)(x+3)
<br><br><strong>When a ‚Č† 1:</strong> use the AC method.
<br>2x¬≤ + 7x + 3: multiply a√óc = 6. Find factors of 6 that add to 7: 6 and 1.
<br>Rewrite: 2x¬≤ + 6x + x + 3. Group: 2x(x+3) + 1(x+3) = (2x+1)(x+3).
<br><br><strong>Special cases:</strong>
<br>‚ÄĘ Difference of squares: a¬≤ ‚ąí b¬≤ = (a+b)(a‚ąíb)

<div class="analogy">ūüí° To factor x¬≤ + 5x + 6, you need two numbers that are "roommates": they share an apartment (multiply to 6) and their height difference adds to 5. Answer: 2 and 3.</div>`,
  formula:{display:'x¬≤+bx+c = (x+p)(x+q) where p+q=b and p√óq=c',caption:'Find two numbers that multiply to c and add to b'},

  tryit:{q:'Factor: x¬≤ ‚ąí 2x ‚ąí 15',opts:['(x‚ąí5)(x+3)','(x+5)(x‚ąí3)','(x‚ąí3)(x+5)','(x‚ąí15)(x+1)'],ans:0,hint:'Need two numbers that multiply to ‚ąí15 and add to ‚ąí2.',feedback:'‚ąí5 √ó 3 = ‚ąí15 and ‚ąí5 + 3 = ‚ąí2. Answer: (x‚ąí5)(x+3).'},

L('2-02',{
  tagline:"Radicals and rational exponents are two notations for the same thing. Once you see that, they stop being confusing.",
  concept:`<div class="big-idea">‚ąöx = x^(1/2). The nth root is x^(1/n). A rational exponent is just a root.</div>
<strong>Radical rules:</strong>
<br>‚ÄĘ ‚ąö(ab) = ‚ąöa ¬∑ ‚ąöb (split under one radical)
<br>‚ÄĘ ‚ąö(a/b) = ‚ąöa / ‚ąöb
<br>‚ÄĘ (‚ąöa)¬≤ = a

  concept:`<div class="big-idea">Polynomials can be added, subtracted, and multiplied. The key is handling like terms and the distributive property carefully.</div>

<div class="analogy">ūüí° Subtracting a polynomial is like distributing a ‚ąí1 to every term inside. Be extra careful with signs ‚ÄĒ this is where most errors happen.</div>`,

L('2-04',{
  tagline:"Complete factoring means factoring until nothing factors further. It's like reducing a fraction all the way ‚ÄĒ never stop at the first step.",
  concept:`<div class="big-idea">Always factor out the GCF first. Then look for special patterns or factor by grouping.</div>
<strong>Order of factoring:</strong>
<br>1. GCF (always first)
<br>2. Is it a difference of squares? a¬≤ ‚ąí b¬≤ = (a+b)(a‚ąíb)
<br>3. Is it a perfect square trinomial? a¬≤+2ab+b¬≤ = (a+b)¬≤
<br>4. Is it a sum/difference of cubes? a¬≥‚ąíb¬≥ = (a‚ąíb)(a¬≤+ab+b¬≤)
<br>5. Trinomials: factor as (ax+b)(cx+d)
<br>6. 4 terms: factor by grouping
<br><br>Check: can any factor be factored further? If yes, keep going.
<div class="analogy">ūüí° Factoring is like peeling an onion. Pull off the outer layer (GCF), then look at what remains. Keep peeling until there are no more layers.</div>`,
  formula:{display:'a¬≥‚ąíb¬≥=(a‚ąíb)(a¬≤+ab+b¬≤) | a¬≥+b¬≥=(a+b)(a¬≤‚ąíab+b¬≤)',caption:'Sum/difference of cubes ‚ÄĒ memorize these patterns'},
  examples:[
    {label:'Example 1',q:'Factor completely: 2x¬≥ ‚ąí 8x',steps:[
      {t:'GCF = 2x',d:'2x(x¬≤ ‚ąí 4)'},
      {t:'x¬≤ ‚ąí 4 is difference of squares',d:'2x(x+2)(x‚ąí2)'},
      {t:'Can any factor reduce more?',d:'No. <span class="math answer">2x(x+2)(x‚ąí2)</span>'},
    ]},
    {label:'Example 2',q:'Factor: x¬≥ + 2x¬≤ ‚ąí 3x ‚ąí 6 (grouping)',steps:[
      {t:'Group in pairs',d:'(x¬≥ + 2x¬≤) + (‚ąí3x ‚ąí 6)'},
      {t:'Factor each group',d:'x¬≤(x+2) ‚ąí 3(x+2)'},
      {t:'Factor out (x+2)',d:'<span class="math answer">(x+2)(x¬≤‚ąí3)</span>'},
    ]},
  ],
  tryit:{q:'Factor completely: 3x¬≤ ‚ąí 12',opts:['3(x¬≤‚ąí4)','3(x+2)(x‚ąí2)','(3x+6)(x‚ąí2)','3(x‚ąí2)¬≤'],ans:1,hint:'First pull out the GCF (3). Then factor the remaining expression.',feedback:'GCF=3: 3(x¬≤‚ąí4). x¬≤‚ąí4 is difference of squares: 3(x+2)(x‚ąí2).'},
  mistakes:[
    {wrong:'Stopping at the first factor: 3x¬≤‚ąí12=3(x¬≤‚ąí4) and saying done',right:'3(x¬≤‚ąí4) is NOT fully factored. x¬≤‚ąí4 factors further as (x+2)(x‚ąí2).'},
    {wrong:'Confusing sum of squares with difference of squares',right:'a¬≤+b¬≤ DOES NOT factor over real numbers. a¬≤‚ąíb¬≤=(a+b)(a‚ąíb). Only the difference factors.'},
  ],
  check:[
    {q:'Factor completely: 4x¬≤‚ąí36',opts:['(4x+6)(x‚ąí6)','4(x+3)(x‚ąí3)','2(2x+6)(x‚ąí3)','4(x¬≤‚ąí9)'],ans:1,fb:'GCF=4: 4(x¬≤‚ąí9)=4(x+3)(x‚ąí3).'},
    {q:'Factor: 8x¬≥‚ąí27',opts:['(2x‚ąí3)(4x¬≤+6x+9)','(2x+3)(4x¬≤‚ąí6x+9)','(2x‚ąí3)¬≥','(2x‚ąí3)(4x¬≤‚ąí12x+9)'],ans:0,fb:'Difference of cubes: (2x)¬≥‚ąí3¬≥=(2x‚ąí3)((2x)¬≤+2x¬∑3+3¬≤)=(2x‚ąí3)(4x¬≤+6x+9).'},
    {q:'What is the first step in factoring 6x¬≥+12x¬≤‚ąí3x?',opts:['Factor as a trinomial','Find difference of squares','Pull out GCF (3x)','Factor by grouping'],ans:2,fb:'Always look for GCF first. GCF=3x gives 3x(2x¬≤+4x‚ąí1).'},

L('2-05',{

  concept:`<div class="big-idea">A rational expression is a polynomial fraction: P(x)/Q(x). Same rules as numeric fractions.</div>

<br><strong>Adding/subtracting:</strong> find LCD of denominators, convert, then add numerators.
<br><br>‚ö†ÔłŹ Restrictions: any x value that makes the denominator zero is excluded from the domain.
<div class="analogy">ūüí° (x¬≤‚ąí4)/(x‚ąí2): you can cancel the (x‚ąí2), BUT you must note x‚Č†2 because the original expression was undefined there. Always state restrictions.</div>`,

  examples:[

      {t:'Multiply numerators and denominators',d:'6x/(3(x+1))'},
      {t:'Simplify: GCF=3 in numerator/denominator',d:'<span class="math answer">2x/(x+1), x‚Č†‚ąí1</span>'},

  ],
  tryit:{q:'Simplify: (x¬≤‚ąí9)/(x+3)',opts:['x‚ąí3','x+3','x¬≤‚ąí3','(x‚ąí3)(x+3)/(x+3)'],ans:0,hint:'Factor the numerator: x¬≤‚ąí9 = (x+3)(x‚ąí3).',feedback:'(x+3)(x‚ąí3)/(x+3) = x‚ąí3, x‚Č†‚ąí3.'},
  mistakes:[
    {wrong:'Canceling terms instead of factors: (x+3)/(x+5) = 3/5',right:'You can ONLY cancel factors (things being multiplied), not terms being added. (x+3) and (x+5) share no factors.'},
    {wrong:'Forgetting to state domain restrictions after canceling',right:'When you cancel (x‚ąía) from top and bottom, state x‚Č†a ‚ÄĒ the original was undefined there.'},

<div class="analogy">ūüí° i was invented to answer: what number squared gives ‚ąí1? No real number does. So we invented one. It turns out this makes all polynomials solvable and is essential in physics and engineering.</div>`,

L('2-08',{
  tagline:"Logarithm properties let you break apart complex logs into simpler pieces ‚ÄĒ and they're the key to solving exponential equations.",
  concept:`<div class="big-idea">log_b(x) = y means b^y = x. Logarithm = exponent.</div>

<br>1. <strong>Product rule:</strong> log(MN) = log(M) + log(N)
<br>2. <strong>Quotient rule:</strong> log(M/N) = log(M) ‚ąí log(N)
<br>3. <strong>Power rule:</strong> log(M‚ĀŅ) = n¬∑log(M)
<br><br><strong>Change of base:</strong> log_b(x) = ln(x)/ln(b) = log(x)/log(b)
<br>(Useful for calculators which only have log base 10 and ln)
<br><br><strong>Special values:</strong> log_b(1) = 0 and log_b(b) = 1.
<div class="analogy">ūüí° log(M¬∑N) = log(M)+log(N) because when you multiply numbers, you add their exponents. Logs ARE exponents ‚ÄĒ so logarithm properties mirror exponent rules.</div>`,
  formula:{display:'log(MN)=log M+log N | log(M/N)=log M‚ąílog N | log(M‚ĀŅ)=n¬∑log M',caption:'These three properties handle all log simplification'},
  examples:[
    {label:'Example 1',q:'Expand: log‚āā(8x¬≥/y)',steps:[
      {t:'Quotient rule',d:'log‚āā(8x¬≥) ‚ąí log‚āā(y)'},
      {t:'Product rule on numerator',d:'log‚āā(8) + log‚āā(x¬≥) ‚ąí log‚āā(y)'},
      {t:'Power rule + log‚āā(8)=3',d:'<span class="math answer">3 + 3log‚āā(x) ‚ąí log‚āā(y)</span>'},
    ]},
    {label:'Example 2',q:'Condense: 2log(x) + log(3) ‚ąí log(y)',steps:[
      {t:'Power rule first',d:'log(x¬≤) + log(3) ‚ąí log(y)'},
      {t:'Product/quotient rules',d:'<span class="math answer">log(3x¬≤/y)</span>'},
    ]},

L('2-09',{
  tagline:"Exponential functions model anything that grows or shrinks at a constant percentage rate ‚ÄĒ compound interest, viral spread, radioactive decay. This is incredibly useful.",
  concept:`<div class="big-idea">An exponential function has the form f(x) = ab^x where b > 0 and b ‚Č† 1.</div>
<strong>Key properties:</strong>
<br>‚ÄĘ If b > 1: growth (increases as x increases)
<br>‚ÄĘ If 0 < b < 1: decay (decreases as x increases)
<br>‚ÄĘ y-intercept is always (0, a), because b‚Āį = 1
<br>‚ÄĘ Horizontal asymptote at y = 0
<br><br><strong>Natural exponential: e^x</strong>
<br>e ‚Čą 2.718. Arises naturally in continuous growth models.
<br><br><strong>Solving exponential equations:</strong> get the same base on both sides, or take logarithms.
<br>2^x = 32 ‚Üí 2^x = 2^5 ‚Üí x = 5
<br>3^x = 20 ‚Üí x¬∑ln(3) = ln(20) ‚Üí x = ln(20)/ln(3)
<div class="analogy">ūüí° If you invest $1,000 at 8% annual interest, after t years you have 1000(1.08)^t. The base 1.08 means "multiply by 1.08 each year" ‚ÄĒ that's exponential growth.</div>`,
  formula:{display:'f(x)=ab^x | To solve: take ln of both sides',caption:'b>1=growth, 0<b<1=decay, y-intercept=(0,a)'},
  examples:[
    {label:'Example 1',q:'Solve: 4^(x+1) = 64',steps:[
      {t:'Write 64 as a power of 4',d:'64 = 4¬≥'},
      {t:'Same base: set exponents equal',d:'x+1 = 3'},
      {t:'Solve',d:'<span class="math answer">x = 2</span>'},
    ]},
    {label:'Example 2',q:'Solve: 5^x = 30',steps:[

  concept:`<div class="big-idea">Exponential growth: A = P(1+r)^t. Exponential decay: A = P(1‚ąír)^t. Continuous: A = Pe^(rt).</div>

<br><br><strong>Half-life:</strong> the time for a quantity to halve. If half-life = h, then A = P(1/2)^(t/h).
<br><br><strong>Doubling time:</strong> time for quantity to double. 2P = P¬∑b^t ‚Üí b^t = 2 ‚Üí t = log(2)/log(b)
<div class="analogy">ūüí° A bacterium doubles every 20 minutes. Start with 100. After 60 min: 100 √ó 2^(60/20) = 100 √ó 2¬≥ = 800. The exponent t/period counts how many doublings occurred.</div>`,

L('2-11',{
  tagline:"Arithmetic sequences are patterns where you add the same number every time. They're simple but show up everywhere from pay raises to stair designs.",
  concept:`<div class="big-idea">An arithmetic sequence has a constant difference between consecutive terms called the common difference d.</div>
3, 7, 11, 15, 19... ‚ÄĒ common difference d = 4.
<br><br><strong>nth term formula:</strong> a‚āô = a‚āĀ + (n‚ąí1)d
<br>‚ÄĘ a‚āĀ = first term
<br>‚ÄĘ d = common difference
<br>‚ÄĘ n = term number
<br><br><strong>Sum of first n terms:</strong> S‚āô = n/2 √ó (a‚āĀ + a‚āô) = n/2 √ó (2a‚āĀ + (n‚ąí1)d)
<br><br>To find d: subtract any term from the next: d = a‚āô‚āä‚āĀ ‚ąí a‚āô.
<div class="analogy">ūüí° You start at a salary of $40,000 and get a $2,000 raise every year. After 10 years: a‚āĀ‚āÄ = 40,000 + 9(2,000) = $58,000. That's an arithmetic sequence.</div>`,
  formula:{display:'a‚āô = a‚āĀ + (n‚ąí1)d | S‚āô = n/2(a‚āĀ+a‚āô)',caption:'d = common difference (can be negative for decreasing)'},
  examples:[
    {label:'Example 1',q:'Find the 20th term of: 5, 9, 13, 17...',steps:[
      {t:'Identify: a‚āĀ=5, d=4',d:''},
      {t:'Formula: a‚āā‚āÄ = 5 + (20‚ąí1)(4)',d:'= 5 + 76'},
      {t:'Result',d:'<span class="math answer">a‚āā‚āÄ = 81</span>'},
    ]},
    {label:'Example 2',q:'Sum of first 10 terms of 2, 5, 8, 11...',steps:[
      {t:'a‚āĀ=2, d=3, a‚āĀ‚āÄ=2+9(3)=29',d:''},
      {t:'S‚āĀ‚āÄ = 10/2 √ó (2+29)',d:'= 5 √ó 31'},
      {t:'Result',d:'<span class="math answer">S‚āĀ‚āÄ = 155</span>'},
    ]},
  ],
  tryit:{q:'What is the 15th term of ‚ąí3, 1, 5, 9...?',opts:['53','49','57','45'],ans:0,hint:'d=4, a‚āĀ=‚ąí3. Use a‚āô = a‚āĀ+(n‚ąí1)d with n=15.',feedback:'a‚āĀ‚āÖ=‚ąí3+(14)(4)=‚ąí3+56=53.'},
  mistakes:[
    {wrong:'Using n instead of (n‚ąí1) in the formula: a‚āĀ‚āÄ = a‚āĀ + 10d',right:'The formula is a‚āĀ + (n‚ąí1)d. For the 10th term: a‚āĀ + 9d. The first term has zero jumps.'},
    {wrong:'Confusing arithmetic (add d) with geometric (multiply r)',right:'Arithmetic: 2, 5, 8, 11 (add 3). Geometric: 2, 6, 18, 54 (multiply by 3). Different patterns.'},
  ],
  check:[
    {q:'a‚āĀ=100, d=‚ąí7. Find a‚āą.',opts:['51','149','44','57'],ans:0,fb:'100+(8‚ąí1)(‚ąí7)=100‚ąí49=51.'},
    {q:'Which is the sum formula for n terms?',opts:['n(a‚āĀ+a‚āô)','n/2(a‚āĀ+a‚āô)','a‚āĀ+a‚āô/n','(a‚āĀ+a‚āô)¬≤/n'],ans:1,fb:'S‚āô=n/2(a‚āĀ+a‚āô). The average of first and last, times n.'},
    {q:'In sequence 4, 7, 10, 13..., which term equals 31?',opts:['9th','10th','11th','8th'],ans:1,fb:'31=4+(n‚ąí1)(3). 27=3(n‚ąí1). n‚ąí1=9. n=10.'},
  ]
