  tryit:{q:'Can a triangle have sides 3, 4, and 8?',opts:['Yes','No — 3+4=7 < 8','No — not a right triangle','Yes, if it\'s obtuse'],ans:1,hint:'Check triangle inequality: each pair of sides must sum to more than the third.',feedback:'3+4=7 which is NOT greater than 8. Triangle inequality fails. Not a valid triangle.'},
  mistakes:[

  check:[

    {q:'Which congruence theorem applies: two triangles share a hypotenuse and one leg?',opts:['SSS','SAS','ASA','HL'],ans:3,fb:'HL (Hypotenuse-Leg) applies to right triangles when hypotenuse and one leg match.'},
    {q:'Exterior angle of a triangle equals:',opts:['The adjacent interior angle','The sum of the two non-adjacent interior angles','180° minus itself','90° always'],ans:1,fb:'Exterior angle theorem: exterior angle = sum of the two remote interior angles.'},

L('3-04',{

  concept:`<div class="big-idea">Similar triangles have equal corresponding angles and proportional corresponding sides.</div>

L('3-05',{
  tagline:"Area formulas let you measure the interior of any 2D shape. They all come from one idea: base times height.",
  concept:`<div class="big-idea">All area formulas derive from the rectangle formula: A = base × height.</div>
<strong>Key formulas:</strong>
<br>• Rectangle: A = l × w
<br>• Triangle: A = ½bh (half a rectangle)
<br>• Parallelogram: A = bh (same as rectangle — lean it over, area unchanged)
<br>• Trapezoid: A = ½(b₁+b₂)h (average of parallel bases times height)
<br>• Regular polygon: A = ½ × perimeter × apothem
<br><br><strong>Composite figures:</strong> break into simpler shapes, add (or subtract) their areas.
<br><br>⚠️ Height must be PERPENDICULAR to the base — not the slant side.
<div class="analogy">💡 A triangle is half a rectangle. Cut any rectangle diagonally — you get two identical triangles. So triangle area = ½ × base × height.</div>`,
  formula:{display:'Triangle: ½bh | Trapezoid: ½(b₁+b₂)h | Parallelogram: bh',caption:'Height is always perpendicular to the base'},
  examples:[
    {label:'Example 1',q:'Find the area of a trapezoid with parallel sides 8 and 14, height 5.',steps:[
      {t:'Formula: A = ½(b₁+b₂)h',d:''},
      {t:'Substitute',d:'A = ½(8+14)(5) = ½(22)(5)'},
      {t:'Result',d:'<span class="math answer">A = 55 square units</span>'},
    ]},
    {label:'Example 2',q:'A square with side 10 has a triangle cut from one corner (base 4, height 4). Find remaining area.',steps:[
      {t:'Square area: 10² = 100',d:''},
      {t:'Triangle area: ½(4)(4) = 8',d:''},
      {t:'Remaining: 100−8 = <span class="math answer">92 square units</span>',d:''},

  mistakes:[
    {wrong:'Using the slant side as height in a triangle',right:'Height must be perpendicular to the base. In a non-right triangle, drop a perpendicular from the apex to find the true height.'},

  check:[

    {q:'Trapezoid: b₁=6, b₂=10, h=4. Area=?',opts:['32','24','40','16'],ans:0,fb:'½(6+10)(4)=½(16)(4)=32.'},

L('3-06',{
  tagline:"Circles appear everywhere in nature and engineering. Two formulas — circumference and area — unlock all the basic calculations.",
  concept:`<div class="big-idea">A circle is defined by its radius r. Diameter d = 2r. Circumference C = 2πr. Area A = πr².</div>
<strong>π ≈ 3.14159...</strong> It's the ratio of circumference to diameter — always the same for any circle.
<br><br><strong>Arc length:</strong> a fraction of the circumference. Arc = (θ/360°) × 2πr, where θ is the central angle.
<br><strong>Sector area:</strong> a fraction of the full area. Sector = (θ/360°) × πr²
<br><br><strong>Radian measure:</strong> 360° = 2π radians. 1 radian ≈ 57.3°. Arc length = rθ (when θ in radians).
<div class="analogy">💡 π is not "approximately 22/7" — that's just an approximation. π is irrational and infinite. The reason C = 2πr is that if you unroll any circle's circumference, it's always exactly π diameters long.</div>`,
  formula:{display:'C = 2πr = πd | A = πr² | Arc = (θ/360°)·2πr',caption:'Area uses r². Circumference uses r (to the first power).'},
  examples:[
    {label:'Example 1',q:'Circle with radius 7. Find circumference and area.',steps:[
      {t:'Circumference: C = 2π(7)',d:'= 14π ≈ 43.98'},
      {t:'Area: A = π(7)²',d:'= 49π ≈ <span class="math answer">153.94</span>'},
    ]},
    {label:'Example 2',q:'Find arc length and sector area for r=6, central angle=90°.',steps:[
      {t:'Arc = (90/360)×2π(6) = (1/4)×12π',d:'= 3π'},
      {t:'Sector area = (90/360)×π(6)² = (1/4)×36π',d:'= 9π'},
      {t:'Result',d:'<span class="math answer">Arc=3π, Sector Area=9π</span>'},
    ]},
  ],
  tryit:{q:'A circle has diameter 10. What is its area?',opts:['10π','25π','100π','5π'],ans:1,hint:'Diameter=10, so radius=5. Area=πr².',feedback:'r=5. A=π(5)²=25π.'},
  mistakes:[
    {wrong:'Using diameter instead of radius in area formula',right:'Area = πr² uses the RADIUS. If you\'re given diameter, divide by 2 first.'},
    {wrong:'Confusing circumference (perimeter) with area',right:'Circumference is a length: 2πr. Area is square units: πr². Circumference measures the boundary; area measures the interior.'},
  ],
  check:[
    {q:'Circumference = 20π. What is the radius?',opts:['20','10','5','40'],ans:1,fb:'2πr=20π. r=10.'},
    {q:'Sector with r=4, angle=120°. Area = ?',opts:['(16π/3)','(4π/3)','8π/3','16π'],ans:0,fb:'(120/360)×π×16=(1/3)×16π=16π/3.'},
    {q:'Two circles with radii 3 and 6. Ratio of their areas?',opts:['1:2','1:4','1:3','2:6'],ans:1,fb:'Areas: 9π and 36π. Ratio: 1:4. (Area scales by radius squared.)'},

L('3-08',{

<br><br><strong>Lateral surface area:</strong> SA without the base(s). For a cylinder: LA = 2πrh.
<div class="analogy">💡 A cylinder's lateral surface: cut it and unroll it. You get a rectangle. Its width is the circumference 2πr. Its height is h. Area = 2πrh. Add the two circular ends: 2πr².</div>`,

L('3-09',{
  tagline:"Coordinate geometry connects algebra and geometry — any geometric shape can be described with equations, and equations can be visualized as shapes.",
  concept:`<div class="big-idea">Key coordinate geometry formulas: distance, midpoint, slope.</div>
<strong>Distance formula:</strong> d = √((x₂−x₁)² + (y₂−y₁)²) — from the Pythagorean theorem.
<br><strong>Midpoint formula:</strong> M = ((x₁+x₂)/2, (y₁+y₂)/2) — average the coordinates.
<br><strong>Slope:</strong> m = (y₂−y₁)/(x₂−x₁) = rise/run
<br><br><strong>Parallel lines:</strong> same slope (m₁ = m₂)
<br><strong>Perpendicular lines:</strong> slopes are negative reciprocals (m₁ × m₂ = −1)
<br><br><strong>Equation of a circle:</strong> (x−h)² + (y−k)² = r², center (h,k), radius r.
<div class="analogy">💡 Distance formula is just the Pythagorean theorem in disguise. The horizontal distance is (x₂−x₁) and vertical is (y₂−y₁). The straight-line distance between the points is the hypotenuse.</div>`,
  formula:{display:'d=√((x₂−x₁)²+(y₂−y₁)²) | M=((x₁+x₂)/2,(y₁+y₂)/2)',caption:'Perpendicular slopes: m₁×m₂=−1'},
  examples:[
    {label:'Example 1',q:'Find distance and midpoint between (1,3) and (7,11).',steps:[
      {t:'Distance: d=√((7−1)²+(11−3)²)',d:'=√(36+64)=√100'},
      {t:'d = 10',d:''},
      {t:'Midpoint: ((1+7)/2, (3+11)/2)',d:'<span class="math answer">= (4, 7)</span>'},
    ]},
    {label:'Example 2',q:'A line has slope 3/4. What is the slope of a perpendicular line?',steps:[
      {t:'Negative reciprocal of 3/4',d:'flip: 4/3. Negate: −4/3'},
      {t:'Result',d:'<span class="math answer">slope = −4/3</span>'},
    ]},
  ],
  tryit:{q:'What is the midpoint of (−2, 6) and (8, −2)?',opts:['(3,2)','(6,4)','(5,2)','(3,4)'],ans:0,hint:'Average the x-coordinates and average the y-coordinates.',feedback:'((−2+8)/2, (6+(−2))/2) = (3, 2).'},
  mistakes:[
    {wrong:'Forgetting to square the differences in the distance formula: d = |(x₂−x₁)| + |(y₂−y₁)|',right:'That\'s the "taxicab distance." The Euclidean distance is √((Δx)² + (Δy)²).'},
    {wrong:'Parallel lines have opposite slopes, perpendicular lines have equal slopes',right:'It\'s the other way: parallel = same slope. Perpendicular = negative reciprocals.'},
  ],
  check:[
    {q:'Distance between (0,0) and (5,12) = ?',opts:['13','17','7','169'],ans:0,fb:'√(25+144)=√169=13.'},
    {q:'A circle has center (2,−3), radius 5. Its equation is:',opts:['(x−2)²+(y+3)²=5','(x+2)²+(y−3)²=25','(x−2)²+(y+3)²=25','(x+2)²+(y+3)²=25'],ans:2,fb:'(x−h)²+(y−k)²=r². Center (2,−3): (x−2)²+(y−(−3))²=25 → (x−2)²+(y+3)²=25.'},
    {q:'Lines y=2x+1 and y=−(1/2)x+3 are:',opts:['Parallel','Perpendicular','Neither','The same line'],ans:1,fb:'Slopes: 2 and −1/2. Product: 2×(−1/2)=−1. Perpendicular.'},
  ]
});

L('3-10',{
  tagline:"Transformations are the language of symmetry, animation, and design. They describe how shapes move, flip, turn, and resize without changing what they fundamentally are.",
  concept:`<div class="big-idea">The four rigid transformations: Translation (slide), Reflection (flip), Rotation (turn), Dilation (resize).</div>
<strong>Translation:</strong> shift every point by (a, b). (x, y) → (x+a, y+b)
<br><strong>Reflection:</strong>
<br>• Over x-axis: (x, y) → (x, −y)
<br>• Over y-axis: (x, y) → (−x, y)
<br>• Over y=x: (x, y) → (y, x)
<br><strong>Rotation about origin:</strong>
<br>• 90° counterclockwise: (x, y) → (−y, x)
<br>• 180°: (x, y) → (−x, −y)
<br>• 270° (or 90° clockwise): (x, y) → (y, −x)
<br><strong>Dilation:</strong> (x, y) → (kx, ky) by scale factor k. Preserves shape, changes size.
<div class="analogy">💡 Translation is moving your house. Reflection is looking in a mirror. Rotation is spinning. Dilation is zooming in on a photo. Translations, reflections, and rotations preserve size and shape (rigid). Dilations change size.</div>`,
  formula:{display:'Rotation 90° CCW: (x,y)→(−y,x) | Reflection over y-axis: (x,y)→(−x,y)',caption:'Rigid transformations preserve distance and angle'},
  examples:[
    {label:'Example 1',q:'Translate point (3, −1) by (−4, 2).',steps:[
      {t:'Add: (3+(−4), −1+2)',d:'<span class="math answer">= (−1, 1)</span>'},
    ]},
    {label:'Example 2',q:'Rotate (4, 2) by 90° counterclockwise about origin.',steps:[
      {t:'(x, y) → (−y, x)',d:'(4, 2) → (−2, 4)'},
      {t:'Result',d:'<span class="math answer">(−2, 4)</span>'},
    ]},
  ],
  tryit:{q:'Reflect (5, −3) over the x-axis.',opts:['(−5,−3)','(5,3)','(−5,3)','(3,5)'],ans:1,hint:'Reflection over x-axis negates the y-coordinate.',feedback:'(x, y) → (x, −y). (5, −3) → (5, 3).'},
  mistakes:[
    {wrong:'Reflecting over x-axis by negating x instead of y',right:'Reflect over x-axis → negate y. Reflect over y-axis → negate x.'},
    {wrong:'Confusing clockwise and counterclockwise rotation formulas',right:'90° CCW: (x,y)→(−y,x). 90° CW: (x,y)→(y,−x). Counterclockwise is the standard positive direction.'},
  ],
  check:[
    {q:'What is (−2, 5) after 180° rotation about origin?',opts:['(2,−5)','(−5,2)','(2,5)','(5,−2)'],ans:0,fb:'180° rotation: (x,y)→(−x,−y). (−2,5)→(2,−5).'},
    {q:'Dilation of (3,4) with scale factor k=2, center at origin gives:',opts:['(6,8)','(5,6)','(1.5,2)','(9,16)'],ans:0,fb:'(kx,ky)=(2×3, 2×4)=(6,8).'},
    {q:'Which transformation changes a shape\'s size?',opts:['Translation','Reflection','Rotation','Dilation'],ans:3,fb:'Only dilation (scaling) changes the size. The others are rigid transformations.'},
  ]
});

L('3-11',{
  tagline:"The Law of Sines extends trigonometry beyond right triangles. If you know a side and its opposite angle, you can find everything else.",
  concept:`<div class="big-idea">Law of Sines: a/sin(A) = b/sin(B) = c/sin(C) — where a is the side opposite angle A.</div>
Use when you have:
<br>• AAS: two angles and one side
<br>• ASA: two angles and the included side
<br>• SSA: two sides and an opposite angle (the ambiguous case — may give 0, 1, or 2 solutions)
<br><br><strong>The ambiguous case (SSA):</strong> given a, b, and angle A, there might be two triangles, one, or none.
<br>• If a < b·sin(A): no solution
<br>• If a = b·sin(A): one right triangle
<br>• If a > b: one solution
<br>• If b·sin(A) < a < b: two possible triangles
<div class="analogy">💡 a/sin(A) is a constant for any triangle — it equals the diameter of the circumscribed circle. Once you know any side-angle pair, you can find any other side given its opposite angle.</div>`,
  formula:{display:'a/sin(A) = b/sin(B) = c/sin(C)',caption:'Cross-multiply to solve for unknown sides or angles'},
  examples:[
    {label:'Example 1',q:'In △ABC: A=40°, B=75°, a=10. Find b.',steps:[
      {t:'C = 180−40−75 = 65°',d:''},
      {t:'Law of Sines: 10/sin(40°) = b/sin(75°)',d:''},
      {t:'b = 10×sin(75°)/sin(40°)',d:'≈ 10×0.966/0.643 ≈ <span class="math answer">15.02</span>'},
    ]},
  ],
  tryit:{q:'In a triangle, a=7, A=30°, B=60°. Find b.',opts:['7√3≈12.12','14','7','3.5'],ans:0,hint:'7/sin(30°) = b/sin(60°). sin(30°)=0.5, sin(60°)=√3/2.',feedback:'b=7×sin(60°)/sin(30°)=7×(√3/2)/(1/2)=7√3≈12.12.'},
  mistakes:[
    {wrong:'Putting the angle in the numerator: sin(A)/a instead of a/sin(A)',right:'The formula is a/sin(A) = b/sin(B). The side goes in the numerator. The sine of its opposite angle in the denominator.'},
    {wrong:'Ignoring the ambiguous case when given SSA',right:'With SSA, always check if there are two possible triangles. Solve for the angle, then check if π minus that angle also works.'},
  ],
  check:[
    {q:'In △ABC: A=50°, B=70°, b=15. What is a?',opts:['a≈12.2','a≈8.9','a≈19.6','a≈15'],ans:0,fb:'a/sin(50°)=15/sin(70°). a=15×sin(50°)/sin(70°)≈15×0.766/0.940≈12.2.'},
    {q:'Can the Law of Sines be used if you only know three sides (SSS)?',opts:['Yes','No — use Law of Cosines','Only if one is a right triangle','Yes, for finding angles'],ans:1,fb:'With SSS, use Law of Cosines to find an angle first, then Law of Sines if needed.'},
    {q:'a/sin(A) = b/sin(B) means:',opts:['a=b and A=B','The ratio of each side to its opposite angle\'s sine is constant','sin(A)=a always','A+a=B+b'],ans:1,fb:'The ratio side/sin(opposite angle) is constant throughout any triangle.'},
  ]
});

L('3-12',{
  tagline:"The Law of Cosines is the Pythagorean theorem's big sibling — it works for ANY triangle, not just right triangles.",
  concept:`<div class="big-idea">Law of Cosines: c² = a² + b² − 2ab·cos(C). For a right triangle (C=90°), cos(90°)=0 and it reduces to the Pythagorean theorem.</div>
Use when you have:
<br>• SAS: two sides and the included angle
<br>• SSS: all three sides (to find an angle)
<br><br><strong>Finding an angle from SSS:</strong>
<br>cos(C) = (a² + b² − c²) / (2ab)
<br>C = arccos(...) — use inverse cosine
<br><br>Law of Cosines is preferred over Law of Sines when SSA would create ambiguity.
<div class="analogy">💡 c² = a² + b² − 2ab·cos(C): the extra term −2ab·cos(C) corrects for the fact that the triangle isn\'t a right triangle. When C=90°, cosine=0 and the correction disappears, leaving the Pythagorean theorem.</div>`,
  formula:{display:'c²=a²+b²−2ab·cos(C) | cos(C)=(a²+b²−c²)/(2ab)',caption:'SAS: find the third side. SSS: find an angle.'},
  examples:[
    {label:'Example 1',q:'Two sides 8 and 11, included angle 60°. Find the third side.',steps:[
      {t:'c² = 8² + 11² − 2(8)(11)cos(60°)',d:'= 64+121−176(0.5)'},
      {t:'= 185 − 88 = 97',d:''},
      {t:'c = √97',d:'<span class="math answer">≈ 9.85</span>'},
    ]},
  ],
  tryit:{q:'Triangle sides: 5, 7, 8. Find the angle opposite the side of length 8.',opts:['82.8°','97.2°','60°','75°'],ans:0,hint:'cos(C) = (5²+7²−8²)/(2×5×7).',feedback:'cos(C)=(25+49−64)/70=10/70=1/7. C=arccos(1/7)≈82.8°.'},
  mistakes:[
    {wrong:'Forgetting the 2ab term: c²=a²+b²−cos(C)',right:'Full formula: c²=a²+b²−2ab·cos(C). The 2ab is essential — don\'t drop it.'},
    {wrong:'Using Law of Cosines when Law of Sines is simpler',right:'Law of Sines is simpler for AAS/ASA. Use Cosines for SAS and SSS, or when you need to avoid the ambiguous case.'},
  ],
  check:[
    {q:'Sides 6, 8, angle between them 90°. Third side = ?',opts:['10','14','√(28)','√(100)'],ans:0,fb:'c²=36+64−2(6)(8)cos(90°)=100−0=100. c=10. (Pythagorean triple!)'},
    {q:'SSS: a=3, b=4, c=6. What is the largest angle?',opts:['Opposite c (≈117.3°)','Opposite b','Opposite a','All angles equal'],ans:0,fb:'Largest side=c=6. cos(C)=(9+16−36)/24=−11/24≈−0.458. C≈117.3°.'},
    {q:'Law of Cosines requires what minimum information?',opts:['SSS or SAS','Any two angles','One side and any angle','SSA only'],ans:0,fb:'Law of Cosines needs SSS (find angle) or SAS (find third side).'},
  ]
});

L('3-13',{
  tagline:"A proof is a logical argument that establishes a statement as absolutely true — not probably true, not usually true, but always and necessarily true. That's a remarkable thing.",
  concept:`<div class="big-idea">A geometric proof starts with given information and uses definitions, postulates, and theorems to reach a conclusion through logical steps.</div>
<strong>Types of proofs:</strong>
<br>• Two-column proof: statements on left, reasons on right
<br>• Paragraph proof: written as logical argument
<br>• Flow proof: arrows show logical connections
<br><br><strong>Common reasons used:</strong>
<br>• Given (stated in the problem)
<br>• Definition (of midpoint, bisector, etc.)
<br>• Properties (reflexive, symmetric, transitive)
<br>• Theorems (vertical angles, corresponding angles, etc.)
<br>• Congruence criteria (SSS, SAS, ASA, AAS)
<br><br><strong>The Reflexive Property:</strong> anything equals itself. AB = AB. This is used more than you'd think.
<div class="analogy">💡 A proof is like a courtroom argument — you need evidence (given information), legal reasoning (theorems), and each step must follow logically from the last. You can\'t just assert a conclusion; you must justify it.</div>`,
  formula:{display:'Statement | Reason (two-column format)',caption:'Every statement must be justified by a reason'},
  examples:[
    {label:'Example 1',q:'Prove: If AB bisects ∠CAD, then ∠CAB = ∠DAB.',steps:[
      {t:'Statement: AB bisects ∠CAD',d:'Reason: Given'},
      {t:'∠CAB = ∠DAB',d:'Reason: Definition of angle bisector (a bisector divides an angle into two equal parts)'},
    ]},
  ],
  tryit:{q:'What reason justifies: "∠1 = ∠3 because they are vertical angles formed by two intersecting lines"?',opts:['Given','Vertical Angles Theorem','Definition of supplementary','Reflexive Property'],ans:1,hint:'There\'s a theorem specifically about vertical angles.',feedback:'Vertical Angles Theorem: vertical angles formed by two intersecting lines are congruent.'},
  mistakes:[
    {wrong:'Writing "obvious" or "clearly" as a reason',right:'Every step needs a specific, named reason: theorem, definition, postulate, or given. "Obvious" is not a reason.'},
    {wrong:'Skipping steps to get to the conclusion faster',right:'Each step must follow from the previous one. A judge (your teacher) must be able to verify every link.'},
  ],
  check:[
    {q:'What property justifies: AC = AC?',opts:['Given','Transitive Property','Reflexive Property','Symmetric Property'],ans:2,fb:'Reflexive Property: any segment or angle equals itself.'},
    {q:'If AB = CD and CD = EF, what property gives AB = EF?',opts:['Reflexive','Symmetric','Transitive','Addition'],ans:2,fb:'Transitive Property: if a=b and b=c, then a=c.'},
    {q:'In a two-column proof, the right column contains:',opts:['Diagrams','Reasons for each statement','The conclusion only','Given information'],ans:1,fb:'Left column: statements. Right column: reasons (theorems, definitions, given, postulates).'},
  ]
});

L('4-02',{
  tagline:"The six trig functions and their graphs show up in physics, music, engineering, and medicine. Understanding their shapes is understanding wave behavior.",
  concept:`<div class="big-idea">Six trig functions: sin, cos, tan, csc, sec, cot. Their graphs are waves — periodic, predictable, and beautiful.</div>
<strong>Graphs of y = A·sin(Bx + C) + D:</strong>
<br>• Amplitude: |A| (height from center to peak)
<br>• Period: 2π/|B| (length of one full cycle)
<br>• Phase shift: −C/B (horizontal shift)
<br>• Vertical shift: D
<br><br><strong>Key values for sin:</strong> sin(0)=0, sin(π/2)=1, sin(π)=0, sin(3π/2)=−1
<br><strong>Key values for cos:</strong> cos(0)=1, cos(π/2)=0, cos(π)=−1, cos(3π/2)=0
<br><br>tan = sin/cos. tan has vertical asymptotes where cos=0 (at π/2, 3π/2...).
<div class="analogy">💡 A sound wave has a frequency (how many cycles per second) and amplitude (loudness). Those are B and A in the sine function. Music is just applied trig.</div>`,
  formula:{display:'y=A·sin(Bx+C)+D: amplitude=|A|, period=2π/B',caption:'Phase shift = −C/B | Vertical shift = D'},
  examples:[
    {label:'Example 1',q:'y = 3sin(2x − π/2) + 1. Find amplitude, period, phase shift, and vertical shift.',steps:[

  tryit:{q:'y = 4cos(x). What is the amplitude and period?',opts:['A=4, T=2π','A=4, T=π','A=1, T=8π','A=2, T=4π'],ans:0,hint:'B=1 here, so period=2π/1.',feedback:'Amplitude=|4|=4. Period=2π/1=2π.'},
  mistakes:[
    {wrong:'Period = B instead of 2π/B',right:'Period = 2π/B. If B=2, the graph completes a cycle in π, not 2.'},
    {wrong:'Confusing amplitude with vertical shift',right:'Amplitude is the distance from the midline to the peak. Vertical shift moves the midline. They\'re different things.'},
  ],
  check:[
    {q:'y=sin(x/2). Period = ?',opts:['π','4π','2π','π/2'],ans:1,fb:'B=1/2. Period=2π/(1/2)=4π.'},
    {q:'y=−2sin(x). What does the negative sign do?',opts:['Shifts down','Makes period negative','Reflects over x-axis (inverts)','Halves amplitude'],ans:2,fb:'Negative amplitude reflects (flips) the graph over the x-axis. Amplitude is still 2.'},
    {q:'tan(x) has vertical asymptotes at:',opts:['x=nπ','x=π/2+nπ','x=2nπ','x=nπ/2'],ans:1,fb:'tan=sin/cos. Asymptotes where cos(x)=0: x=π/2, 3π/2, 5π/2... = π/2+nπ.'},

L('4-03',{

  concept:`<div class="big-idea">arcsin(x) = sin⁻¹(x) gives the angle whose sine is x. Domain: [−1,1]. Range: [−π/2, π/2].</div>
<strong>The three main inverse functions:</strong>
<br>• sin⁻¹(x): domain [−1,1], range [−π/2, π/2]
<br>• cos⁻¹(x): domain [−1,1], range [0, π]
<br>• tan⁻¹(x): domain all reals, range (−π/2, π/2)
<br><br>Domains are restricted so each inverse is actually a function (one input → one output).
<br><br><strong>Key values:</strong>
<br>sin⁻¹(1/2) = π/6 = 30° | cos⁻¹(0) = π/2 = 90° | tan⁻¹(1) = π/4 = 45°
<div class="analogy">💡 sin(30°)=0.5. So sin⁻¹(0.5)=30°. You\'re asking: "what angle has this trig ratio?" The inverse function answers that question — but only within its restricted range.</div>`,
  formula:{display:'sin⁻¹(sin(x))=x for x∈[−π/2,π/2] | cos⁻¹(cos(x))=x for x∈[0,π]',caption:'Inverse functions undo each other within the restricted domain'},
  examples:[

    {label:'Example 2',q:'Find: cos⁻¹(−1/2)',steps:[

  tryit:{q:'sin⁻¹(−1) = ?',opts:['π/2','−π/2','π','−π'],ans:1,hint:'What angle (in [−π/2, π/2]) has sine equal to −1?',feedback:'sin(−π/2)=−1. The range of sin⁻¹ is [−π/2,π/2], so answer is −π/2.'},
  mistakes:[
    {wrong:'sin⁻¹(x) = 1/sin(x)',right:'sin⁻¹ is the inverse function, NOT the reciprocal. 1/sin(x) is csc(x). sin⁻¹(x) is arcsin(x).'},
    {wrong:'Giving multiple answers for sin⁻¹: "sin⁻¹(0.5) = 30° or 150°"',right:'The inverse function gives only ONE value — within its restricted range. sin⁻¹(0.5) = 30° only. The 150° is not in [−90°, 90°].'},

  check:[
    {q:'tan⁻¹(√3) = ?',opts:['π/3','π/6','π/4','2π/3'],ans:0,fb:'tan(π/3)=√3. π/3 is in (−π/2,π/2). Answer: π/3.'},
    {q:'cos(cos⁻¹(0.7)) = ?',opts:['0.7','cos(0.7)','Undefined','0.3'],ans:0,fb:'They cancel: cos(cos⁻¹(x))=x for x∈[−1,1]. Answer: 0.7.'},
    {q:'Range of sin⁻¹(x) is:',opts:['[0,π]','(−π/2,π/2)','[−π/2,π/2]','[−1,1]'],ans:2,fb:'Range of sin⁻¹ is [−π/2, π/2], inclusive (closed bracket). Domain of sin⁻¹ is [−1,1].'},
  ]
});

L('4-04',{
  tagline:"Trig identities are equations that are true for ALL angle values. They're the algebra of trigonometry — tools for simplification and proof.",
  concept:`<div class="big-idea">Key identity: sin²(x) + cos²(x) = 1. This is the Pythagorean identity — it comes directly from the unit circle.</div>
<strong>Pythagorean identities:</strong>
<br>• sin²x + cos²x = 1
<br>• 1 + tan²x = sec²x (divide the first by cos²x)
<br>• 1 + cot²x = csc²x (divide the first by sin²x)
<br><br><strong>Reciprocal identities:</strong>
<br>• csc = 1/sin | sec = 1/cos | cot = 1/tan
<br><br><strong>Quotient identities:</strong>
<br>• tan = sin/cos | cot = cos/sin
<br><br><strong>Even/Odd identities:</strong>
<br>• sin(−x) = −sin(x) (odd) | cos(−x) = cos(x) (even)
<div class="analogy">💡 sin²x + cos²x = 1 comes from x²+y²=1 (unit circle equation) with x=cos and y=sin. Every Pythagorean identity is just a rearrangement of this single circle equation.</div>`,
  formula:{display:'sin²x+cos²x=1 | 1+tan²x=sec²x | 1+cot²x=csc²x',caption:'All Pythagorean identities come from sin²+cos²=1'},
  examples:[
    {label:'Example 1',q:'Simplify: (1 − sin²x)/cos(x)',steps:[
      {t:'1 − sin²x = cos²x (from Pythagorean identity)',d:''},
      {t:'cos²x/cos(x)',d:'= cos(x)'},
      {t:'Result',d:'<span class="math answer">cos(x)</span>'},
    ]},
    {label:'Example 2',q:'Verify: tan²x + 1 = sec²x',steps:[
      {t:'Start with sin²x + cos²x = 1',d:'Divide both sides by cos²x'},
      {t:'sin²x/cos²x + 1 = 1/cos²x',d:''},
      {t:'tan²x + 1 = sec²x ✓',d:'<span class="math answer">Verified</span>'},
    ]},
  ],
  tryit:{q:'Which equals sin²x if cos²x = 0.36?',opts:['0.64','0.36','0.6','1.36'],ans:0,hint:'sin²x + cos²x = 1. So sin²x = 1 − cos²x.',feedback:'sin²x = 1 − 0.36 = 0.64.'},
  mistakes:[
    {wrong:'sin²x + cos²x = 2',right:'Always equals 1 — exactly. This is one of the most important facts in trig.'},
    {wrong:'Confusing sin²x with sin(x²)',right:'sin²x means (sin(x))². sin(x²) means sin applied to x². They are completely different.'},
  ],
  check:[
    {q:'Simplify: sin(x)·sec(x)',opts:['1','tan(x)','cos(x)','cot(x)'],ans:1,fb:'sec(x)=1/cos(x). sin(x)/cos(x)=tan(x).'},
    {q:'If tan(x) = 3/4, and x is in Q1, find sec(x).',opts:['5/4','4/5','5/3','4/3'],ans:0,fb:'1+tan²=sec². 1+9/16=sec². 25/16=sec². sec=5/4.'},
    {q:'cos(−x) = ?',opts:['−cos(x)','cos(x)','−sin(x)','sin(x)'],ans:1,fb:'Cosine is an even function: cos(−x)=cos(x).'},
  ]
});

L('4-05',{
  tagline:"Sum and difference formulas let you find exact trig values for angles like 75° or 15° by combining known angles. They're also used in calculus.",
  concept:`<div class="big-idea">sin(A±B) = sin(A)cos(B) ± cos(A)sin(B). Note: it's NOT sin(A±B) = sin(A) ± sin(B).</div>
<strong>All four formulas:</strong>
<br>• sin(A+B) = sinA·cosB + cosA·sinB
<br>• sin(A−B) = sinA·cosB − cosA·sinB
<br>• cos(A+B) = cosA·cosB − sinA·sinB
<br>• cos(A−B) = cosA·cosB + sinA·sinB
<br>• tan(A+B) = (tanA + tanB)/(1 − tanA·tanB)
<br><br><strong>Use:</strong> find exact values for 15°=45°−30°, 75°=45°+30°, etc.
<div class="analogy">💡 sin(A+B) ≠ sin(A)+sin(B). If it did: sin(90°)=sin(45°)+sin(45°)=√2/2+√2/2=√2≈1.41. But sin(90°)=1. The formulas involve cross terms — just like (a+b)²=a²+2ab+b² isn\'t a²+b².</div>`,
  formula:{display:'cos(A−B)=cosA·cosB+sinA·sinB',caption:'The minus in cos(A+B) and plus in cos(A−B) — tricky! Don\'t confuse.'},
  examples:[
    {label:'Example 1',q:'Find the exact value of cos(75°).',steps:[
      {t:'75° = 45° + 30°',d:''},
      {t:'cos(45°+30°) = cos45°cos30° − sin45°sin30°',d:''},
      {t:'= (√2/2)(√3/2) − (√2/2)(1/2)',d:'= √6/4 − √2/4'},
      {t:'Result',d:'<span class="math answer">(√6−√2)/4</span>'},
    ]},
  ],
  tryit:{q:'sin(A+B) = sinA·cosB ___ cosA·sinB',opts:['−','×','+','÷'],ans:2,hint:'The sum formula for sine: what connects the two terms?',feedback:'sin(A+B) = sinA·cosB + cosA·sinB. Note: the + carries through.'},
  mistakes:[
    {wrong:'sin(A+B) = sin(A) + sin(B)',right:'This is one of the most common errors in trig. NEVER distribute trig functions over addition.'},
    {wrong:'cos(A+B) = cosA·cosB + sinA·sinB (forgetting the minus)',right:'cos(A+B) = cosA·cosB MINUS sinA·sinB. The cos sum formula has a minus, the difference formula has a plus.'},
  ],
  check:[
    {q:'sin(15°) = sin(45°−30°) = ?',opts:['(√6−√2)/4','(√6+√2)/4','(√2−√6)/4','1/4'],ans:0,fb:'sin(45°)cos(30°)−cos(45°)sin(30°)=(√2/2)(√3/2)−(√2/2)(1/2)=√6/4−√2/4=(√6−√2)/4.'},
    {q:'cos(A+B) has which sign between terms?',opts:['Plus','Minus','Neither — it\'s a product','Depends on A and B'],ans:1,fb:'cos(A+B)=cosA·cosB − sinA·sinB. The sign is always minus.'},
    {q:'tan(A+B) = ?',opts:['tanA+tanB','(tanA+tanB)/(1−tanA·tanB)','(tanA−tanB)/(1+tanA·tanB)','tanA·tanB+1'],ans:1,fb:'tan(A+B)=(tanA+tanB)/(1−tanA·tanB). Memorize this one — it\'s used in calculus too.'},
  ]
});

L('4-06',{
  tagline:"Double and half angle formulas are derived from the sum formulas. They're shortcuts for specific but common angles — and appear constantly in calculus.",
  concept:`<div class="big-idea">Double angle: sin(2A)=2sinA·cosA | cos(2A)=cos²A−sin²A (three equivalent forms!)</div>
<strong>Double angle formulas:</strong>
<br>• sin(2A) = 2·sin(A)·cos(A)
<br>• cos(2A) = cos²A − sin²A = 1 − 2sin²A = 2cos²A − 1
<br>• tan(2A) = 2tan(A)/(1 − tan²A)
<br><br><strong>Half angle formulas:</strong>
<br>• sin(A/2) = ±√((1−cosA)/2)
<br>• cos(A/2) = ±√((1+cosA)/2)
<br>(± depends on which quadrant A/2 is in)
<br><br>The three forms of cos(2A) come from substituting sin²=1−cos² or cos²=1−sin².
<div class="analogy">💡 sin(2A) = 2sinA·cosA comes from the sum formula: sin(A+A) = sinA·cosA + cosA·sinA = 2sinA·cosA. Double angle is just the sum formula applied to equal angles.</div>`,
  formula:{display:'sin(2A)=2sinA·cosA | cos(2A)=cos²A−sin²A',caption:'Three forms of cos(2A) — useful in different contexts'},
  examples:[
    {label:'Example 1',q:'sin(A)=3/5, A is in Q1. Find sin(2A) and cos(2A).',steps:[
      {t:'Find cosA: cos²A=1−9/25=16/25 → cosA=4/5 (Q1)',d:''},
      {t:'sin(2A)=2(3/5)(4/5)',d:'= 24/25'},
      {t:'cos(2A)=cos²A−sin²A=(16−9)/25',d:'<span class="math answer">= 7/25</span>'},
    ]},
  ],
  tryit:{q:'cos(2A) when sinA=1/2 (A in Q1):',opts:['1/2','√3/2','1/4','1/2'],ans:1,hint:'Use cos(2A)=1−2sin²A.',feedback:'cos(2A)=1−2(1/4)=1−1/2=1/2. Wait — that\'s 1/2, which is choice A. cos(60°)=1/2. If sinA=1/2, A=30°, 2A=60°, cos(60°)=1/2. Answer: 1/2.'},
  mistakes:[
    {wrong:'sin(2A) = 2·sin(A)',right:'sin(2A) = 2·sin(A)·cos(A). You can\'t just double the sin — the cosA factor is essential.'},
    {wrong:'Using the wrong form of cos(2A)',right:'All three forms are equal: cos²A−sin²A = 1−2sin²A = 2cos²A−1. Choose whichever is most convenient for your given information.'},
  ],
  check:[
    {q:'sinA=√3/2, A=60°. Find sin(120°) using double angle.',opts:['√3/2','1/2','√3','1'],ans:0,fb:'sin(120°)=sin(2×60°)=2sin(60°)cos(60°)=2(√3/2)(1/2)=√3/2.'},
    {q:'cos(2A)=1−2sin²A is equivalent to which other form?',opts:['2cos²A−1','cos²A−sin²A','Both A and B','Neither'],ans:2,fb:'All three: cos²A−sin²A = 1−2sin²A = 2cos²A−1 are all equal.'},
    {q:'If cos(2A)=1, what is sin(A)?',opts:['1','0','±1','-1'],ans:1,fb:'cos(2A)=1. 1−2sin²A=1. −2sin²A=0. sin²A=0. sinA=0.'},
  ]
});

L('4-07',{
  tagline:"Solving trig equations means finding all angle values that satisfy the equation. The key is knowing where each function is positive, negative, and what its period is.",
  concept:`<div class="big-idea">Find all solutions to a trig equation by: isolate the trig function → find reference angle → identify all quadrants → use periodicity.</div>
<strong>Steps:</strong>
<br>1. Isolate the trig function (like solving a regular equation)
<br>2. Find the reference angle (inverse trig of the absolute value)
<br>3. Determine which quadrants give the correct sign
<br>4. Write all solutions using period
<br><br>Period of sin/cos = 2π → add 2πk for full solution set
<br>Period of tan = π → add πk
<br><br>For equations like sin(2x) = 0.5, solve for 2x first, then divide by 2.
<div class="analogy">💡 sin(x)=0.5 has infinitely many solutions — every time the sine wave reaches height 0.5. That happens in Q1 (π/6) and Q2 (5π/6) every 2π. The ±2πk captures all of them.</div>`,
  formula:{display:'sin(x)=c → x=sin⁻¹(c)+2πk or x=(π−sin⁻¹(c))+2πk',caption:'Always check all quadrants, then add full periods'},
  examples:[
    {label:'Example 1',q:'Solve: 2sin(x) = 1 for 0 ≤ x < 2π',steps:[
      {t:'sin(x) = 1/2',d:''},
      {t:'Reference angle: sin⁻¹(1/2) = π/6',d:''},
      {t:'sin > 0 in Q1 and Q2',d:'x = π/6 and x = π − π/6 = 5π/6'},
      {t:'Both in [0, 2π)',d:'<span class="math answer">x = π/6, 5π/6</span>'},
    ]},
  ],
  tryit:{q:'Solve: tan(x) = 1 for 0 ≤ x < 2π',opts:['x=π/4 only','x=π/4 and 5π/4','x=π/4 and 3π/4','x=π/4 and 7π/4'],ans:1,hint:'tan=1 in Q1 (π/4). tan has period π — next solution is π/4+π.',feedback:'tan(π/4)=1. Next solution: π/4+π=5π/4. Both in [0,2π). Answer: π/4 and 5π/4.'},
  mistakes:[
    {wrong:'Only giving one solution for a trig equation',right:'Trig equations almost always have infinitely many (or at least two) solutions. Always ask: what other quadrants work?'},
    {wrong:'Adding 2πk for tan equations',right:'Tan has period π, not 2π. General solution for tan: x=ref+πk.'},
  ],
  check:[
    {q:'Solve: cos(x)=−√3/2 for 0≤x<2π',opts:['5π/6 and 7π/6','π/6 and 11π/6','2π/3 and 4π/3','π/3 and 2π/3'],ans:0,fb:'cos=−√3/2 in Q2 and Q3. Reference angle: cos⁻¹(√3/2)=π/6. Q2: π−π/6=5π/6. Q3: π+π/6=7π/6.'},
    {q:'Solve: 2cos²x−1=0 for 0≤x<2π',opts:['π/4,3π/4,5π/4,7π/4','π/3,2π/3','π/4,7π/4','π/2,3π/2'],ans:0,fb:'cos²x=1/2. cos(x)=±1/√2=±√2/2. cos=+√2/2: x=π/4,7π/4. cos=−√2/2: x=3π/4,5π/4.'},
    {q:'How many solutions does sin(x)=2 have?',opts:['2','Infinitely many','1','0'],ans:3,fb:'sin(x) is always between −1 and 1. sin(x)=2 has no solution.'},
  ]
});

L('4-08',{
  tagline:"A limit describes what a function approaches — not what it equals. This distinction is subtle but it's the foundation all of calculus is built on.",
  concept:`<div class="big-idea">lim_{x→a} f(x) = L means: as x gets close to a (without equaling a), f(x) gets close to L.</div>
The limit doesn't care what f(a) actually equals — only what f(x) approaches as x approaches a.
<br><br><strong>Left and right limits:</strong>
<br>lim_{x→a⁻} f(x): approaching from the left
<br>lim_{x→a⁺} f(x): approaching from the right
<br>The two-sided limit exists only if both one-sided limits are equal and finite.
<br><br><strong>When do limits fail to exist?</strong>
<br>• Left ≠ right limit
<br>• Function oscillates infinitely fast (like sin(1/x) at 0)
<br>• Function goes to ±∞
<div class="analogy">💡 You\'re walking toward a cliff edge, looking at the ground. A limit asks: where does the ground seem to be heading as you approach? Even if there\'s a crater right at the edge (f undefined there), you can still see where the ground was heading.</div>`,
  formula:{display:'If lim_{x→a⁻}f(x)=lim_{x→a⁺}f(x)=L, then lim_{x→a}f(x)=L',caption:'Both one-sided limits must match for the two-sided limit to exist'},
  examples:[
    {label:'Example 1',q:'lim_{x→2} (x²−4)/(x−2)',steps:[
      {t:'Direct substitution gives 0/0 (indeterminate)',d:'Factor first'},
      {t:'(x+2)(x−2)/(x−2) = x+2 (for x≠2)',d:''},
      {t:'Limit = lim_{x→2}(x+2) = 4',d:'<span class="math answer">= 4</span>'},
    ]},
    {label:'Example 2',q:'lim_{x→0} |x|/x',steps:[
      {t:'From right (x>0): |x|/x = x/x = 1',d:''},
      {t:'From left (x<0): |x|/x = −x/x = −1',d:''},
      {t:'Left ≠ right',d:'<span class="math answer">Limit DNE</span>'},
    ]},
  ],
  tryit:{q:'lim_{x→3} (x²−9)/(x−3) = ?',opts:['0','6','3','DNE'],ans:1,hint:'Factor x²−9=(x+3)(x−3). Cancel (x−3).',feedback:'(x+3)(x−3)/(x−3)=x+3. As x→3: 3+3=6.'},
  mistakes:[
    {wrong:'Assuming lim=f(a): if f(3)=0/0, limit is 0/0',right:'0/0 is indeterminate — the limit might still exist. Factor, cancel, then evaluate.'},
    {wrong:'Thinking a limit must be what the function equals AT the point',right:'The limit is about what the function APPROACHES. f(a) might be undefined, yet the limit exists.'},
  ],
  check:[
    {q:'lim_{x→4} (√x−2)/(x−4) = ?',opts:['0','1/4','Undefined','1/2'],ans:1,fb:'Multiply by (√x+2)/(√x+2): (x−4)/((x−4)(√x+2)) = 1/(√x+2) → 1/4.'},
    {q:'If lim_{x→2⁻}f(x)=5 and lim_{x→2⁺}f(x)=7, then lim_{x→2}f(x)=',opts:['5','7','6','DNE'],ans:3,fb:'One-sided limits differ (5≠7). The two-sided limit does not exist.'},
    {q:'lim_{x→0} x·sin(1/x) = ?',opts:['1','0','DNE','∞'],ans:1,fb:'|sin(1/x)|≤1. So |x·sin(1/x)|≤|x|→0 by squeeze theorem. Limit=0.'},
  ]
});

L('4-09',{
  tagline:"Computing limits algebraically means using limit laws and algebraic techniques to evaluate limits without just substituting — especially when direct substitution fails.",
  concept:`<div class="big-idea">Limit laws: you can take limits of sums, products, quotients, and powers by applying limits to each part.</div>
<strong>Limit laws (assuming the limits exist):</strong>
<br>• Sum: lim(f+g) = lim(f) + lim(g)
<br>• Product: lim(f·g) = lim(f)·lim(g)
<br>• Quotient: lim(f/g) = lim(f)/lim(g), if lim(g) ≠ 0
<br>• Power: lim(f^n) = [lim(f)]^n
<br><br><strong>Techniques when direct substitution gives 0/0 or ∞/∞:</strong>
<br>• Factor and cancel
<br>• Multiply by conjugate (for radicals)
<br>• L'Hôpital's Rule (for ∞/∞ or 0/0): lim(f/g) = lim(f'/g') (requires calculus)
<br><br><strong>Two important limits:</strong>
<br>lim_{x→0} sin(x)/x = 1 | lim_{x→0} (1−cos(x))/x = 0
<div class="analogy">💡 lim sin(x)/x = 1 as x→0 can be seen geometrically: for very small angles, sin(x) ≈ x (in radians). So the ratio ≈ 1. This fact powers all trig derivatives in calculus.</div>`,
  formula:{display:'lim_{x→0} sin(x)/x = 1 | Factor/Cancel for 0/0',caption:'Limit laws let you break complex limits into simple pieces'},
  examples:[
    {label:'Example 1',q:'lim_{x→−2} (x²+5x+6)/(x+2)',steps:[
      {t:'Direct sub: 0/0 — factor',d:'(x+2)(x+3)/(x+2) = x+3'},
      {t:'lim_{x→−2}(x+3)',d:'<span class="math answer">= 1</span>'},
    ]},
    {label:'Example 2',q:'lim_{x→0} (√(x+9) − 3)/x',steps:[
      {t:'Direct sub: 0/0 — multiply by conjugate',d:'×(√(x+9)+3)/(√(x+9)+3)'},
      {t:'(x+9−9)/(x(√(x+9)+3)) = x/(x(√(x+9)+3))',d:'= 1/(√(x+9)+3)'},
      {t:'As x→0: 1/(3+3)',d:'<span class="math answer">= 1/6</span>'},
    ]},
  ],
  tryit:{q:'lim_{x→0} sin(3x)/x = ?',opts:['1','3','0','1/3'],ans:1,hint:'Rewrite as 3·[sin(3x)/(3x)]. The bracket approaches 1.',feedback:'3·lim_{x→0}sin(3x)/(3x) = 3·1 = 3.'},
  mistakes:[
    {wrong:'Applying quotient law when denominator limit = 0',right:'lim(f/g) = lim(f)/lim(g) ONLY when lim(g) ≠ 0. When denominator → 0, you need other techniques.'},
    {wrong:'Getting 0/0 and concluding the limit is 0',right:'0/0 is indeterminate — the limit might be any real number, or DNE. You must do more algebra.'},
  ],
  check:[
    {q:'lim_{x→1} (x³−1)/(x−1) = ?',opts:['3','1','0','DNE'],ans:0,fb:'x³−1=(x−1)(x²+x+1). Cancel: x²+x+1 at x=1: 1+1+1=3.'},
    {q:'lim_{x→∞} (3x²+1)/(x²−2) = ?',opts:['3','0','∞','1'],ans:0,fb:'Divide by x²: (3+1/x²)/(1−2/x²) → 3/1 = 3 as x→∞.'},
    {q:'lim_{x→0} tan(x)/x = ?',opts:['0','1','Undefined','π'],ans:1,fb:'tan(x)/x = sin(x)/(x·cos(x)). As x→0: [sin(x)/x]·[1/cos(x)] → 1·1 = 1.'},
  ]
});

L('4-10',{
  tagline:"Continuity is the formal requirement that a function has no breaks, jumps, or holes. It's the condition needed for most calculus theorems to work.",
  concept:`<div class="big-idea">f(x) is continuous at x=a if: (1) f(a) is defined, (2) the limit exists, (3) they're equal.</div>
<strong>Three conditions for continuity at a point:</strong>
<br>1. f(a) is defined
<br>2. lim_{x→a} f(x) exists
<br>3. lim_{x→a} f(x) = f(a)
<br><br><strong>Types of discontinuity:</strong>
<br>• Removable: a hole — the limit exists but f(a) ≠ limit (can be "fixed")
<br>• Jump: the two one-sided limits are different finite values
<br>• Infinite: the function goes to ±∞ at the point (like 1/x at 0)
<br><br><strong>Continuous functions:</strong> polynomials, sin, cos, eˣ — continuous everywhere.
<br>Rational functions: continuous everywhere except where denominator = 0.
<div class="analogy">💡 Continuity means "you can draw the graph without lifting your pencil." A jump discontinuity requires a jump. A hole requires lifting the pencil for one point. An infinite discontinuity is a vertical asymptote.</div>`,
  formula:{display:'Continuous at a: f(a) defined, lim exists, and they\'re equal',caption:'Polynomial and trig functions are continuous everywhere'},
  examples:[
    {label:'Example 1',q:'Is f(x) = (x²−4)/(x−2) continuous at x=2?',steps:[
      {t:'Is f(2) defined?',d:'(4−4)/(2−2) = 0/0. Undefined. Condition 1 fails.'},
      {t:'Does limit exist?',d:'Factor: (x+2) → lim = 4'},
      {t:'Conclusion',d:'<span class="math answer">Removable discontinuity at x=2</span>'},
    ]},
    {label:'Example 2',q:'f(x) = x+1 for x<3 and f(x) = 2x−2 for x≥3. Continuous at x=3?',steps:[
      {t:'f(3) = 2(3)−2 = 4',d:''},
      {t:'Left limit: 3+1=4. Right limit: 2(3)−2=4',d:''},
      {t:'f(3)=4=limit',d:'<span class="math answer">Continuous at x=3</span>'},
    ]},
  ],
  tryit:{q:'f(x) = 1/(x−5). What type of discontinuity at x=5?',opts:['Removable','Jump','Infinite','No discontinuity'],ans:2,hint:'What happens to 1/(x−5) as x approaches 5?',feedback:'As x→5, 1/(x−5)→±∞. Infinite discontinuity (vertical asymptote).'},
  mistakes:[
    {wrong:'Thinking a function is continuous just because its formula looks clean',right:'Always check all three conditions. f(x)=(x²−1)/(x−1) looks simple but has a hole at x=1.'},
    {wrong:'A function can\'t be continuous if it\'s defined piecewise',right:'Piecewise functions CAN be continuous — if the pieces join up without gaps or jumps.'},
  ],
  check:[
    {q:'f(x)=x³+sin(x). Continuous everywhere?',opts:['Yes','No — holes','No — jump at 0','No — infinite at π'],ans:0,fb:'Polynomials and sin are continuous everywhere. Sum of continuous functions is continuous.'},
    {q:'lim_{x→3}f(x)=7 but f(3)=5. This is a:',opts:['Jump discontinuity','Infinite discontinuity','Removable discontinuity','Continuous function'],ans:2,fb:'Limit exists but ≠ f(3). Removable discontinuity (hole at x=3 with wrong y-value).'},
    {q:'The Intermediate Value Theorem requires:',opts:['Differentiability','Continuity on [a,b]','f(a)=f(b)','f being increasing'],ans:1,fb:'IVT requires f to be continuous on [a,b]. It then guarantees f takes every value between f(a) and f(b).'},
  ]
});

L('4-11',{
  tagline:"The parabola is the simplest conic section and one of the most important curves in physics — it's the path of projectiles and the shape of satellite dishes.",
  concept:`<div class="big-idea">A parabola is the set of points equidistant from a fixed point (focus) and a fixed line (directrix).</div>
<strong>Standard forms:</strong>
<br>• Vertical: (x−h)² = 4p(y−k), opens up if p>0, down if p<0
<br>• Horizontal: (y−k)² = 4p(x−h), opens right if p>0, left if p<0
<br>• Vertex: (h, k). Focus is p units from vertex. Directrix is p units the other way.
<br><br><strong>Converting to standard form:</strong> complete the square.
<br>y = ax² + bx + c → y = a(x−h)² + k
<br>Vertex at (h, k) = (−b/2a, f(−b/2a))
<div class="analogy">💡 A satellite dish is a parabola. Signals hit the dish and reflect to the focus — that\'s where the receiver sits. All reflected paths are the same length because of the equal-distance definition.</div>`,
  formula:{display:'(x−h)²=4p(y−k): vertex (h,k), focus at (h,k+p)',caption:'Vertex form: y=a(x−h)²+k where a=1/(4p)'},
  examples:[
    {label:'Example 1',q:'Find vertex, focus, directrix: x²=8y',steps:[
      {t:'Form: x²=4p·y. So 4p=8, p=2',d:'Vertex at (0,0)'},
      {t:'Focus: (0,0+p)=(0,2)',d:''},
      {t:'Directrix: y=−2',d:'<span class="math answer">Vertex (0,0), Focus (0,2), Directrix y=−2</span>'},

  ],
  tryit:{q:'Parabola: (x−3)²=4(y+1). Where is the vertex?',opts:['(3,−1)','(−3,1)','(3,1)','(0,0)'],ans:0,hint:'Standard form (x−h)²=4p(y−k). Vertex is (h,k).',feedback:'h=3, k=−1. Vertex: (3,−1).'},
  mistakes:[
    {wrong:'Confusing which direction the parabola opens from the equation',right:'(x−h)²=4p(y−k): vertical parabola. If p>0, it opens up. If p<0, opens down. (y−k)²: horizontal.'},
    {wrong:'Forgetting the vertex is NOT always at the origin',right:'The vertex is (h,k) in the standard form. Only when h=k=0 is it at the origin.'},
  ],
  check:[
    {q:'y=x²+4x+7. Vertex = ?',opts:['(−2,3)','(2,3)','(−2,−3)','(4,7)'],ans:0,fb:'h=−b/(2a)=−4/2=−2. k=f(−2)=4−8+7=3. Vertex (−2,3).'},

L('4-12',{
  tagline:"Ellipses and hyperbolas complete the conic sections. They model planetary orbits, telescope shapes, and even GPS signal paths.",
  concept:`<div class="big-idea">Ellipse: sum of distances from two foci is constant. Hyperbola: absolute difference of distances from two foci is constant.</div>
<strong>Ellipse standard form:</strong> (x−h)²/a² + (y−k)²/b² = 1
<br>• If a>b: horizontal major axis. If b>a: vertical major axis.
<br>• Foci: c² = a² − b² (c from center, along major axis)
<br><br><strong>Hyperbola standard form:</strong> (x−h)²/a² − (y−k)²/b² = 1 (horizontal)
<br>or (y−k)²/a² − (x−h)²/b² = 1 (vertical)
<br>• Foci: c² = a² + b² (note: PLUS for hyperbola!)
<br>• Asymptotes: y−k = ±(b/a)(x−h) for horizontal hyperbola
<div class="analogy">💡 Planets orbit in ellipses (Kepler\'s first law). The sun sits at one focus — not the center. That\'s why Earth is closer to the sun in January than July.</div>`,
  formula:{display:'Ellipse: c²=a²−b² | Hyperbola: c²=a²+b²',caption:'Ellipse sums distances to foci. Hyperbola differences them.'},
  examples:[
    {label:'Example 1',q:'Ellipse: x²/25 + y²/9 = 1. Find a, b, c, and foci.',steps:[
      {t:'a²=25, b²=9 → a=5, b=3',d:''},

  mistakes:[
    {wrong:'Using c²=a²−b² for hyperbola',right:'For ellipse: c²=a²−b². For hyperbola: c²=a²+b². Easy to mix up — remember hyperbola foci are OUTSIDE, so c>a.'},

    {q:'An ellipse has a=5, b=3. Its eccentricity e=c/a is approximately:',opts:['0.8','0.6','0.4','1.6'],ans:0,fb:'c=4 (from c²=25−9=16). e=4/5=0.8.'},

L('4-13',{
  tagline:"Polar coordinates are an alternative to (x,y) — instead of horizontal/vertical distances, you specify a radius and angle. They make circles and spirals beautifully simple.",
  concept:`<div class="big-idea">Polar coordinates (r, θ): r is distance from origin, θ is angle from positive x-axis.</div>
<strong>Converting polar ↔ rectangular:</strong>
<br>• x = r·cos(θ), y = r·sin(θ)
<br>• r² = x²+y², tan(θ) = y/x
<br><br><strong>Common polar curves:</strong>
<br>• r = a: circle with radius a (centered at origin)
<br>• r = a·cos(θ): circle shifted right
<br>• r = a(1+cos(θ)): cardioid
<br>• r = a·sin(nθ): rose curve with petals
<br><br>Multiple representations: (r,θ) and (r,θ+2π) are the same point. Also (r,θ) = (−r,θ+π).
<div class="analogy">💡 A compass bearing is a polar coordinate — "3 miles at bearing 45°." The bearing is θ, the distance is r. Polar coordinates are natural for circular problems just as rectangular are natural for grid-based problems.</div>`,
  formula:{display:'x=rcos(θ), y=rsin(θ) | r=√(x²+y²), θ=arctan(y/x)',caption:'r=constant is a circle. θ=constant is a ray.'},
  examples:[
    {label:'Example 1',q:'Convert polar (4, π/3) to rectangular.',steps:[
      {t:'x = 4cos(π/3) = 4(1/2) = 2',d:''},

    {label:'Example 2',q:'Convert rectangular (−3, 3) to polar.',steps:[

  tryit:{q:'What is the rectangular form of r = 5?',opts:['x=5','y=5','x²+y²=25','x+y=5'],ans:2,hint:'r=5 means distance from origin is 5. r²=x²+y².',feedback:'r=5 → r²=25 → x²+y²=25. This is a circle of radius 5.'},
  mistakes:[

    {q:'r = 2sin(θ) in rectangular form:',opts:['x²+y²=2y','x²+y²=2x','y=2sin(x)','x²=2y'],ans:0,fb:'Multiply both sides by r: r²=2r·sin(θ). x²+y²=2y.'},
    {q:'Point (3, π) in rectangular coordinates:',opts:['(3,0)','(−3,0)','(0,3)','(3,π)'],ans:1,fb:'x=3cos(π)=3(−1)=−3. y=3sin(π)=0. Answer: (−3,0).'},

L('5-02',{
  tagline:"The formal definition of a derivative reveals exactly what it measures — slope of the tangent line. Doing it from scratch builds intuition no shortcut can replace.",
  concept:`<div class="big-idea">f'(x) = lim_{h→0} [f(x+h) − f(x)] / h</div>
This is the slope of the secant line between two points as those points get infinitely close together.
<br><br><strong>Process:</strong>
<br>1. Compute f(x+h) — substitute (x+h) everywhere you see x
<br>2. Subtract f(x)
<br>3. Divide the whole thing by h
<br>4. Simplify until the h in the denominator cancels
<br>5. Take the limit: set h = 0 in the simplified expression
<br><br>The h MUST cancel — if it doesn't, you made an algebra error.
<div class="analogy">💡 Speed = distance/time. For instantaneous speed, make the time interval h infinitely small. That's the limit definition — applied to position, it gives velocity.</div>`,
  formula:{display:'f\'(x) = lim_{h→0} [f(x+h)−f(x)] / h',caption:'h must cancel before you can evaluate the limit'},
  examples:[
    {label:'Example 1',q:'Find f\'(x) from definition: f(x)=x²',steps:[
      {t:'f(x+h)=(x+h)²=x²+2xh+h²',d:''},
      {t:'Numerator: x²+2xh+h²−x²=2xh+h²',d:''},
      {t:'Divide by h: 2x+h',d:''},
      {t:'Limit h→0',d:'<span class="math answer">f\'(x)=2x</span>'},
    ]},
    {label:'Example 2',q:'Find f\'(x) from definition: f(x)=1/x',steps:[
      {t:'f(x+h)=1/(x+h)',d:''},
      {t:'[1/(x+h) − 1/x]/h = [(x−(x+h))/(x(x+h))]/h',d:'= −h/(hx(x+h))'},
      {t:'Cancel h: −1/(x(x+h))',d:''},
      {t:'Limit: −1/x²',d:'<span class="math answer">f\'(x)=−1/x²</span>'},
    ]},
  ],
  tryit:{q:'Using the definition, d/dx[3x]=?',opts:['3x','3','0','1/3'],ans:1,hint:'[3(x+h)−3x]/h = 3h/h = 3. Limit is 3.',feedback:'[3(x+h)−3x]/h=3h/h=3. f\'(x)=3.'},
  mistakes:[
    {wrong:'f(x+h)=f(x)+f(h)',right:'Substitute literally: f(x²) at x+h means (x+h)²=x²+2xh+h², NOT x²+h².'},
    {wrong:'Taking limit before the h cancels: "limit of (2xh+h²)/h = 0/0"',right:'Simplify first: (2xh+h²)/h=2x+h. Then h→0 gives 2x.'},
  ],
  check:[
    {q:'From definition, d/dx[x³] requires computing (x+h)³. What does this expand to?',opts:['x³+h³','x³+3x²h+3xh²+h³','x³+3xh','x³+h³+3x²h'],ans:1,fb:'Binomial expansion: (x+h)³=x³+3x²h+3xh²+h³.'},
    {q:'After simplifying, the numerator for f(x)=x³ becomes (3x²h+3xh²+h³). Divided by h:',opts:['3x²h+3xh+h²','3x²+3xh+h²','3x²','3x²h²'],ans:1,fb:'(3x²h+3xh²+h³)/h=3x²+3xh+h².'},
    {q:'lim_{h→0}(3x²+3xh+h²)=',opts:['3x²','0','3xh','3x²+h²'],ans:0,fb:'Set h=0: 3x²+0+0=3x². So d/dx[x³]=3x².'},
  ]
});

L('5-04',{
  tagline:"Product and Quotient rules are unavoidable in calculus. They come up in every application. Learn them cold.",
  concept:`<div class="big-idea">Product Rule: (fg)' = f'g + fg'. Quotient Rule: (f/g)' = (f'g − fg') / g²</div>
<strong>Product rule mnemonic:</strong> "derivative of first times second, plus first times derivative of second."
<br><br><strong>Quotient rule mnemonic:</strong> "low d-high minus high d-low, square the bottom and away we go."
<br>(f/g)' = [g·f' − f·g'] / g²
<br><br>Common applications: any product of two functions (x²·sin x), any ratio (eˣ/x).
<br><br>⚠️ (fg)' ≠ f'g'. Never multiply derivatives like that.
<div class="analogy">💡 Area A = length × width. If both are changing: dA/dt = (d-length/dt)×width + length×(d-width/dt). That's exactly the product rule — both pieces matter.</div>`,
  formula:{display:'(fg)\'=f\'g+fg\' | (f/g)\'=(f\'g−fg\')/g²',caption:'Quotient: denominator×(top derivative) minus top×(bottom derivative), over bottom²'},
  examples:[
    {label:'Example 1',q:'y = x²·sin(x)',steps:[
      {t:'f=x², f\'=2x | g=sin(x), g\'=cos(x)',d:''},
      {t:'y\' = 2x·sin(x) + x²·cos(x)',d:'<span class="math answer">y\'=2x·sin(x)+x²·cos(x)</span>'},
    ]},
    {label:'Example 2',q:'y = eˣ/(x²+1)',steps:[
      {t:'f=eˣ, f\'=eˣ | g=x²+1, g\'=2x',d:''},
      {t:'y\'=[eˣ(x²+1)−eˣ·2x]/(x²+1)²',d:''},
      {t:'Factor eˣ',d:'<span class="math answer">y\'=eˣ(x²−2x+1)/(x²+1)²</span>'},
    ]},
  ],
  tryit:{q:'d/dx[x·ln(x)]=?',opts:['ln(x)+1','ln(x)','1/x','x/ln(x)'],ans:0,hint:'f=x, g=ln(x). f\'=1, g\'=1/x.',feedback:'1·ln(x)+x·(1/x)=ln(x)+1.'},
  mistakes:[
    {wrong:'(fg)\'=f\'·g\'',right:'Product rule: (fg)\'=f\'g+fg\'. Never multiply the two derivatives.'},
    {wrong:'In quotient rule, putting fg\' first instead of f\'g',right:'It must be (f\'g−fg\'). Order matters — swap them and you get the wrong sign.'},
  ],
  check:[
    {q:'d/dx[sin(x)·cos(x)]=?',opts:['cos(2x)','cos²x−sin²x','−sin²x','Both A and B'],ans:3,fb:'Product rule: cos²x−sin²x=cos(2x). Both are correct.'},
    {q:'d/dx[x/eˣ]=?',opts:['(1−x)/eˣ','1/eˣ','(x−1)/eˣ','−x/eˣ'],ans:0,fb:'(eˣ·1−x·eˣ)/(eˣ)²=eˣ(1−x)/e²ˣ=(1−x)/eˣ.'},
    {q:'d/dx[tan(x)] using sin/cos and quotient rule gives:',opts:['sec²(x)','1/cos²(x)','Both','sin²x+cos²x/cos²x'],ans:2,fb:'d/dx[sin/cos]=(cos·cos−sin·(−sin))/cos²=(cos²+sin²)/cos²=1/cos²=sec².'},
  ]
});

L('5-06',{
  tagline:"Trig derivatives power all wave physics. Memorize these six — they're small and extremely useful.",
  concept:`<div class="big-idea">d/dx[sin x]=cos x | d/dx[cos x]=−sin x. The negative on cosine is the most-missed fact in calc.</div>
<strong>All six:</strong>
<br>• (sin x)' = cos x
<br>• (cos x)' = −sin x
<br>• (tan x)' = sec²x
<br>• (csc x)' = −csc x · cot x
<br>• (sec x)' = sec x · tan x
<br>• (cot x)' = −csc²x
<br><br><strong>Memory trick:</strong> co-functions (cos, csc, cot) all get a negative sign.
<br><br><strong>With chain rule:</strong> d/dx[sin(u)] = cos(u)·u'
<div class="analogy">💡 sin and cos chase each other in a cycle: sin→cos→−sin→−cos→sin... Differentiate four times and you're back. The derivative of sin IS cos because of how the unit circle rotates.</div>`,
  formula:{display:'(sin u)\'=cos(u)·u\' | (cos u)\'=−sin(u)·u\'',caption:'Co-functions always have a negative: (cos)\'=−sin, (csc)\'=−csc·cot, (cot)\'=−csc²'},
  examples:[
    {label:'Example 1',q:'y=sin(x²)',steps:[
      {t:'Outer: cos(x²) | Inner: 2x',d:'y\'=cos(x²)·2x'},
      {t:'',d:'<span class="math answer">y\'=2x·cos(x²)</span>'},
    ]},
    {label:'Example 2',q:'y=tan(3x)−sec(x)',steps:[
      {t:'d/dx[tan(3x)]=sec²(3x)·3=3sec²(3x)',d:''},
      {t:'d/dx[sec(x)]=sec(x)tan(x)',d:''},
      {t:'',d:'<span class="math answer">y\'=3sec²(3x)−sec(x)tan(x)</span>'},
    ]},
  ],
  tryit:{q:'d/dx[cos(5x)]=?',opts:['sin(5x)','5sin(5x)','−5sin(5x)','−sin(5x)'],ans:2,hint:'Chain rule. Derivative of cos is −sin. Inner derivative of 5x is 5.',feedback:'−sin(5x)·5=−5sin(5x).'},
  mistakes:[
    {wrong:'d/dx[cos x]=sin x (forgetting the negative)',right:'d/dx[cos x]=−sin x. This negative causes more lost points than almost any other single rule.'},
    {wrong:'d/dx[sin(x²)]=cos(x²) (forgetting chain rule inner)',right:'Must multiply by the inner derivative: cos(x²)·2x.'},
  ],
  check:[
    {q:'d/dx[x·cos(x)]=?',opts:['cos(x)−x·sin(x)','−x·sin(x)','cos(x)+x·sin(x)','x·cos(x)'],ans:0,fb:'Product rule: cos(x)+x·(−sin x)=cos(x)−x·sin(x).'},
    {q:'d/dx[cot(x)]=?',opts:['csc²x','−csc²x','sec²x','−sec²x'],ans:1,fb:'d/dx[cot x]=−csc²x.'},
    {q:'d/dx[sin(eˣ)]=?',opts:['cos(eˣ)','eˣcos(eˣ)','cos(eˣ)·eˣ','Both B and C'],ans:3,fb:'Chain rule: cos(eˣ)·eˣ. B and C are the same expression.'},
  ]
});

L('5-07',{
  tagline:"e is special because it's its own derivative. That's not a coincidence — it's the definition of e.",
  concept:`<div class="big-idea">d/dx[eˣ]=eˣ. d/dx[ln x]=1/x. These are why e is the natural base for calculus.</div>
<strong>All variants:</strong>
<br>• d/dx[eˣ] = eˣ
<br>• d/dx[e^u] = e^u · u' (chain rule)
<br>• d/dx[aˣ] = aˣ · ln(a)
<br>• d/dx[ln x] = 1/x
<br>• d/dx[ln u] = u'/u (chain rule)
<br>• d/dx[log_a x] = 1/(x·ln a)
<br><br><strong>Logarithmic differentiation</strong> — for y=f(x)^g(x):
<br>Take ln both sides: ln y = g(x)·ln(f(x)), differentiate implicitly, solve for y'.
<div class="analogy">💡 Money in a bank with continuously compounded interest grows as Pe^(rt). The rate of growth d/dt[Pe^(rt)] = rPe^(rt) = r × (current amount). The growth rate IS proportional to the size. That's why eˣ is its own derivative.</div>`,
  formula:{display:'(eˣ)\'=eˣ | (ln x)\'=1/x | (aˣ)\'=aˣln(a)',caption:'Chain rule versions: (e^u)\'=e^u·u\' | (ln u)\'=u\'/u'},
  examples:[
    {label:'Example 1',q:'y=e^(sin x)',steps:[
      {t:'Outer: e^(sin x) | Inner: cos x',d:''},

    ]},
    {label:'Example 2',q:'y=ln(x³+1)',steps:[
      {t:'u=x³+1, u\'=3x²',d:''},
      {t:'y\'=u\'/u=3x²/(x³+1)',d:'<span class="math answer">y\'=3x²/(x³+1)</span>'},
    ]},
  ],
  tryit:{q:'d/dx[5eˣ+ln(x)]=?',opts:['5eˣ+1/x','5eˣ+ln(x)','eˣ+1/x','5xeˣ+1'],ans:0,hint:'Differentiate each term. d/dx[5eˣ]=5eˣ. d/dx[ln x]=1/x.',feedback:'5eˣ+1/x.'},
  mistakes:[
    {wrong:'d/dx[eˣ]=x·eˣ⁻¹ (applying power rule to eˣ)',right:'Power rule is for xⁿ. d/dx[eˣ]=eˣ — completely different. Never apply power rule to an exponential.'},
    {wrong:'d/dx[ln(x²)]=1/x²',right:'Chain rule: u=x², u\'=2x. d/dx[ln(x²)]=2x/x²=2/x.'},
  ],

    {q:'d/dx[x²·eˣ]=?',opts:['2xeˣ','xeˣ(x+2)','2xeˣ+x²eˣ','Both B and C'],ans:3,fb:'Product: 2xeˣ+x²eˣ=xeˣ(2+x). B and C are the same.'},
    {q:'d/dx[ln(cos x)]=?',opts:['1/cos x','−sin x/cos x','−tan x','Both B and C'],ans:3,fb:'d/dx[ln(cos x)]=(−sin x)/cos x=−tan x. B and C are equal.'},
    {q:'d/dx[2ˣ]=?',opts:['x·2ˣ⁻¹','2ˣ','2ˣ·ln2','2ˣ/ln2'],ans:2,fb:'d/dx[aˣ]=aˣ·ln(a). Here a=2.'},
  ]

L('5-08',{
  tagline:"Implicit differentiation handles curves where y isn't isolated. It's just the chain rule applied carefully — and it unlocks a whole class of problems.",
  concept:`<div class="big-idea">When y is mixed in with x (like x²+y²=25), differentiate both sides with respect to x. Every derivative of y gets a dy/dx multiplied in.</div>
<strong>Why dy/dx appears:</strong> by the chain rule, d/dx[y²] = 2y·(dy/dx). Because y is itself a function of x.
<br><br><strong>Process:</strong>
<br>1. Differentiate both sides with respect to x
<br>2. Every time you differentiate a term with y, multiply by dy/dx
<br>3. Collect all dy/dx terms on one side
<br>4. Factor out dy/dx and divide to solve
<br><br><strong>Use cases:</strong> circles, ellipses, curves where solving for y explicitly is messy or impossible.
<div class="analogy">💡 x²+y²=25 is a circle. It fails the vertical line test — not a function. But you can still find the slope of the tangent at any point using implicit differentiation, even though y isn\'t isolated.</div>`,
  formula:{display:'d/dx[y²]=2y·(dy/dx) | d/dx[f(y)]=f\'(y)·(dy/dx)',caption:'Chain rule for y: treat y as a function of x'},
  examples:[
    {label:'Example 1',q:'Find dy/dx for x²+y²=25',steps:[
      {t:'Differentiate both sides: 2x+2y·(dy/dx)=0',d:''},
      {t:'Solve: 2y·(dy/dx)=−2x',d:''},
      {t:'dy/dx=−2x/2y',d:'<span class="math answer">dy/dx=−x/y</span>'},
    ]},
    {label:'Example 2',q:'Find dy/dx for x³+y³=6xy',steps:[

L('5-09',{

  concept:`<div class="big-idea">If two quantities are related by an equation, differentiate both sides with respect to time t to get an equation relating their rates of change.</div>
<strong>Process:</strong>
<br>1. Draw a diagram. Label all quantities.
<br>2. Write an equation relating the relevant quantities (geometry, Pythagorean theorem, etc.)
<br>3. Differentiate both sides with respect to t
<br>4. Substitute known values and rates
<br>5. Solve for the unknown rate
<br><br>⚠️ Substitute values AFTER differentiating. Never before.
<div class="analogy">💡 A ladder slides down a wall. The height y and base x are related: x²+y²=L². Differentiate: 2x(dx/dt)+2y(dy/dt)=0. Now plug in the current x, y values and one of the rates. Solve for the other.</div>`,

L('5-10',{
  tagline:"Critical points and optimization are why calculus was invented. Finding maxima and minima lets you design the most efficient bridge, the cheapest box, the fastest route.",
  concept:`<div class="big-idea">A critical point is where f'(x)=0 or f'(x) is undefined. Local maxima and minima occur at critical points.</div>
<strong>First Derivative Test:</strong>
<br>If f' changes from + to − at c: local maximum at c
<br>If f' changes from − to + at c: local minimum at c
<br>If f' doesn't change sign: neither (saddle/inflection point)
<br><br><strong>Second Derivative Test:</strong>
<br>If f'(c)=0 and f''(c)<0: local maximum
<br>If f'(c)=0 and f''(c)>0: local minimum
<br>If f''(c)=0: inconclusive — use first derivative test
<br><br><strong>Optimization problems:</strong> set up the objective function, take the derivative, set it to zero, check endpoints.
<div class="analogy">💡 A farmer wants to fence the largest rectangular area with 200m of fence. Area=xy, constraint: 2x+2y=200 → y=100−x. Maximize A=x(100−x). Set A\'=0 → x=50. That\'s optimization.</div>`,
  formula:{display:'Critical points: f\'(x)=0 or undefined | f\'\'<0=max, f\'\'>0=min',caption:'Always check endpoints for absolute max/min on a closed interval'},
  examples:[
    {label:'Example 1',q:'Find and classify critical points: f(x)=x³−6x²+9x',steps:[
      {t:'f\'(x)=3x²−12x+9=3(x²−4x+3)=3(x−1)(x−3)',d:''},
      {t:'Critical points: x=1, x=3',d:''},
      {t:'f\'\'(x)=6x−12. f\'\'(1)=−6<0: local max. f\'\'(3)=6>0: local min',d:'<span class="math answer">Max at x=1, Min at x=3</span>'},
    ]},
  ],
  tryit:{q:'f(x)=x²−4x+5. Where is the minimum?',opts:['x=0','x=4','x=2','x=−2'],ans:2,hint:'Set f\'(x)=0. f\'=2x−4=0.',feedback:'2x−4=0 → x=2. f\'\'=2>0 so it\'s a minimum.'},
  mistakes:[
    {wrong:'Assuming f\'=0 always gives a local extreme',right:'f\'=0 is necessary but not sufficient. If f\' doesn\'t change sign, it\'s a saddle/inflection point, not an extreme.'},
    {wrong:'Forgetting to check endpoints on a closed interval',right:'Absolute max/min on [a,b] could be at endpoints or critical points. Always evaluate f at ALL of them.'},
  ],
  check:[
    {q:'f\'(x)=x(x−4). Local minimum is at:',opts:['x=0','x=4','x=2','x=−4'],ans:1,fb:'f\'=0 at x=0 and x=4. Sign chart: f\'<0 on (0,4), f\'>0 after x=4. Minimum at x=4.'},
    {q:'Second derivative test: f\'(c)=0 and f\'\'(c)=−3. This is a:',opts:['Local minimum','Local maximum','Saddle point','Inflection point'],ans:1,fb:'f\'\'<0 means concave down at c → local maximum.'},
    {q:'Maximize A=xy with x+y=20. Maximum occurs at:',opts:['x=0,y=20','x=10,y=10','x=5,y=15','x=20,y=0'],ans:1,fb:'A=x(20−x). A\'=20−2x=0 → x=10. y=10. A=100.'},
  ]
});

L('5-11',{
  tagline:"The Mean Value Theorem is one of the most important theorems in calculus. It's the rigorous foundation for everything from error estimates to speed limits.",
  concept:`<div class="big-idea">MVT: If f is continuous on [a,b] and differentiable on (a,b), then there exists c in (a,b) where f'(c) = (f(b)−f(a))/(b−a).</div>
In plain English: somewhere on the interval, the instantaneous rate equals the average rate.
<br><br><strong>Geometric interpretation:</strong> somewhere on the curve, the tangent line is parallel to the secant line connecting the endpoints.
<br><br><strong>Rolle's Theorem:</strong> special case where f(a)=f(b). Then there exists c where f'(c)=0.
<br><br><strong>Application:</strong> if a car travels 100 miles in 1 hour, then at some moment it was going exactly 100 mph.
<div class="analogy">💡 MVT is like a speed camera average: if your average speed was 80 mph, you must have been going exactly 80 mph at some specific moment. The MVT guarantees that moment exists.</div>`,
  formula:{display:'f\'(c) = [f(b)−f(a)] / (b−a) for some c in (a,b)',caption:'Requires: continuous on [a,b] AND differentiable on (a,b)'},
  examples:[
    {label:'Example 1',q:'Find c for f(x)=x² on [1,3].',steps:[
      {t:'Average rate: (9−1)/(3−1)=8/2=4',d:''},
      {t:'f\'(x)=2x. Set 2x=4',d:'x=2'},
      {t:'c=2 ∈ (1,3) ✓',d:'<span class="math answer">c=2</span>'},
    ]},
  ],
  tryit:{q:'MVT applies to f(x)=|x| on [−1,1]?',opts:['Yes — MVT guarantees a c','No — f is not differentiable at x=0','No — f is not continuous','Yes but c=0'],ans:1,hint:'Check the conditions: is f differentiable at every point in (−1,1)?',feedback:'|x| is not differentiable at x=0. MVT does not apply.'},
  mistakes:[
    {wrong:'Applying MVT without checking differentiability',right:'MVT requires f to be differentiable on the OPEN interval (a,b). If any point isn\'t differentiable, MVT doesn\'t apply.'},
    {wrong:'Thinking c is unique',right:'MVT guarantees AT LEAST one such c. There may be multiple values where the tangent slope equals the secant slope.'},
  ],
  check:[
    {q:'For f(x)=x³ on [0,2], the MVT value c satisfies f\'(c)=',opts:['4/3','4','8','2'],ans:1,fb:'Average rate=(8−0)/(2−0)=4. f\'(c)=3c²=4 → c²=4/3 → c=2/√3. The average rate is 4.'},
    {q:'Rolle\'s Theorem requires f(a)=f(b). What does it guarantee?',opts:['f\'=0 everywhere','f\'(c)=0 for some c in (a,b)','f has a global minimum','f is linear'],ans:1,fb:'Rolle\'s: if f(a)=f(b), then somewhere in between f\'=0 (the function must turn around).'},
    {q:'If f is differentiable on (a,b) and f\'(x)=0 for all x, then f is:',opts:['Increasing','Decreasing','Constant','Zero only at endpoints'],ans:2,fb:'If f\'=0 everywhere, MVT implies f(x)−f(a)=0·(x−a)=0 for all x. So f is constant.'},
  ]
});

L('5-12',{
  tagline:"Antiderivatives reverse the derivative process. They're the first step toward the integral — and they let you recover position from velocity.",
  concept:`<div class="big-idea">An antiderivative of f(x) is any function F(x) where F'(x)=f(x). The general antiderivative includes +C.</div>
Why +C? Any constant has derivative 0, so F(x)+C is also an antiderivative. Without additional info, we can't determine C.
<br><br><strong>Key antiderivative rules:</strong>
<br>• ∫xⁿ dx = xⁿ⁺¹/(n+1) + C (n≠−1)
<br>• ∫eˣ dx = eˣ + C
<br>• ∫1/x dx = ln|x| + C
<br>• ∫cos(x) dx = sin(x) + C
<br>• ∫sin(x) dx = −cos(x) + C
<br>• ∫sec²(x) dx = tan(x) + C
<br><br>Always verify: differentiate your answer and check you get back the original.
<div class="analogy">💡 If f(t) is velocity and you want position, you need the antiderivative. d/dt[position]=velocity means position=∫velocity dt. The +C represents not knowing where you started.</div>`,
  formula:{display:'∫xⁿdx = xⁿ⁺¹/(n+1)+C | ∫eˣdx=eˣ+C | ∫(1/x)dx=ln|x|+C',caption:'Always add +C for indefinite integrals'},
  examples:[
    {label:'Example 1',q:'Find ∫(3x²+2x−5)dx',steps:[
      {t:'Antiderivative term by term',d:'3·x³/3 + 2·x²/2 − 5x'},
      {t:'Simplify',d:'<span class="math answer">x³+x²−5x+C</span>'},
    ]},
    {label:'Example 2',q:'∫(1/x+eˣ)dx',steps:[
      {t:'∫(1/x)dx=ln|x|',d:'∫eˣdx=eˣ'},
      {t:'',d:'<span class="math answer">ln|x|+eˣ+C</span>'},
    ]},
  ],
  tryit:{q:'∫(4x³−6x)dx=?',opts:['x⁴−3x²+C','12x²−6+C','4x²−6+C','x⁴+3x²+C'],ans:0,hint:'Apply power rule in reverse: xⁿ → xⁿ⁺¹/(n+1).',feedback:'4x⁴/4−6x²/2=x⁴−3x²+C.'},
  mistakes:[
    {wrong:'Forgetting +C',right:'Every indefinite integral needs +C. Without it, you\'re saying there\'s only one antiderivative — but there are infinitely many (differing by a constant).'},
    {wrong:'∫x⁻¹dx = x⁰/0 (undefined)',right:'∫1/x dx = ln|x|+C — this is a special case that must be memorized separately.'},
  ],
  check:[
    {q:'∫sin(x)dx=?',opts:['cos(x)+C','−cos(x)+C','sin(x)+C','−sin(x)+C'],ans:1,fb:'d/dx[−cos(x)]=sin(x). So ∫sin(x)dx=−cos(x)+C.'},
    {q:'Verify: is x³/3+2x+C an antiderivative of x²+2?',opts:['Yes: d/dx[x³/3+2x]=x²+2','No: derivatives don\'t match','Only if C=0','Yes: integral of x²+2 is x³+2x'],ans:0,fb:'d/dx[x³/3+2x+C]=x²+2 ✓. C drops out when differentiating.'},
    {q:'∫(x+1)² dx = ? (Hint: expand first)',opts:['(x+1)³/3+C','x³/3+x²+x+C','x²/2+x+C','(x+1)²/2+C'],ans:1,fb:'(x+1)²=x²+2x+1. Integrate: x³/3+x²+x+C.'},
  ]
});

L('5-13',{
  tagline:"The definite integral computes signed area — and it's one of the most powerful tools in mathematics, connecting change to accumulation.",
  concept:`<div class="big-idea">∫ₐᵇ f(x) dx = signed area between f(x) and the x-axis from x=a to x=b.</div>
<strong>Riemann sum interpretation:</strong> divide [a,b] into n rectangles, sum the areas, take the limit as n→∞.
<br><br><strong>Computing:</strong> find the antiderivative F(x), then evaluate F(b)−F(a).
<br>This is the Fundamental Theorem of Calculus (see next lesson).
<br><br><strong>Properties:</strong>
<br>• ∫ₐᵃ f dx = 0
<br>• ∫ₐᵇ f dx = −∫ᵦᵃ f dx
<br>• ∫ₐᵇ f dx = ∫ₐᶜ f dx + ∫ᶜᵇ f dx
<br>• Negative area: if f(x)<0, the integral is negative (below x-axis)
<div class="analogy">💡 If velocity v(t) is positive (moving forward), ∫v dt = total distance traveled forward. If v goes negative (moving backward), it subtracts. The definite integral keeps track of net displacement.</div>`,
  formula:{display:'∫ₐᵇ f(x)dx = F(b)−F(a) where F\'=f',caption:'Signed area: negative when function is below x-axis'},
  examples:[
    {label:'Example 1',q:'Compute ∫₁³ (x²+1)dx',steps:[
      {t:'Antiderivative: F(x)=x³/3+x',d:''},
      {t:'F(3)=9+3=12. F(1)=1/3+1=4/3',d:''},
      {t:'12−4/3=32/3',d:'<span class="math answer">=32/3</span>'},
    ]},
  ],
  tryit:{q:'∫₀² 3x dx = ?',opts:['6','3','12','9'],ans:0,hint:'Antiderivative of 3x is 3x²/2. Evaluate from 0 to 2.',feedback:'F(x)=3x²/2. F(2)−F(0)=6−0=6.'},
  mistakes:[
    {wrong:'Forgetting to subtract F(a): just writing F(b)',right:'Always F(b)−F(a). Both endpoints contribute.'},
    {wrong:'Thinking negative integrals mean an error',right:'If the function is negative, the integral is negative. That\'s correct — it represents area below the axis.'},
  ],
  check:[
    {q:'∫₀^π sin(x)dx=?',opts:['0','2','−2','π'],ans:1,fb:'F(x)=−cos(x). −cos(π)−(−cos(0))=1+1=2.'},
    {q:'∫₁² (1/x)dx=?',opts:['ln2','ln(1)','1','0'],ans:0,fb:'F(x)=ln x. ln(2)−ln(1)=ln(2)−0=ln2.'},
    {q:'If ∫₀⁴ f dx=10 and ∫₀² f dx=3, then ∫₂⁴ f dx=?',opts:['13','7','30','4'],ans:1,fb:'∫₀⁴=∫₀²+∫₂⁴. 10=3+∫₂⁴. ∫₂⁴=7.'},
  ]
});

L('6-01',{
  tagline:"U-substitution is the chain rule run backwards. It's the single most-used integration technique — master this before anything else.",
  concept:`<div class="big-idea">When the integrand contains f(g(x))·g'(x), substitute u=g(x), du=g'(x)dx to get ∫f(u)du.</div>
<strong>Process:</strong>
<br>1. Identify u — usually the inside of a composition
<br>2. Compute du/dx, rearrange to get du = (something)dx
<br>3. Replace everything in terms of u
<br>4. Integrate ∫f(u)du
<br>5. Substitute back to get the answer in x
<br><br>For definite integrals: either convert limits to u, or substitute back before evaluating.
<div class="analogy">💡 ∫2x·(x²+1)⁵dx — if you expanded that, it would take forever. But let u=x²+1, du=2x dx. Suddenly: ∫u⁵du=u⁶/6=((x²+1)⁶)/6. U-sub turns messy integrals into simple ones.</div>`,
  formula:{display:'u=g(x) → du=g\'(x)dx → ∫f(g(x))g\'(x)dx=∫f(u)du',caption:'The derivative of u must appear in the integrand'},
  examples:[
    {label:'Example 1',q:'∫2x(x²+3)⁴dx',steps:[
      {t:'u=x²+3, du=2x dx',d:''},
      {t:'∫u⁴du = u⁵/5',d:''},
      {t:'Sub back',d:'<span class="math answer">(x²+3)⁵/5 + C</span>'},
    ]},

      {t:'u=3x, du=3dx → dx=du/3',d:''},
      {t:'(1/3)∫cos(u)du=(1/3)sin(u)',d:''},

  ],
  tryit:{q:'∫eˣ·e^(eˣ)dx. Let u=eˣ.',opts:['e^(eˣ)+C','eˣ·e^(eˣ)+C','e^(eˣ+1)+C','(eˣ)²/2+C'],ans:0,hint:'If u=eˣ, then du=eˣdx. The integral becomes ∫eᵘdu.',feedback:'u=eˣ, du=eˣdx. ∫eᵘdu=eᵘ+C=e^(eˣ)+C.'},
  mistakes:[

    {wrong:'Forgetting to change dx to du',right:'After u-sub, everything must be in u. If any x remains in the integral, the substitution is incomplete.'},

    {q:'∫(2x+1)⁷dx',opts:['(2x+1)⁸/8+C','(2x+1)⁸/16+C','8(2x+1)⁷+C','(2x+1)⁸+C'],ans:1,fb:'u=2x+1, du=2dx → dx=du/2. (1/2)∫u⁷du=(1/2)u⁸/8=(2x+1)⁸/16+C.'},
    {q:'∫x·√(x²+1)dx',opts:['(x²+1)^(3/2)/3+C','√(x²+1)+C','x²√(x²+1)/2+C','(x²+1)^(1/2)/2+C'],ans:0,fb:'u=x²+1, du=2x dx. (1/2)∫√u du=(1/2)·u^(3/2)/(3/2)=u^(3/2)/3=(x²+1)^(3/2)/3+C.'},

  concept:`<div class="big-idea">Replace x with a trig function to convert a radical into something you can integrate.</div>

  tryit:{q:'For ∫1/√(1+x²)dx, which substitution?',opts:['x=sin(θ)','x=tan(θ)','x=sec(θ)','x=cos(θ)'],ans:1,hint:'√(a²+x²) type. Here a=1.',feedback:'x=tan(θ). Then 1+x²=1+tan²θ=sec²θ, and √(1+x²)=sec(θ).'},

    {q:'√(25−x²) with x=5sin(θ) simplifies to:',opts:['5tan(θ)','5cos(θ)','25cos(θ)','5sec(θ)'],ans:1,fb:'25−25sin²θ=25cos²θ. √(25cos²θ)=5cos(θ).'},
