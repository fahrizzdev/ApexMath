<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ApexMath Lessons</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ed;--bg2:#eae6df;--surface:#fff;
  --border:rgba(0,0,0,0.08);--text:#1a1916;--text2:#6b6860;--text3:#a8a49d;
  --accent:#2d5a27;--accent-light:rgba(45,90,39,0.08);--accent-mid:rgba(45,90,39,0.18);
  --red:#c0392b;--red-light:rgba(192,57,43,0.08);
  --gold:#92700a;--gold-bg:rgba(146,112,10,0.08);
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  width:280px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  height:100vh;position:sticky;top:0;
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-head{
  padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.sidebar-logo{font-family:'DM Serif Display',serif;font-size:1rem;letter-spacing:-.02em;color:var(--text)}
.sidebar-logo em{color:var(--accent);font-style:normal}
.sidebar-back{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);background:none;border:none;cursor:pointer;padding:.25rem;transition:color .2s}
.sidebar-back:hover{color:var(--accent)}
.sidebar-search{padding:.7rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-search input{width:100%;padding:.45rem .7rem;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;border-radius:4px}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-scroll{overflow-y:auto;flex:1;padding-bottom:2rem}
.level-group{border-bottom:1px solid var(--border)}
.level-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.65rem 1rem;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);background:none;border:none;width:100%;text-align:left;
  transition:background .15s;
}
.level-header:hover{background:var(--bg)}
.level-header.open{color:var(--accent);background:var(--accent-light)}
.level-arrow{font-size:.5rem;transition:transform .2s}
.level-header.open .level-arrow{transform:rotate(90deg)}
.lesson-list{display:none;flex-direction:column}
.level-header.open + .lesson-list{display:flex}
.lesson-btn{
  display:flex;align-items:center;gap:.6rem;
  padding:.55rem 1rem .55rem 1.5rem;
  background:none;border:none;cursor:pointer;text-align:left;
  transition:background .15s;border-left:2px solid transparent;
  font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text2);
  line-height:1.35;
}
.lesson-btn:hover{background:var(--bg);color:var(--text)}
.lesson-btn.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.lesson-btn.done .lb-dot{background:var(--accent)}
.lb-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;border:1.5px solid currentColor;opacity:.4}
.lesson-btn.active .lb-dot{background:var(--accent);opacity:1;border-color:var(--accent)}
.lesson-btn.done .lb-dot{background:var(--accent);opacity:.6;border-color:var(--accent)}

/* ── MAIN CONTENT ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.main-inner{max-width:740px;margin:0 auto;padding:2.5rem 2.5rem 5rem;width:100%}

/* Lesson nav */
.lesson-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;gap:1rem}
.lesson-nav-btn{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.38rem .85rem;background:none;border:1.5px solid var(--border);color:var(--text2);cursor:pointer;border-radius:4px;transition:all .2s}
.lesson-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.lesson-nav-btn:disabled{opacity:.3;cursor:default}
.lesson-crumb{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}

/* Lesson header */
.lesson-eyebrow{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.65rem}
.lesson-title{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:-.03em;color:var(--text);line-height:1.1;margin-bottom:.5rem}
.lesson-tagline{font-size:.95rem;color:var(--text2);line-height:1.75;margin-bottom:2rem;max-width:560px}

/* Progress bar */
.lesson-progress{height:3px;background:var(--bg2);margin-bottom:2rem;border-radius:99px;overflow:hidden}
.lesson-progress-fill{height:100%;background:var(--accent);transition:width .5s ease;border-radius:99px}

/* Content blocks */
.block{margin-bottom:2rem}
.block-label{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.block-label-icon{font-size:.85rem}

/* Concept box */
.concept-box{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:1.5rem;line-height:1.8;font-size:.95rem;color:var(--text2)}
.concept-box strong{color:var(--text);font-weight:500}
.concept-box .big-idea{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--text);line-height:1.4;margin-bottom:.75rem;letter-spacing:-.01em}
.concept-box .analogy{background:var(--gold-bg);border-left:3px solid var(--gold,#92700a);padding:.75rem 1rem;margin-top:.85rem;font-size:.88rem;border-radius:0 4px 4px 0}

/* Key formula box */
.formula-box{background:linear-gradient(135deg,var(--accent-light),rgba(45,90,39,.04));border:1.5px solid var(--accent-mid);border-radius:8px;padding:1.25rem 1.5rem;text-align:center}
.formula-display{font-family:'DM Mono',monospace;font-size:1.4rem;letter-spacing:.04em;color:var(--accent);margin-bottom:.4rem}
.formula-caption{font-size:.8rem;color:var(--text2);line-height:1.6}

/* Worked example */
.example-card{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:.85rem}
.example-header{background:var(--bg2);padding:.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.example-label{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.example-q{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--text);letter-spacing:-.01em}
.example-body{padding:1.25rem}
.step-list{display:flex;flex-direction:column;gap:.6rem}
.step{display:flex;gap:.85rem;align-items:flex-start}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:.55rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-content{flex:1;font-size:.9rem;color:var(--text2);line-height:1.7}
.step-content strong{color:var(--text);font-weight:500}
.step-content .math{font-family:'DM Mono',monospace;font-size:.88rem;background:var(--bg);border:1px solid var(--border);padding:.15rem .4rem;border-radius:3px;display:inline-block;color:var(--text)}
.step-content .math.answer{background:var(--accent-light);border-color:var(--accent-mid);color:var(--accent)}

/* Common mistakes */
.mistake-box{background:var(--red-light);border:1.5px solid rgba(192,57,43,.2);border-radius:8px;padding:1.1rem 1.25rem}
.mistake-item{display:flex;gap:.75rem;margin-bottom:.65rem;font-size:.88rem;line-height:1.65}
.mistake-item:last-child{margin-bottom:0}
.mistake-x{color:var(--red);font-size:.9rem;flex-shrink:0;margin-top:.1rem}
.mistake-text{color:var(--text2)}
.mistake-text strong{color:var(--red)}

/* Try it */
.tryit-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:1.5rem;transition:border-color .25s}
.tryit-card.answered-right{border-color:var(--accent);background:var(--accent-light)}
.tryit-card.answered-wrong{border-color:var(--red)}
.tryit-q{font-family:'DM Serif Display',serif;font-size:1.1rem;letter-spacing:-.01em;color:var(--text);margin-bottom:1.1rem;line-height:1.4}
.tryit-opts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.85rem}
.tryit-opt{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:var(--bg);border:1.5px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;text-align:left;font-size:.9rem;color:var(--text2)}
.tryit-opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.tryit-opt.correct{border-color:var(--accent)!important;background:var(--accent-light)!important;color:var(--accent)!important}
.tryit-opt.wrong{border-color:var(--red)!important;background:var(--red-light)!important;color:var(--red)!important}
.tryit-opt.disabled{cursor:default;pointer-events:none}
.tryit-letter{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.06em;color:var(--text3);flex-shrink:0;width:18px}
.tryit-hint-btn{background:none;border:none;font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);cursor:pointer;padding:0;margin-bottom:.75rem;display:flex;align-items:center;gap:.3rem;transition:color .2s}
.tryit-hint-btn:hover{color:var(--gold,#92700a)}
.tryit-hint{background:var(--gold-bg);border:1px solid rgba(146,112,10,.2);border-radius:5px;padding:.7rem .9rem;font-size:.86rem;color:var(--text2);line-height:1.7;margin-bottom:.75rem;display:none}
.tryit-hint.show{display:block;animation:fadeUp .25s ease}
.tryit-feedback{padding:.85rem 1rem;border-radius:6px;font-size:.88rem;line-height:1.7;display:none;animation:fadeUp .3s ease}
.tryit-feedback.right{background:var(--accent-light);color:var(--accent);display:block}
.tryit-feedback.wrong{background:var(--red-light);color:var(--red);display:block}
.tryit-feedback strong{font-weight:600}

/* Check section */
.check-section{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.check-header{background:var(--bg2);padding:.85rem 1.25rem;font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.check-body{padding:1.25rem;display:flex;flex-direction:column;gap:1.1rem}
.check-q{font-size:.92rem;color:var(--text);margin-bottom:.6rem;line-height:1.55}
.check-opts{display:flex;flex-direction:column;gap:.35rem}
.check-opt{display:flex;align-items:center;gap:.65rem;padding:.6rem .85rem;background:var(--bg);border:1.5px solid var(--border);border-radius:5px;cursor:pointer;transition:all .15s;font-size:.86rem;color:var(--text2)}
.check-opt:hover:not(.disabled){border-color:var(--accent);background:var(--accent-light)}
.check-opt.correct{border-color:var(--accent)!important;background:var(--accent-light)!important;color:var(--accent)!important}
.check-opt.wrong{border-color:var(--red)!important;background:var(--red-light)!important;color:var(--red)!important}
.check-opt.disabled{cursor:default;pointer-events:none}
.check-fb{font-size:.82rem;padding:.6rem .85rem;border-radius:4px;margin-top:.35rem;display:none;line-height:1.6}
.check-fb.show{display:block}
.check-fb.right{background:var(--accent-light);color:var(--accent)}
.check-fb.wrong{background:var(--red-light);color:var(--red)}
.check-score{display:none;text-align:center;padding:1.5rem;border-top:1px solid var(--border)}
.check-score.show{display:block}
.check-score-num{font-family:'DM Serif Display',serif;font-size:2.5rem;letter-spacing:-.03em;color:var(--text)}
.check-score-label{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:.25rem}
.check-score-msg{font-size:.88rem;color:var(--text2);margin-top:.6rem;line-height:1.6}

/* Done section */
.lesson-done{background:var(--accent-light);border:2px solid var(--accent-mid);border-radius:10px;padding:2rem;text-align:center;display:none}
.lesson-done.show{display:block;animation:fadeUp .4s ease}
.lesson-done-icon{font-size:2.5rem;margin-bottom:.75rem}
.lesson-done-title{font-family:'DM Serif Display',serif;font-size:1.5rem;letter-spacing:-.02em;color:var(--accent);margin-bottom:.35rem}
.lesson-done-sub{font-size:.88rem;color:var(--text2);line-height:1.65;margin-bottom:1.25rem}
.next-lesson-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;background:var(--accent);color:#fff;border:none;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px;transition:all .2s}
.next-lesson-btn:hover{opacity:.85;transform:translateY(-1px)}

/* Info tags */
.info-tag{display:inline-flex;align-items:center;gap:.3rem;font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .55rem;border:1px solid var(--border);border-radius:99px;color:var(--text3);margin-right:.3rem;margin-bottom:.5rem}
.info-tag.time{border-color:var(--accent-mid);color:var(--accent);background:var(--accent-light)}

/* Home screen */
.home-screen{display:flex;flex-direction:column;align-items:flex-start;padding:2.5rem 2.5rem 5rem;max-width:740px;margin:0 auto}
.home-eyebrow{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
.home-h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:-.035em;color:var(--text);line-height:1.08;margin-bottom:.75rem}
.home-sub{font-size:.96rem;color:var(--text2);line-height:1.75;max-width:500px;margin-bottom:2.5rem}
.level-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem;width:100%}
.level-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.level-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.level-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.level-card:hover::before{transform:scaleX(1)}
.lc-emoji{font-size:1.5rem;margin-bottom:.5rem}
.lc-name{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);letter-spacing:-.01em;margin-bottom:.25rem}
.lc-sub{font-size:.78rem;color:var(--text2);line-height:1.6}
.lc-count{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:.5rem}
.lc-prog{height:3px;background:var(--bg2);border-radius:99px;margin-top:.4rem;overflow:hidden}
.lc-prog-fill{height:100%;background:var(--accent);border-radius:99px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Mobile */
@media(max-width:700px){
  body{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar-scroll{max-height:280px}
  .main-inner{padding:1.5rem 1.25rem 4rem}
  .home-screen{padding:1.5rem 1.25rem 4rem}
  .level-cards{grid-template-columns:1fr}
}
</style>
</head>

L('0-01',{
  tagline:"Numbers have positions, and each position has a name. Understanding place value is what makes the entire number system make sense.",
  concept:`<div class="big-idea">Every digit in a number has a place, and that place tells you its value.</div>
In the number <strong>4,726</strong>, the digits don't all mean the same thing:
<br><br>• The <strong>4</strong> is in the thousands place → it means 4,000<br>• The <strong>7</strong> is in the hundreds place → it means 700<br>• The <strong>2</strong> is in the tens place → it means 20<br>• The <strong>6</strong> is in the ones place → it means 6
<br><br>So 4,726 = 4,000 + 700 + 20 + 6. This is called <strong>expanded form</strong>.
<div class="analogy">💡 Think of it like an address. "42 Oak Street" — the 4 means 40, not 4, because it's in the tens position. Same idea with numbers.</div>`,
  formula:{display:'4,726 = 4×1000 + 7×100 + 2×10 + 6×1',caption:'Expanded form shows each digit multiplied by its place value'},

      {t:'Identify the position of 5',d:'In 3,502 the digits are: 3 (thousands), <strong>5 (hundreds)</strong>, 0 (tens), 2 (ones)'},
      {t:'Multiply by place value',d:'5 is in the hundreds place, so its value is <span class="math answer">5 × 100 = 500</span>'},
    ]},
    {label:'Example 2',q:'Write 60,408 in expanded form.',steps:[
      {t:'Break apart each digit',d:'6 (ten-thousands), 0 (thousands), 4 (hundreds), 0 (tens), 8 (ones)'},
      {t:'Write as a sum',d:'<span class="math answer">6×10,000 + 0×1,000 + 4×100 + 0×10 + 8×1</span>'},

    ]},
  ],
  tryit:{q:'What is the value of the digit 3 in 73,150?',opts:['3','30','300','3,000'],ans:3,hint:'Find which position the 3 is in — count from the right: ones, tens, hundreds, thousands.',feedback:'The 3 is in the thousands position (4th from right). 3 × 1,000 = 3,000.'},
  mistakes:[
    {wrong:'Writing 4,726 as "4 thousand 7 hundred 2 tens 6"',right:'Always multiply: 4×1000, not just "4 thousand" — you need to know the actual number, not just the name.'},

L('0-05',{
  tagline:"When a math problem has multiple operations, you can't just go left to right. There's a specific order — and everyone has to use the same one so we all get the same answer.",
  concept:`<div class="big-idea">PEMDAS: Parentheses, Exponents, Multiplication, Division, Addition, Subtraction.</div>
Without a shared order of operations, 2 + 3 × 4 could mean (2+3)×4 = 20, OR 2+(3×4) = 14. We'd get different answers. That's chaos.
<br><br>So mathematicians agreed: <strong>multiplication always happens before addition, unless parentheses say otherwise</strong>.
<br><br>The full order:
<br>1. <strong>P</strong>arentheses — anything in ( ) first
<br>2. <strong>E</strong>xponents — powers like 3²
<br>3. <strong>M/D</strong> — Multiplication and Division, left to right
<br>4. <strong>A/S</strong> — Addition and Subtraction, left to right
<div class="analogy">💡 Remember: "Please Excuse My Dear Aunt Sally" — or just PEMDAS. M and D have equal priority (go left to right). Same for A and S.</div>`,
  formula:{display:'P → E → M/D → A/S',caption:'Always work through this order. For M/D and A/S, work left to right when both appear.'},
  examples:[
    {label:'Example 1',q:'Evaluate: 2 + 3 × 4',steps:[
      {t:'Check for parentheses or exponents',d:'None here.'},
      {t:'Multiplication first',d:'3 × 4 = <span class="math">12</span>'},
      {t:'Now add',d:'2 + 12 = <span class="math answer">14</span>'},
    ]},
    {label:'Example 2',q:'Evaluate: (5 + 1)² ÷ 4 − 2',steps:[
      {t:'Parentheses first',d:'(5 + 1) = <span class="math">6</span>'},
      {t:'Exponents next',d:'6² = <span class="math">36</span>'},
      {t:'Division (left to right with multiplication)',d:'36 ÷ 4 = <span class="math">9</span>'},
      {t:'Subtraction last',d:'9 − 2 = <span class="math answer">7</span>'},
    ]},
    {label:'Example 3',q:'Evaluate: 12 ÷ 4 × 3',steps:[
      {t:'Division and multiplication — go left to right',d:'12 ÷ 4 = <span class="math">3</span> (do this first because it\'s leftmost)'},
      {t:'Now multiply',d:'3 × 3 = <span class="math answer">9</span>'},
    ]},
  ],
  tryit:{q:'What is 8 + 2 × (5 − 1)?',opts:['40','16','24','10'],ans:1,hint:'Do the parentheses first: 5 − 1 = ?. Then multiply, then add.',feedback:'Parentheses: 5−1=4. Multiply: 2×4=8. Add: 8+8 = 16.'},
  mistakes:[
    {wrong:'Going left to right always: 2+3×4 = 5×4 = 20',right:'Multiplication comes before addition. 3×4=12 first, then 2+12=14.'},
    {wrong:'Doing M before D regardless of position',right:'M and D have equal rank. Go left to right: 12 ÷ 4 × 3 → do the ÷ first because it\'s on the left.'},
  ],
  check:[
    {q:'Evaluate: 3 + 4² − 5',opts:['14','22','42','12'],ans:0,fb:'Exponent first: 4²=16. Then 3+16−5=14.'},
    {q:'Evaluate: 20 ÷ (2 + 3) × 2',opts:['8','2','4','40'],ans:0,fb:'Parentheses: 2+3=5. Then left to right: 20÷5=4, then 4×2=8.'},
    {q:'Which is calculated first in 6 × 2 + 8 ÷ 4?',opts:['6 × 2','2 + 8','8 ÷ 4','The whole expression'],ans:0,fb:'M/D happen before A/S. Both 6×2 and 8÷4 happen before addition, but 6×2 is leftmost.'},
  ]
});

L('0-07',{
  tagline:"A fraction isn't just 'part of something' — it's a division problem. Once you see it that way, fractions stop being scary.",
  concept:`<div class="big-idea">A fraction a/b means: divide a into b equal parts and take a of them.</div>
The <strong>denominator</strong> (bottom number) tells you how many equal pieces the whole is cut into.<br>
The <strong>numerator</strong> (top number) tells you how many of those pieces you have.
<br><br>So 3/4 means: cut something into 4 equal pieces, and you have 3 of them.
<br><br><strong>Equivalent fractions</strong>: 1/2 = 2/4 = 3/6 = 50/100. They all represent the same amount — you just cut the same thing into more pieces.
<br><br><strong>Simplifying</strong>: divide top and bottom by the same number (their GCF). 6/8 → divide both by 2 → 3/4.
<div class="analogy">💡 1/2 of a pizza and 2/4 of the same pizza is the exact same amount — just cut differently. Equivalent fractions are the same size, different cuts.</div>`,
  formula:{display:'a/b means a ÷ b',caption:'The fraction bar IS a division sign. 3/4 = 3 ÷ 4 = 0.75'},
  examples:[
    {label:'Example 1',q:'Are 2/3 and 8/12 equivalent?',steps:[
      {t:'Multiply 2/3 to get 12 in denominator',d:'3 × 4 = 12, so multiply top too: 2 × 4 = 8'},
      {t:'Compare',d:'2/3 = 8/12 ✓ → <span class="math answer">Yes, they are equivalent</span>'},
    ]},
    {label:'Example 2',q:'Simplify 18/24.',steps:[
      {t:'Find the GCF of 18 and 24',d:'Factors of 18: 1,2,3,6,9,18 | Factors of 24: 1,2,3,4,6,8,12,24 → GCF = 6'},
      {t:'Divide both by GCF',d:'18÷6 = 3, 24÷6 = 4 → <span class="math answer">3/4</span>'},
    ]},
  ],
  tryit:{q:'Which fraction is equivalent to 2/5?',opts:['4/8','6/15','3/8','5/10'],ans:1,hint:'Multiply both the top and bottom of 2/5 by the same number.',feedback:'2×3=6 and 5×3=15, so 2/5 = 6/15. Check: 4/8=1/2, 3/8 is different, 5/10=1/2.'},
  mistakes:[
    {wrong:'Adding numerator and denominator to simplify: 6/8 → 6+2/8+2 = 8/10',right:'Simplify by dividing both by their GCF: 6÷2/8÷2 = 3/4.'},
    {wrong:'Thinking bigger denominator means bigger fraction',right:'1/10 is smaller than 1/3 — more pieces means each piece is smaller.'},
  ],
  check:[
    {q:'Simplify 12/16.',opts:['3/4','6/8','4/5','2/3'],ans:0,fb:'GCF of 12 and 16 is 4. 12÷4=3, 16÷4=4. Answer: 3/4.'},
    {q:'Which fraction is NOT equivalent to 1/3?',opts:['2/6','4/12','3/8','5/15'],ans:2,fb:'3/8: 1×8=8 ≠ 3×3=9. Not equivalent. All others multiply to equal 1/3.'},
    {q:'What is 3/4 as a division problem?',opts:['4 ÷ 3','3 ÷ 4','3 × 4','4 × 3'],ans:1,fb:'The fraction bar means divide. 3/4 = 3 ÷ 4 = 0.75.'},
  ]
});

L('0-11',{
  tagline:"Percentages are just fractions with 100 on the bottom — but they show up everywhere in real life, so this is one of the most useful math skills you'll learn.",
  concept:`<div class="big-idea">Percent means "per hundred." 40% = 40/100 = 0.40.</div>
Three things you need to be able to do:
<br><br><strong>1. Find the percentage of a number:</strong> convert % to decimal, then multiply.<br>20% of 80 = 0.20 × 80 = 16
<br><br><strong>2. Find what percent one number is of another:</strong> divide part by whole, multiply by 100.<br>15 is what % of 60? → 15/60 × 100 = 25%
<br><br><strong>3. Find percent change:</strong> (new − old) / old × 100<br>Price went from $40 to $50 → (50−40)/40 × 100 = 25% increase
<div class="analogy">💡 "Percent" literally comes from Latin "per centum" meaning "out of 100." A 30% sale means you save $30 on every $100 you would have spent.</div>`,

L('1-01',{
  tagline:"A variable is just a box with a label on it. That's it. Once you see it that way, algebra makes way more sense.",
  concept:`<div class="big-idea">A variable is a symbol (usually a letter) that represents an unknown or changing number.</div>
Instead of writing "some number," we write x. Instead of "the price," we write p.
<br><br>Variables let us write <strong>general rules</strong> that work for any number:
<br>• Area of a rectangle: A = length × width (works for ALL rectangles, not just one)
<br>• The rule "double a number and add 3" becomes: 2x + 3
<br><br>An <strong>expression</strong> has numbers and variables: 3x + 7<br>
An <strong>equation</strong> has an equals sign: 3x + 7 = 22 (making a claim that's either true or false)<br>
A <strong>solution</strong> is the value that makes the equation true.
<div class="analogy">💡 Think of x like a mystery box. The equation is a clue: "The mystery box, doubled, plus 3, equals 11." Your job is to figure out what's in the box.</div>`,
  examples:[
    {label:'Example 1',q:'If x = 5, what is 3x + 2?',steps:[

      {t:'Identify "twice a number n"',d:'"Twice n" means multiply by 2: <span class="math">2n</span>'},

L('1-04',{
  tagline:"Two-step equations are the backbone of algebra. Master this and you can solve almost any basic equation by following the same simple process every time.",
  concept:`<div class="big-idea">To solve an equation, undo everything that was done to the variable — in reverse order.</div>
In 2x + 3 = 11, two things happened to x: it was multiplied by 2, then 3 was added.
<br>To undo: first remove the 3 (subtract), then remove the 2 (divide). <strong>Last thing done gets undone first.</strong>
<br><br>The golden rule: <strong>whatever you do to one side, you must do to the other side</strong>. The equation is like a scale — keep it balanced.
<br><br>Steps:<br>1. Move constants to the right (add or subtract)<br>2. Isolate the variable (multiply or divide)<br>3. Check your answer by substituting back
<div class="analogy">💡 Think of the equation as a mystery box (x) that has been wrapped twice. The outer wrapping is +3. Unwrap that first (−3 from both sides). The inner wrapping is ×2. Unwrap that next (÷2 from both sides).</div>`,
  formula:{display:'2x + 3 = 11  →  x = 4',caption:'Subtract 3 from both sides, then divide both sides by 2'},
  examples:[
    {label:'Example 1',q:'Solve: 3x + 5 = 20',steps:[
      {t:'Subtract 5 from both sides',d:'3x + 5 − 5 = 20 − 5 → <span class="math">3x = 15</span>'},
      {t:'Divide both sides by 3',d:'3x ÷ 3 = 15 ÷ 3 → <span class="math answer">x = 5</span>'},
      {t:'Check: plug x = 5 back in',d:'3(5) + 5 = 15 + 5 = 20 ✓'},
    ]},
    {label:'Example 2',q:'Solve: x/4 − 2 = 6',steps:[
      {t:'Add 2 to both sides',d:'x/4 = 8'},
      {t:'Multiply both sides by 4',d:'x = <span class="math answer">32</span>'},
      {t:'Check',d:'32/4 − 2 = 8 − 2 = 6 ✓'},
    ]},
    {label:'Example 3',q:'Solve: −2x + 7 = 1',steps:[
      {t:'Subtract 7 from both sides',d:'−2x = −6'},
      {t:'Divide both sides by −2',d:'x = <span class="math answer">3</span>'},
    ]},
  ],
  tryit:{q:'Solve: 4x − 9 = 11',opts:['x = 2','x = 5','x = 20','x = 0.5'],ans:1,hint:'Add 9 to both sides first. Then divide by 4.',feedback:'4x − 9 = 11 → 4x = 20 → x = 5. Check: 4(5)−9 = 11 ✓'},
  mistakes:[
    {wrong:'Only doing the operation to one side: 2x + 3 = 11 → 2x = 11 − 3... wait, that\'s right — but often students forget the right side.',right:'Always do the same thing to BOTH sides. If you subtract 3 from the left, subtract 3 from the right too.'},
    {wrong:'Dividing before subtracting when there\'s a constant',right:'Always deal with addition/subtraction before multiplication/division (reverse PEMDAS order).'},
  ],
  check:[
    {q:'Solve: 5x + 2 = 27',opts:['x = 5','x = 25','x = 6','x = 4'],ans:0,fb:'5x = 25 → x = 5. Check: 5(5)+2=27 ✓'},
    {q:'Solve: x/3 + 4 = 10',opts:['x = 18','x = 2','x = 42','x = 6'],ans:0,fb:'x/3 = 6 → x = 18. Check: 18/3+4=10 ✓'},
    {q:'Solve: −3x + 12 = 0',opts:['x = 4','x = −4','x = 36','x = −36'],ans:0,fb:'−3x = −12 → x = 4. Check: −3(4)+12=0 ✓'},
  ]
});

L('1-08',{
  tagline:"Slope is the most important idea in all of early algebra. It shows up in physics, economics, data science, and everywhere else. Get this right.",
  concept:`<div class="big-idea">Slope measures steepness — how much y changes for every 1 unit x increases.</div>
If a line goes up 3 for every 1 it goes right, the slope is 3. If it goes down 2 for every 1 right, slope is −2. Flat line: slope is 0. Vertical line: slope is undefined.
<br><br><strong>Rise over run:</strong> m = (y₂ − y₁) / (x₂ − x₁)
<br><br>Given two points, subtract the y-values (rise) and divide by the difference of x-values (run). Order matters — be consistent. If you start with point 1 on top for y, start with point 1 on top for x too.
<br><br><strong>Sign of slope tells direction:</strong><br>
• Positive → line goes up left to right<br>• Negative → line goes down left to right<br>• Zero → horizontal<br>• Undefined → vertical
<div class="analogy">💡 Imagine walking along the line from left to right. Slope tells you: for every step forward, do you go up, down, or stay flat — and by how much?</div>`,
  formula:{display:'m = (y₂ − y₁) / (x₂ − x₁)',caption:'m is the standard letter for slope. Rise over run.'},
  examples:[
    {label:'Example 1',q:'Find the slope through (2, 3) and (6, 11).',steps:[
      {t:'Label your points',d:'(x₁,y₁) = (2,3) and (x₂,y₂) = (6,11)'},
      {t:'Plug into formula',d:'m = (11−3) / (6−2)'},
      {t:'Simplify',d:'m = 8/4 = <span class="math answer">2</span>'},
    ]},
    {label:'Example 2',q:'Find the slope through (−1, 5) and (3, −3).',steps:[
      {t:'Compute rise',d:'y₂ − y₁ = −3 − 5 = <span class="math">−8</span>'},
      {t:'Compute run',d:'x₂ − x₁ = 3 − (−1) = <span class="math">4</span>'},
      {t:'Divide',d:'m = −8/4 = <span class="math answer">−2</span>'},
    ]},
  ],
  tryit:{q:'What is the slope of the line through (1, 2) and (4, 8)?',opts:['2','6','1/2','3'],ans:0,hint:'Use (y₂−y₁)/(x₂−x₁). Subtract y-values, then divide by x-values subtracted.',feedback:'(8−2)/(4−1) = 6/3 = 2.'},
  mistakes:[
    {wrong:'Flipping rise and run: using (x₂−x₁)/(y₂−y₁)',right:'Always rise OVER run. y-difference on top, x-difference on bottom.'},
    {wrong:'Mixing up which point is "1" and which is "2"',right:'It doesn\'t matter which point you call #1 — just be consistent. Use the same order for both x and y.'},
  ],
  check:[
    {q:'What is the slope through (0, 4) and (2, 0)?',opts:['2','−2','1/2','4'],ans:1,fb:'(0−4)/(2−0) = −4/2 = −2. Negative because the line goes down.'},
    {q:'A line has slope 3. If x increases by 1, y increases by how much?',opts:['1','1/3','3','−3'],ans:2,fb:'Slope = rise/run. If run = 1, rise = slope = 3.'},
    {q:'What is the slope of a horizontal line?',opts:['1','undefined','0','−1'],ans:2,fb:'Horizontal lines have no rise (Δy=0). 0/anything = 0.'},
  ]
});

L('1-09',{
  tagline:"y = mx + b is the most useful equation in all of algebra. Once you understand what m and b actually mean, you can graph any line and write any line's equation instantly.",
  concept:`<div class="big-idea">In y = mx + b, m is the slope and b is where the line crosses the y-axis.</div>
The <strong>y-intercept</strong> (b) is the starting point — where x = 0. It's the point (0, b) on the graph.
<br>The <strong>slope</strong> (m) tells you: for every 1 step right, go m steps up (or down if m is negative).
<br><br>To <strong>graph</strong> a line:<br>1. Plot the y-intercept (0, b)<br>2. From there, apply the slope (rise/run)<br>3. Draw the line through both points
<br><br>To <strong>write the equation</strong> from a graph:<br>1. Read off the y-intercept (b)<br>2. Find the slope from two points (m)<br>3. Plug both into y = mx + b
<div class="analogy">💡 A taxi starts with a $3 base fee (b = 3) and charges $2 per mile (m = 2). The total cost: y = 2x + 3. The base fee is the y-intercept. The cost per mile is the slope.</div>`,
  formula:{display:'y = mx + b',caption:'m = slope (steepness), b = y-intercept (where line hits y-axis)'},
  examples:[
    {label:'Example 1',q:'Graph y = 2x − 3.',steps:[
      {t:'Identify b',d:'b = −3, so start at (0, −3)'},
      {t:'Apply slope m = 2',d:'Rise 2, run 1. From (0, −3), go right 1 and up 2 → (1, −1). Mark both points.'},
      {t:'Draw the line',d:'Connect the points and extend in both directions.'},
    ]},
    {label:'Example 2',q:'Write the equation of a line with slope 3 through (0, −5).',steps:[
      {t:'m = 3 (given)',d:''},
      {t:'b = −5 (y-intercept is given)',d:'The point (0, −5) IS the y-intercept'},
      {t:'Plug into y = mx + b',d:'<span class="math answer">y = 3x − 5</span>'},
    ]},
    {label:'Example 3',q:'Write the equation through (2, 7) and (4, 13).',steps:[

  concept:`<div class="big-idea">All exponent rules come from the definition: xⁿ means x multiplied by itself n times.</div>

  concept:`<div class="big-idea">To differentiate xⁿ: bring the exponent down in front, then reduce the exponent by 1. d/dx[xⁿ] = nxⁿ⁻¹</div>

L('5-05',{
  tagline:"The chain rule unlocks composite functions — functions inside functions. It's the most important differentiation technique after the power rule.",
  concept:`<div class="big-idea">For a composite function f(g(x)), the derivative is f'(g(x)) · g'(x). Derivative of outside times derivative of inside.</div>
Think of it as peeling layers of an onion: differentiate the outer layer (leaving the inner layer unchanged), then multiply by the derivative of the inner layer.
<br><br>Steps:<br>
1. Identify the outer function f and inner function g<br>
2. Differentiate f (treat g(x) like a single variable)<br>
3. Multiply by g'(x)
<br><br>Examples of identifying layers:<br>
• sin(3x): outer = sin, inner = 3x<br>
• (x²+1)⁵: outer = ()⁵, inner = x²+1<br>
• e^(x³): outer = eˣ, inner = x³
<div class="analogy">💡 You're wearing a shirt inside a jacket. To "undo" your outfit: take off jacket first (differentiate outer), then take off shirt (multiply by derivative of inner). Can't just yank the shirt — jacket has to come off in the right way.</div>`,
  formula:{display:"d/dx[f(g(x))] = f'(g(x)) · g'(x)",caption:'Outside derivative (evaluated at inside) TIMES inside derivative'},
  examples:[
    {label:'Example 1',q:'Differentiate y = (3x + 2)⁴.',steps:[
      {t:'Outer function: ()⁴, Inner: 3x+2',d:''},
      {t:'Differentiate outer (treat inner as one variable)',d:'4(3x+2)³'},
      {t:'Multiply by derivative of inner',d:'d/dx[3x+2] = 3'},
      {t:'Combine',d:'y\' = <span class="math answer">4(3x+2)³ · 3 = 12(3x+2)³</span>'},
    ]},
    {label:'Example 2',q:'Differentiate y = sin(x²).',steps:[
      {t:'Outer: sin( ), Inner: x²',d:''},
      {t:'Derivative of sin is cos — leave inner alone',d:'cos(x²)'},
      {t:'Multiply by derivative of x²',d:'cos(x²) · 2x'},
      {t:'Answer',d:'y\' = <span class="math answer">2x cos(x²)</span>'},

  tryit:{q:"Find d/dx[(5x+1)³].",opts:['3(5x+1)²','15(5x+1)²','3(5x+1)²·5','(5x+1)²'],ans:1,hint:'Outer: ()³. Inner: 5x+1. Apply chain rule: 3(5x+1)² × d/dx[5x+1].',feedback:'d/dx[inner] = 5. So: 3(5x+1)² × 5 = 15(5x+1)².'},

L('5-14',{
  tagline:"The Fundamental Theorem of Calculus is the most important theorem in all of calculus. It reveals that differentiation and integration are inverse operations.",
  concept:`<div class="big-idea">Part 1: If F(x) = ∫ₐˣ f(t)dt, then F'(x) = f(x). Part 2: ∫ₐᵇ f(x)dx = F(b) − F(a).</div>
<strong>Part 2 is what you use most.</strong> It says: to compute the definite integral (area under f from a to b), find any antiderivative F, then compute F(b) − F(a).
<br><br>This is huge. Before this theorem, computing areas required summing infinite tiny rectangles. Now you just need an antiderivative and two subtraction steps.
<br><br><strong>Process for ∫ₐᵇ f(x)dx:</strong><br>
1. Find the antiderivative F(x)<br>
2. Compute F(b) − F(a)<br>
3. Done.
<div class="analogy">💡 Imagine filling a bathtub. The rate the water flows in is f(t). The total water added from time a to b is ∫ₐᵇ f(t)dt = F(b)−F(a). Integration counts up all the tiny drips over time into a total. The FTC says the total is just the antiderivative evaluated at the endpoints.</div>`,
  formula:{display:'∫ₐᵇ f(x)dx = F(b) − F(a)',caption:'Where F is any antiderivative of f (F\'=f). Evaluate at top limit minus bottom limit.'},
  examples:[
    {label:'Example 1',q:'Evaluate ∫₁³ x² dx.',steps:[
      {t:'Find antiderivative of x²',d:'F(x) = x³/3'},
      {t:'Evaluate at b=3 and a=1',d:'F(3) = 27/3 = 9, F(1) = 1/3'},
      {t:'Subtract: F(b) − F(a)',d:'9 − 1/3 = <span class="math answer">26/3</span>'},
    ]},
    {label:'Example 2',q:'Evaluate ∫₀² (3x² + 2) dx.',steps:[
      {t:'Antiderivative term by term',d:'F(x) = x³ + 2x'},
      {t:'F(2) = 8 + 4 = 12',d:''},
      {t:'F(0) = 0',d:''},
      {t:'Answer: 12 − 0 = <span class="math answer">12</span>',d:''},
    ]},
  ],
  tryit:{q:'Evaluate ∫₀¹ 4x³ dx.',opts:['1','4','3','2'],ans:0,hint:'Antiderivative of 4x³ is x⁴. Then evaluate at x=1 and x=0.',feedback:'F(x) = x⁴. F(1)−F(0) = 1−0 = 1.'},
  mistakes:[
    {wrong:'Forgetting to subtract: just computing F(b)',right:'It\'s F(b) MINUS F(a). Both endpoints matter.'},
    {wrong:'Evaluating a before b: F(a)−F(b)',right:'Upper limit minus lower limit: F(b)−F(a). Top minus bottom.'},

  check:[

    {q:'The FTC connects differentiation and integration by showing they are:',opts:['The same operation','Inverse operations','Unrelated','Both equivalent to limits'],ans:1,fb:'The FTC reveals that differentiation and integration are inverses — like multiplication and division.'},
  ]
});

L('6-02',{
  tagline:"Integration by parts is to integration what the product rule is to differentiation. It lets you integrate products of functions.",
  concept:`<div class="big-idea">∫u dv = uv − ∫v du. Choose u and dv wisely — that's the whole skill.</div>
This comes directly from the product rule reversed. It trades a hard integral for (hopefully) an easier one.
<br><br><strong>LIATE rule for choosing u:</strong> Pick the first type from this list:
<br>L — Logarithm (ln x)<br>I — Inverse trig (arctan x)<br>A — Algebraic (x², x, etc.)<br>T — Trig (sin x, cos x)<br>E — Exponential (eˣ)
<br><br>Then dv = everything else.
<br><br>Steps:<br>1. Pick u (use LIATE)<br>2. Differentiate to get du<br>3. dv = everything remaining<br>4. Integrate to get v<br>5. Apply formula: uv − ∫v du
<div class="analogy">💡 You have ∫x·eˣ dx. Which is easier to differentiate vs. integrate? x gets simpler when differentiated (→1). eˣ stays the same. So u=x, dv=eˣdx. The product rule runs in reverse.</div>`,
  formula:{display:'∫u dv = uv − ∫v du',caption:'LIATE: choose u as the first applicable type (L, I, A, T, E)'},
  examples:[
    {label:'Example 1',q:'Evaluate ∫x·eˣ dx.',steps:[
      {t:'Choose u and dv (LIATE: A before E)',d:'u = x, dv = eˣ dx'},
      {t:'Find du and v',d:'du = dx, v = eˣ'},
      {t:'Apply formula',d:'∫x·eˣ dx = x·eˣ − ∫eˣ dx'},
      {t:'Integrate',d:'= x·eˣ − eˣ + C = <span class="math answer">eˣ(x−1) + C</span>'},
    ]},
    {label:'Example 2',q:'Evaluate ∫ln(x) dx.',steps:[
      {t:'LIATE: L comes first, so u = ln x',d:'dv = dx → v = x'},
      {t:'du = 1/x dx',d:''},
      {t:'Apply formula',d:'x·ln(x) − ∫x · (1/x) dx = x·ln(x) − ∫1 dx'},
      {t:'Integrate',d:'<span class="math answer">x·ln(x) − x + C</span>'},
    ]},
  ],
  tryit:{q:'For ∫x·cos(x) dx, what should u be?',opts:['cos(x)','x','dx','1'],ans:1,hint:'Use LIATE: A (algebraic) comes before T (trig).',feedback:'u = x (algebraic), dv = cos(x)dx (trig). Then: x·sin(x) − ∫sin(x)dx = x·sin(x) + cos(x) + C.'},

L('6-07',{
  tagline:"Series convergence is about whether an infinite sum has a finite answer. These tests tell you yes or no — and sometimes how much.",
  concept:`<div class="big-idea">An infinite series ∑aₙ converges if the sum of infinitely many terms reaches a finite number. Otherwise it diverges (blows up or oscillates).</div>
<strong>The key tests:</strong>
<br><br><strong>1. Divergence Test:</strong> If lim(aₙ) ≠ 0 as n→∞, the series definitely diverges. (If aₙ → 0, the test is inconclusive.)
<br><br><strong>2. Geometric Series:</strong> ∑arⁿ converges if |r| < 1. Sum = a/(1−r).
<br><br><strong>3. p-Series:</strong> ∑1/nᵖ converges if p > 1, diverges if p ≤ 1.
<br><br><strong>4. Ratio Test:</strong> Compute L = lim|aₙ₊₁/aₙ|. If L < 1: converges. L > 1: diverges. L = 1: inconclusive.
<br><br><strong>5. Comparison Test:</strong> Compare to a known series.
<div class="analogy">💡 Think of it like stacking blocks. Do the blocks get small enough, fast enough, that the stack stays finite? The divergence test checks if the blocks are getting small at all. The ratio test checks how fast.</div>`,
  formula:{display:'Geometric: S = a/(1−r) when |r| < 1',caption:'The geometric series is the only type with a clean closed-form sum formula'},
  examples:[
    {label:'Example 1',q:'Does ∑(1/2)ⁿ converge?',steps:[
      {t:'This is a geometric series',d:'a=1, r=1/2, |r|=1/2 < 1 → converges'},
      {t:'Compute the sum',d:'S = 1/(1−1/2) = 1/(1/2) = <span class="math answer">2</span>'},
    ]},
    {label:'Example 2',q:'Does ∑ n/(n+1) converge?',steps:[
      {t:'Apply divergence test: find lim as n→∞',d:'lim n/(n+1) = lim 1/(1+1/n) = 1'},
      {t:'Limit ≠ 0',d:'Series <span class="math answer">diverges</span> (divergence test)'},
    ]},
    {label:'Example 3',q:'Does ∑ 1/n² converge?',steps:[
      {t:'p-series with p=2',d:'p = 2 > 1 → <span class="math answer">converges</span>'},
    ]},
  ],
  tryit:{q:'Does the series ∑(3/4)ⁿ converge?',opts:['Yes, sum = 4','Yes, sum = 3','No, it diverges','Cannot determine'],ans:0,hint:'Check if this is a geometric series. What is r? Is |r| < 1?',feedback:'Geometric series, r=3/4, |r|<1 → converges. Sum = 1/(1−3/4) = 1/(1/4) = 4.'},
  mistakes:[
    {wrong:'Thinking that aₙ→0 guarantees convergence',right:'aₙ→0 is NECESSARY but not sufficient. ∑1/n diverges even though 1/n→0 (harmonic series).'},
    {wrong:'Using geometric series formula for all series',right:'S=a/(1−r) ONLY works for geometric series. Other convergent series need different sum formulas.'},

L('0-02',{

  concept:`<div class="big-idea">Addition combines groups. Subtraction removes or finds the difference.</div>
The standard algorithm works column by column, right to left, using <strong>regrouping</strong> (carrying/borrowing).
<br><br><strong>Addition regrouping:</strong> When a column adds to 10 or more, write the ones digit and carry the tens digit to the next column.
<br><br><strong>Subtraction borrowing:</strong> When the top digit is smaller than the bottom, borrow 10 from the next column left.
<br><br>Big trick: always line up your place values (ones under ones, tens under tens) before adding or subtracting.
<div class="analogy">💡 Think of each column as a separate pile. You can only carry to the next pile when yours overflows past 9. Borrowing is just asking your neighbor for 10.</div>`,

      {t:'Hundreds: 9−7=2',d:'<span class="math">2</span>'},

L('0-03',{
  tagline:"Multiplication is just fast adding — but the algorithm lets you handle any size number without adding thousands of times.",
  concept:`<div class="big-idea">Multiplication is repeated addition. 6 × 4 means 6 added 4 times: 6+6+6+6 = 24.</div>
<strong>The multiplication algorithm</strong> (long multiplication) works by multiplying the top number by each digit of the bottom number, then adding the partial products.
<br><br>Key facts to have memorized (or be very quick at): the times tables 1–12.
<br><br>When multiplying by a multi-digit number, shift each partial product one place left for each digit position.

L('0-04',{
  tagline:"Division is the opposite of multiplication — and once you see the connection, it clicks. Every division problem is really asking a multiplication question.",
  concept:`<div class="big-idea">a ÷ b asks: how many groups of b fit into a? Or: what times b equals a?</div>
<strong>Long division</strong> breaks a big problem into steps: Divide → Multiply → Subtract → Bring down. Repeat.
<br><br>The number being divided is the <strong>dividend</strong>. The number dividing it is the <strong>divisor</strong>. The answer is the <strong>quotient</strong>. What's left over is the <strong>remainder</strong>.
<br><br>If 5 doesn't divide evenly into 23, the remainder is 23 − (4×5) = 3. Written as 23 ÷ 5 = 4 R3.
<div class="analogy">💡 Division is like sharing equally. 24 cookies ÷ 4 friends = 6 each. If it doesn't divide evenly, some cookies are left over — that's the remainder.</div>`,
  formula:{display:'Divide → Multiply → Subtract → Bring down',caption:'Repeat until no digits remain'},
  examples:[

      {t:'Bring down 5. 7 into 5 = 0',d:'Write 0. 0×7=0, subtract: 5'},
      {t:'Bring down 6. 7 into 56 = 8',d:'Write 8. 8×7=56, subtract: 0'},
      {t:'No remainder',d:'<span class="math answer">756 ÷ 7 = 108</span>'},
    ]},
    {label:'Example 2',q:'Divide: 845 ÷ 4',steps:[
      {t:'4 into 8 = 2',d:'Subtract 8, bring down 4'},
      {t:'4 into 04 = 1',d:'Subtract 4, bring down 5'},
      {t:'4 into 5 = 1 remainder 1',d:'<span class="math answer">845 ÷ 4 = 211 R1</span>'},

  mistakes:[

L('0-06',{
  tagline:"GCF and LCM sound complicated but they're just about listing factors and multiples — and they become essential when you work with fractions.",
  concept:`<div class="big-idea">Factors divide evenly into a number. Multiples are what you get when you multiply a number by 1, 2, 3…</div>
<strong>Factor:</strong> 3 is a factor of 12 because 12 ÷ 3 = 4 (no remainder).
<br>Factors of 12: 1, 2, 3, 4, 6, 12
<br><br><strong>GCF (Greatest Common Factor):</strong> the biggest factor that two numbers share.
<br>GCF(12, 18): Factors of 12: {1,2,3,4,6,12}. Factors of 18: {1,2,3,6,9,18}. Shared: {1,2,3,6}. GCF = 6.
<br><br><strong>LCM (Least Common Multiple):</strong> the smallest number that both numbers divide into evenly.
<br>LCM(4, 6): Multiples of 4: 4,8,12,16… Multiples of 6: 6,12,18… First shared: 12. LCM = 12.
<div class="analogy">💡 GCF is used for simplifying fractions (divide by GCF). LCM is used for adding fractions (find common denominator = LCM of denominators).</div>`,
  formula:{display:'GCF: biggest shared factor | LCM: smallest shared multiple',caption:'Use prime factorization for larger numbers'},
  examples:[

<br><br><strong>Simplify before multiplying</strong> (cross-cancel) to keep numbers small:

0.47 = 47/100. The decimal point separates the whole number part from the fractional part.
<br><br><strong>Comparing decimals:</strong> line up decimal points. 0.5 vs 0.48 — compare tenths first: 5 > 4, so 0.5 > 0.48.

<br><br><strong>Multiplying decimals:</strong> multiply ignoring decimals, then count total decimal places in both numbers and place the point.

L('0-12',{
  tagline:"Negative numbers show up in temperature, debt, sea level, and scores. They're not scary — they're just numbers below zero.",
  concept:`<div class="big-idea">Negative numbers are numbers less than zero. −3 means "3 below zero."</div>
The number line extends left of zero into negatives: …−4, −3, −2, −1, 0, 1, 2…
<br><br><strong>Absolute value |x|</strong> is the distance from zero — always positive. |−7| = 7. |4| = 4.
<br><br><strong>Adding negatives:</strong>
<br>• Positive + positive = add, positive: 3 + 4 = 7
<br>• Negative + negative = add, negative: −3 + (−4) = −7
<br>• Opposite signs = subtract the distances, keep sign of larger: −3 + 7 = 4; 3 + (−7) = −4
<br><br><strong>Subtracting negatives:</strong> a − (−b) = a + b. "Minus a negative = plus."
<br>5 − (−3) = 5 + 3 = 8
<br><br><strong>Multiplying/Dividing:</strong> same signs = positive. Different signs = negative.
<div class="analogy">💡 Think of negatives as debt. You have $5 (positive). Spending $3 means −3. If someone cancels your debt (subtracts a negative), that's the same as giving you money.</div>`,

L('0-13',{
  tagline:"Ratios and proportions are how the world compares things — recipes, maps, speeds, prices. This is one of the most practical math skills there is.",
  concept:`<div class="big-idea">A ratio compares two quantities. A proportion says two ratios are equal.</div>
Ratio of 3 apples to 5 oranges = 3:5 = 3/5. Ratios can be written with a colon, the word "to," or as a fraction.
<br><br><strong>Unit rate</strong>: a ratio with 1 in the denominator. 60 miles per hour = 60 miles / 1 hour.
<br><br><strong>Proportions</strong>: 3/5 = 6/10 is a proportion — the two ratios are equal.
<br>To solve: use <strong>cross multiplication</strong>. If a/b = c/d, then ad = bc.
<br>3/5 = x/20 → 3×20 = 5×x → 60 = 5x → x = 12.
<br><br><strong>Scaling</strong>: if a recipe for 4 people needs 2 cups flour, for 10 people you need 2/4 × 10 = 5 cups.
<div class="analogy">💡 A map might say "1 cm = 50 km." That's a ratio. If a road is 3.5 cm on the map, it's 175 km in real life — that's a proportion.</div>`,

      {t:'Divide both sides by 7',d:'x = <span class="math answer">20</span>'},

L('1-02',{
  tagline:"Expressions are the sentences of algebra. You need to be able to read them, write them, and evaluate them — this is the foundation of everything.",
  concept:`<div class="big-idea">An expression is a combination of numbers, variables, and operations. It has no equals sign.</div>
<strong>Terms:</strong> parts of an expression separated by + or −. In 3x² + 5x − 7, the terms are 3x², 5x, and −7.
<br><strong>Coefficients:</strong> the number in front of a variable. In 3x², the coefficient is 3.
<br><strong>Constants:</strong> terms with no variable. −7 is a constant.
<br><strong>Like terms:</strong> terms with the same variable and exponent. 3x and 7x are like terms. 3x and 3x² are not.
<br><br><strong>Evaluating:</strong> substitute the given value for each variable, then compute.
<br>Evaluate 2x² − 3x + 1 for x = 4: 2(16) − 3(4) + 1 = 32 − 12 + 1 = 21.
<br><br><strong>Simplifying:</strong> combine like terms. 4x + 3y − x + 2y = 3x + 5y.
<div class="analogy">💡 Like terms are like piles of the same fruit. 4 apples + 3 oranges − 1 apple = 3 apples + 3 oranges. You can only combine the apple piles with each other.</div>`,
  examples:[

    ]},

L('1-03',{
  tagline:"One-step equations are the simplest case of solving — but the logic here (do the opposite to both sides) applies to every equation you'll ever solve.",
  concept:`<div class="big-idea">Solving an equation means finding the value of the variable that makes both sides equal.</div>
The strategy: whatever operation was done to the variable, do the opposite to both sides.
<br><br>• Variable + a = b → subtract a from both sides: x = b − a
<br>• Variable − a = b → add a to both sides: x = b + a
<br>• a × variable = b → divide both sides by a: x = b/a
<br>• variable/a = b → multiply both sides by a: x = ab
<br><br>Always check by substituting your answer back into the original equation.
<div class="analogy">💡 An equation is a balanced scale. Whatever you do to one side, you must do to the other to keep it balanced. Remove the 5 from x+5=12? Remove it from both sides: x=7.</div>`,
  formula:{display:'Do the inverse operation to both sides',caption:'Check: substitute answer back in to verify'},
  examples:[

      {t:'Subtract 11 from both sides',d:'x + 11 − 11 = 20 − 11'},
      {t:'Simplify',d:'<span class="math answer">x = 9</span>'},
      {t:'Check',d:'9 + 11 = 20 ✓'},

    {label:'Example 2',q:'Solve: 6x = 42',steps:[
      {t:'Divide both sides by 6',d:'6x/6 = 42/6'},
      {t:'Simplify',d:'<span class="math answer">x = 7</span>'},
    ]},
    {label:'Example 3',q:'Solve: x/5 = −3',steps:[
      {t:'Multiply both sides by 5',d:'x/5 × 5 = −3 × 5'},
      {t:'Result',d:'<span class="math answer">x = −15</span>'},
    ]},
  ],
  tryit:{q:'Solve: y − 8 = 15',opts:['y=7','y=23','y=−7','y=13'],ans:1,hint:'Add 8 to both sides to undo the subtraction.',feedback:'y − 8 + 8 = 15 + 8 → y = 23.'},
  mistakes:[
    {wrong:'Solving x + 5 = 12 by subtracting 5 from the left only: getting x = 12',right:'Always do the same thing to BOTH sides. x + 5 − 5 = 12 − 5 → x = 7.'},
    {wrong:'Dividing only the term with x: for 3x = 15, writing x = 15 (forgetting to divide)',right:'3x = 15. Divide BOTH sides by 3: x = 5.'},

L('1-05',{
  tagline:"Multi-step equations are just one-step and two-step equations chained together. The process is always the same — simplify, then isolate.",
  concept:`<div class="big-idea">Clear the clutter first: distribute, combine like terms, then solve like a two-step equation.</div>
Standard strategy for any multi-step equation:
<br>1. <strong>Distribute</strong> if there are parentheses: 3(x+2) = 3x + 6
<br>2. <strong>Combine like terms</strong> on each side
<br>3. <strong>Move variable terms</strong> to one side (add/subtract)
<br>4. <strong>Isolate the variable</strong> (multiply/divide)
<br><br><strong>Variables on both sides:</strong> get them all on one side first.
<br>5x − 3 = 2x + 9 → subtract 2x from both sides → 3x − 3 = 9 → x = 4
<div class="analogy">💡 Think of the equation as a messy room. First clean up each side (distribute, combine). Then move the furniture (variable terms) to one side. Then solve.</div>`,
  formula:{display:'Distribute → Combine like terms → Move variables → Solve',caption:'Same process every time, regardless of complexity'},
  examples:[

      {t:'Combine like terms',d:'7x − 8 = 13'},
      {t:'Add 8 to both sides',d:'7x = 21'},
      {t:'Divide by 7',d:'<span class="math answer">x = 3</span>'},
    ]},
    {label:'Example 2',q:'Solve: 4x + 5 = 2x − 7',steps:[
      {t:'Subtract 2x from both sides',d:'2x + 5 = −7'},
      {t:'Subtract 5 from both sides',d:'2x = −12'},
      {t:'Divide by 2',d:'<span class="math answer">x = −6</span>'},
    ]},
  ],

L('1-10',{

  concept:`<div class="big-idea">A system of equations has 1 solution (the intersection point), no solution (parallel lines), or infinitely many solutions (same line).</div>

L('1-11',{

  concept:`<div class="big-idea">A polynomial is an expression with one or more terms with whole-number exponents: 3x², 5x + 2, x³ − 2x + 1.</div>
<strong>Adding polynomials:</strong> combine like terms. (3x² + 2x) + (x² − 5) = 4x² + 2x − 5.

<br><br>FOIL stands for: <strong>F</strong>irst, <strong>O</strong>uter, <strong>I</strong>nner, <strong>L</strong>ast

<br>Result: x² + 5x + 3x + 15 = x² + 8x + 15
<div class="analogy">💡 FOIL is just the distributive property applied twice. (x+3)(x+5) means multiply (x+5) by x, then by 3. Every term in the first multiplies every term in the second.</div>`,

L('1-12',{
  tagline:"Factoring is FOIL in reverse — and it's one of the highest-leverage skills in algebra. Everything from solving quadratics to simplifying fractions requires it.",
  concept:`<div class="big-idea">Factoring means writing an expression as a product. x² + 5x + 6 = (x+2)(x+3).</div>
<strong>Factoring ax² + bx + c (when a=1):</strong>
<br>Find two numbers that multiply to c and add to b.
<br>x² + 5x + 6: find two numbers × = 6 and + = 5 → 2 and 3 → (x+2)(x+3)
<br><br><strong>When a ≠ 1:</strong> use the AC method.
<br>2x² + 7x + 3: multiply a×c = 6. Find factors of 6 that add to 7: 6 and 1.
<br>Rewrite: 2x² + 6x + x + 3. Group: 2x(x+3) + 1(x+3) = (2x+1)(x+3).
<br><br><strong>Special cases:</strong>
<br>• Difference of squares: a² − b² = (a+b)(a−b)
<br>• Perfect square trinomial: a² + 2ab + b² = (a+b)²
<div class="analogy">💡 To factor x² + 5x + 6, you need two numbers that are "roommates": they share an apartment (multiply to 6) and their height difference adds to 5. Answer: 2 and 3.</div>`,
  formula:{display:'x²+bx+c = (x+p)(x+q) where p+q=b and p×q=c',caption:'Find two numbers that multiply to c and add to b'},
  examples:[
    {label:'Example 1',q:'Factor: x² + 7x + 12',steps:[
      {t:'Find two numbers: × = 12, + = 7',d:'Try: 3 and 4 (3×4=12, 3+4=7) ✓'},
      {t:'Write factored form',d:'<span class="math answer">(x+3)(x+4)</span>'},
      {t:'Check with FOIL',d:'x²+4x+3x+12=x²+7x+12 ✓'},

    {label:'Example 2',q:'Factor: x² − 5x − 14',steps:[

  mistakes:[

L('2-03',{
  tagline:"Polynomial operations are just arithmetic applied to algebraic expressions. If you can add 23 + 17, you can add polynomials.",
  concept:`<div class="big-idea">Polynomials can be added, subtracted, and multiplied. The key is handling like terms and the distributive property carefully.</div>
<strong>Adding/Subtracting:</strong> combine like terms (same variable, same exponent).
<br>(3x² + 2x − 1) + (x² − 5x + 3) = 4x² − 3x + 2
<br><br><strong>When subtracting, distribute the negative:</strong>
<br>(3x² + 2x) − (x² − 5) = 3x² + 2x − x² + 5 = 2x² + 2x + 5
<br><br><strong>Multiplying polynomials:</strong> every term in the first multiplies every term in the second.
<br>(x+2)(x² − 3x + 1): distribute x across all, then 2 across all. Combine like terms.
<div class="analogy">💡 Subtracting a polynomial is like distributing a −1 to every term inside. Be extra careful with signs — this is where most errors happen.</div>`,
  formula:{display:'(a−b)·p = −ap + bp (distribute the negative)',caption:'Multiply: every term by every term'},
  examples:[

L('2-04',{
  tagline:"Complete factoring means factoring until nothing factors further. It's like reducing a fraction all the way — never stop at the first step.",
  concept:`<div class="big-idea">Always factor out the GCF first. Then look for special patterns or factor by grouping.</div>
<strong>Order of factoring:</strong>
<br>1. GCF (always first)
<br>2. Is it a difference of squares? a² − b² = (a+b)(a−b)
<br>3. Is it a perfect square trinomial? a²+2ab+b² = (a+b)²
<br>4. Is it a sum/difference of cubes? a³−b³ = (a−b)(a²+ab+b²)
<br>5. Trinomials: factor as (ax+b)(cx+d)
<br>6. 4 terms: factor by grouping
<br><br>Check: can any factor be factored further? If yes, keep going.
<div class="analogy">💡 Factoring is like peeling an onion. Pull off the outer layer (GCF), then look at what remains. Keep peeling until there are no more layers.</div>`,
  formula:{display:'a³−b³=(a−b)(a²+ab+b²) | a³+b³=(a+b)(a²−ab+b²)',caption:'Sum/difference of cubes — memorize these patterns'},
  examples:[
    {label:'Example 1',q:'Factor completely: 2x³ − 8x',steps:[
      {t:'GCF = 2x',d:'2x(x² − 4)'},
      {t:'x² − 4 is difference of squares',d:'2x(x+2)(x−2)'},
      {t:'Can any factor reduce more?',d:'No. <span class="math answer">2x(x+2)(x−2)</span>'},
    ]},
    {label:'Example 2',q:'Factor: x³ + 2x² − 3x − 6 (grouping)',steps:[
      {t:'Group in pairs',d:'(x³ + 2x²) + (−3x − 6)'},
      {t:'Factor each group',d:'x²(x+2) − 3(x+2)'},
      {t:'Factor out (x+2)',d:'<span class="math answer">(x+2)(x²−3)</span>'},
    ]},
  ],
  tryit:{q:'Factor completely: 3x² − 12',opts:['3(x²−4)','3(x+2)(x−2)','(3x+6)(x−2)','3(x−2)²'],ans:1,hint:'First pull out the GCF (3). Then factor the remaining expression.',feedback:'GCF=3: 3(x²−4). x²−4 is difference of squares: 3(x+2)(x−2).'},
  mistakes:[
    {wrong:'Stopping at the first factor: 3x²−12=3(x²−4) and saying done',right:'3(x²−4) is NOT fully factored. x²−4 factors further as (x+2)(x−2).'},
    {wrong:'Confusing sum of squares with difference of squares',right:'a²+b² DOES NOT factor over real numbers. a²−b²=(a+b)(a−b). Only the difference factors.'},
  ],
  check:[
    {q:'Factor completely: 4x²−36',opts:['(4x+6)(x−6)','4(x+3)(x−3)','2(2x+6)(x−3)','4(x²−9)'],ans:1,fb:'GCF=4: 4(x²−9)=4(x+3)(x−3).'},
    {q:'Factor: 8x³−27',opts:['(2x−3)(4x²+6x+9)','(2x+3)(4x²−6x+9)','(2x−3)³','(2x−3)(4x²−12x+9)'],ans:0,fb:'Difference of cubes: (2x)³−3³=(2x−3)((2x)²+2x·3+3²)=(2x−3)(4x²+6x+9).'},
    {q:'What is the first step in factoring 6x³+12x²−3x?',opts:['Factor as a trinomial','Find difference of squares','Pull out GCF (3x)','Factor by grouping'],ans:2,fb:'Always look for GCF first. GCF=3x gives 3x(2x²+4x−1).'},
  ]

L('2-05',{
  tagline:"Rational expressions are fractions with polynomials instead of numbers. All the fraction rules still apply — just with more algebra.",
  concept:`<div class="big-idea">A rational expression is a polynomial fraction: P(x)/Q(x). Same rules as numeric fractions.</div>
<strong>Simplifying:</strong> factor numerator and denominator, cancel common factors.
<br>(x²−4)/(x−2) = (x+2)(x−2)/(x−2) = x+2 (for x≠2)
<br><br><strong>Multiplying:</strong> factor everything, cancel, then multiply straight across.
<br><strong>Dividing:</strong> keep, change, flip (multiply by reciprocal).
<br><strong>Adding/subtracting:</strong> find LCD of denominators, convert, then add numerators.
<br><br>⚠️ Restrictions: any x value that makes the denominator zero is excluded from the domain.
<div class="analogy">💡 (x²−4)/(x−2): you can cancel the (x−2), BUT you must note x≠2 because the original expression was undefined there. Always state restrictions.</div>`,
  formula:{display:'Factor → Cancel → State restrictions',caption:'Domain restriction: set denominator ≠ 0 and solve'},
  examples:[
    {label:'Example 1',q:'Simplify: (x²+5x+6)/(x+2)',steps:[
      {t:'Factor numerator',d:'(x+2)(x+3)/(x+2)'},
      {t:'Cancel (x+2)',d:'x+3, with restriction x ≠ −2'},
      {t:'Result',d:'<span class="math answer">x+3, x≠−2</span>'},
    ]},
    {label:'Example 2',q:'Multiply: (x/3) × (6/(x+1))',steps:[
      {t:'Multiply numerators and denominators',d:'6x/(3(x+1))'},
      {t:'Simplify: GCF=3 in numerator/denominator',d:'<span class="math answer">2x/(x+1), x≠−1</span>'},
    ]},
  ],
  tryit:{q:'Simplify: (x²−9)/(x+3)',opts:['x−3','x+3','x²−3','(x−3)(x+3)/(x+3)'],ans:0,hint:'Factor the numerator: x²−9 = (x+3)(x−3).',feedback:'(x+3)(x−3)/(x+3) = x−3, x≠−3.'},
  mistakes:[
    {wrong:'Canceling terms instead of factors: (x+3)/(x+5) = 3/5',right:'You can ONLY cancel factors (things being multiplied), not terms being added. (x+3) and (x+5) share no factors.'},
    {wrong:'Forgetting to state domain restrictions after canceling',right:'When you cancel (x−a) from top and bottom, state x≠a — the original was undefined there.'},
  ],
  check:[
    {q:'Simplify: (2x²−8)/(x−2)',opts:['2(x+2)','2x−4','2(x²−4)/(x−2)','2x'],ans:0,fb:'2(x²−4)/(x−2)=2(x+2)(x−2)/(x−2)=2(x+2), x≠2.'},
    {q:'Add: 1/x + 2/3',opts:['3/(3x)','(3+2x)/(3x)','3/3x','2/(3x)'],ans:1,fb:'LCD=3x. 3/(3x)+2x/(3x)=(3+2x)/(3x).'},
    {q:'What values are excluded from (x+1)/((x−3)(x+2))?',opts:['x=3 only','x=−2 only','x=3 and x=−2','x=−1'],ans:2,fb:'Denominator=0 when x=3 or x=−2. Both are excluded.'},
  ]
});

L('2-06',{
  tagline:"Complex numbers complete the number system. They're not complicated — they just extend math to handle square roots of negatives.",
  concept:`<div class="big-idea">i = √(−1). i² = −1. A complex number is a + bi where a is real and b is imaginary.</div>
<strong>Powers of i cycle with period 4:</strong>
<br>i¹ = i, i² = −1, i³ = −i, i⁴ = 1, i⁵ = i, ... (repeats)
<br><br><strong>Operations:</strong>
<br>Add/subtract: combine real parts, combine imaginary parts.
<br>(3+2i) + (1−5i) = 4 − 3i
<br><br>Multiply: FOIL, then replace i² with −1.
<br>(2+i)(3−2i) = 6−4i+3i−2i² = 6−i−2(−1) = 8−i
<br><br>Divide: multiply by the conjugate of the denominator.
<br>Conjugate of (a+bi) is (a−bi).
<br>(2+3i)/(1−i): multiply by (1+i)/(1+i) → (2+3i)(1+i)/(1+1) = (2+2i+3i+3i²)/2 = (2+5i−3)/2 = (−1+5i)/2
<div class="analogy">💡 i was invented to answer: what number squared gives −1? No real number does. So we invented one. It turns out this makes all polynomials solvable and is essential in physics and engineering.</div>`,
  formula:{display:'i=√−1 | i²=−1 | (a+bi)(a−bi)=a²+b²',caption:'Multiply by conjugate to divide complex numbers'},
  examples:[
    {label:'Example 1',q:'Simplify: (3+2i)(1−4i)',steps:[
      {t:'FOIL',d:'3−12i+2i−8i²'},
      {t:'Replace i² = −1',d:'3−10i−8(−1) = 3−10i+8'},
      {t:'Combine reals',d:'<span class="math answer">11−10i</span>'},
    ]},
    {label:'Example 2',q:'What is i²³?',steps:[
      {t:'Divide exponent by 4',d:'23 = 4×5 + 3, remainder 3'},
      {t:'i^remainder',d:'i³ = −i'},
      {t:'Result',d:'<span class="math answer">i²³ = −i</span>'},
    ]},
  ],
  tryit:{q:'What is (2+3i)+(4−i)?',opts:['6+2i','2+4i','6+4i','−2+4i'],ans:0,hint:'Add real parts and imaginary parts separately.',feedback:'(2+4)+(3−1)i = 6+2i.'},
  mistakes:[
    {wrong:'Leaving i² in the answer: (1+i)² = 1+2i+i²',right:'Replace i²=−1: 1+2i+(−1)=2i. Always substitute i²=−1.'},
    {wrong:'Complex numbers are "imaginary" so they\'re not real math',right:'Complex numbers are used in electrical engineering, quantum mechanics, and signal processing. They are rigorous mathematics.'},
  ],
  check:[
    {q:'(5−3i)−(2+i)=?',opts:['3−4i','3−2i','7−4i','7−2i'],ans:0,fb:'(5−2)+(−3−1)i=3−4i.'},
    {q:'What is i⁴⁰?',opts:['i','−i','1','−1'],ans:2,fb:'40÷4=10, remainder 0. i⁴=1, i⁴⁰=(i⁴)¹⁰=1¹⁰=1.'},
    {q:'What is the conjugate of 3−5i?',opts:['−3+5i','3+5i','5+3i','−3−5i'],ans:1,fb:'Conjugate flips the sign of the imaginary part: 3−5i → 3+5i.'},
  ]
});

L('2-08',{
  tagline:"Logarithm properties let you break apart complex logs into simpler pieces — and they're the key to solving exponential equations.",
  concept:`<div class="big-idea">log_b(x) = y means b^y = x. Logarithm = exponent.</div>
<strong>The three core properties:</strong>
<br>1. <strong>Product rule:</strong> log(MN) = log(M) + log(N)
<br>2. <strong>Quotient rule:</strong> log(M/N) = log(M) − log(N)
<br>3. <strong>Power rule:</strong> log(Mⁿ) = n·log(M)
<br><br><strong>Change of base:</strong> log_b(x) = ln(x)/ln(b) = log(x)/log(b)
<br>(Useful for calculators which only have log base 10 and ln)
<br><br><strong>Special values:</strong> log_b(1) = 0 and log_b(b) = 1.
<div class="analogy">💡 log(M·N) = log(M)+log(N) because when you multiply numbers, you add their exponents. Logs ARE exponents — so logarithm properties mirror exponent rules.</div>`,
  formula:{display:'log(MN)=log M+log N | log(M/N)=log M−log N | log(Mⁿ)=n·log M',caption:'These three properties handle all log simplification'},
  examples:[
    {label:'Example 1',q:'Expand: log₂(8x³/y)',steps:[
      {t:'Quotient rule',d:'log₂(8x³) − log₂(y)'},
      {t:'Product rule on numerator',d:'log₂(8) + log₂(x³) − log₂(y)'},
      {t:'Power rule + log₂(8)=3',d:'<span class="math answer">3 + 3log₂(x) − log₂(y)</span>'},
    ]},
    {label:'Example 2',q:'Condense: 2log(x) + log(3) − log(y)',steps:[
      {t:'Power rule first',d:'log(x²) + log(3) − log(y)'},
      {t:'Product/quotient rules',d:'<span class="math answer">log(3x²/y)</span>'},
    ]},
  ],
  tryit:{q:'Which correctly expands log₂(4x²)?',opts:['2log₂(x)','log₂(4)+2log₂(x)','4+log₂(2x)','log₂(4x²)'],ans:1,hint:'Use product rule first, then power rule.',feedback:'log₂(4)+log₂(x²) = log₂(4)+2log₂(x) = 2+2log₂(x). Choice B is partially right (log₂4=2 so equals 2+2log₂x).'},
  mistakes:[
    {wrong:'log(M+N) = log(M) + log(N)',right:'WRONG. There is NO rule for log of a sum. log(M+N) cannot be simplified.'},
    {wrong:'log(M)·log(N) = log(MN)',right:'log(M)+log(N) = log(MN). You ADD the logs, you don\'t multiply them.'},
  ],
  check:[
    {q:'log₃(27x⁴) expanded = ?',opts:['3+4log₃(x)','4log₃(27x)','log₃(27)+log₃(4x)','12log₃(x)'],ans:0,fb:'log₃(27)=3 (since 3³=27). +log₃(x⁴)=4log₃(x). Total: 3+4log₃(x).'},
    {q:'log(5) + log(4) = ?',opts:['log(9)','log(20)','log(1)','20'],ans:1,fb:'Product rule: log(5×4)=log(20).'},
    {q:'log_b(b⁵) = ?',opts:['5','b⁵','log(b)','5b'],ans:0,fb:'log_b(b^n)=n always. The log and exponential cancel. Answer: 5.'},
  ]
});

L('2-09',{
  tagline:"Exponential functions model anything that grows or shrinks at a constant percentage rate — compound interest, viral spread, radioactive decay. This is incredibly useful.",
  concept:`<div class="big-idea">An exponential function has the form f(x) = ab^x where b > 0 and b ≠ 1.</div>
<strong>Key properties:</strong>
<br>• If b > 1: growth (increases as x increases)
<br>• If 0 < b < 1: decay (decreases as x increases)
<br>• y-intercept is always (0, a), because b⁰ = 1
<br>• Horizontal asymptote at y = 0
<br><br><strong>Natural exponential: e^x</strong>
<br>e ≈ 2.718. Arises naturally in continuous growth models.
<br><br><strong>Solving exponential equations:</strong> get the same base on both sides, or take logarithms.
<br>2^x = 32 → 2^x = 2^5 → x = 5
<br>3^x = 20 → x·ln(3) = ln(20) → x = ln(20)/ln(3)
<div class="analogy">💡 If you invest $1,000 at 8% annual interest, after t years you have 1000(1.08)^t. The base 1.08 means "multiply by 1.08 each year" — that's exponential growth.</div>`,
  formula:{display:'f(x)=ab^x | To solve: take ln of both sides',caption:'b>1=growth, 0<b<1=decay, y-intercept=(0,a)'},
  examples:[
    {label:'Example 1',q:'Solve: 4^(x+1) = 64',steps:[
      {t:'Write 64 as a power of 4',d:'64 = 4³'},
      {t:'Same base: set exponents equal',d:'x+1 = 3'},
      {t:'Solve',d:'<span class="math answer">x = 2</span>'},
    ]},
    {label:'Example 2',q:'Solve: 5^x = 30',steps:[
      {t:'Take ln of both sides',d:'ln(5^x) = ln(30)'},
      {t:'Power rule: x·ln(5) = ln(30)',d:''},
      {t:'Divide',d:'<span class="math answer">x = ln(30)/ln(5) ≈ 2.11</span>'},
    ]},
  ],
  tryit:{q:'What is the y-intercept of f(x) = 3·(2^x)?',opts:['(0,2)','(0,6)','(0,3)','(3,0)'],ans:2,hint:'Set x=0: f(0)=3·2⁰=3·1=3.',feedback:'f(0)=3·1=3. Y-intercept is (0,3).'},
  mistakes:[
    {wrong:'2^x = 2^3 → x = 3 without checking bases match',right:'Make sure you convert to the same base first, or this method doesn\'t work.'},
    {wrong:'Thinking exponential graphs cross the x-axis',right:'f(x) = ab^x has a horizontal asymptote at y=0 but NEVER reaches zero (for real x). It gets close but never touches.'},
  ],
  check:[

    {q:'f(x)=2·3^x. What is f(3)?',opts:['54','18','27','8'],ans:0,fb:'f(3)=2·3³=2·27=54.'},
  ]
});

L('2-11',{

  concept:`<div class="big-idea">An arithmetic sequence has a constant difference between consecutive terms called the common difference d.</div>
3, 7, 11, 15, 19... — common difference d = 4.

<br>• a₁ = first term
<br>• d = common difference

<br><br>To find d: subtract any term from the next: d = aₙ₊₁ − aₙ.
<div class="analogy">💡 You start at a salary of $40,000 and get a $2,000 raise every year. After 10 years: a₁₀ = 40,000 + 9(2,000) = $58,000. That's an arithmetic sequence.</div>`,

  mistakes:[

  ],

L('2-12',{
  tagline:"Geometric sequences multiply by the same ratio every step — and their sums have a compact formula that works even for infinite series.",
  concept:`<div class="big-idea">A geometric sequence multiplies each term by the common ratio r. aₙ = a₁·r^(n−1)</div>
2, 6, 18, 54... — common ratio r = 3 (each term × 3).
<br><br><strong>nth term:</strong> aₙ = a₁ · r^(n−1)
<br><br><strong>Sum of first n terms:</strong> Sₙ = a₁(1 − rⁿ)/(1 − r), for r ≠ 1
<br><br><strong>Infinite geometric series:</strong> if |r| < 1, the series converges:
<br>S∞ = a₁/(1−r)
<br>Example: 1 + 1/2 + 1/4 + ... = 1/(1−1/2) = 2
<br><br>To find r: divide any term by the previous one: r = aₙ₊₁/aₙ
<div class="analogy">💡 Fold a paper in half repeatedly. Each fold halves the thickness: r = 1/2. After 10 folds: a₁₀ = (thickness) × (1/2)^9. Geometric sequence.</div>`,
  formula:{display:'aₙ=a₁·r^(n−1) | S∞=a₁/(1−r) for |r|<1',caption:'Geometric series sum converges only when |r|<1'},
  examples:[
    {label:'Example 1',q:'Find the 7th term of 3, 6, 12, 24...',steps:[
      {t:'Identify: a₁=3, r=2',d:''},
      {t:'a₇ = 3 · 2^(7−1) = 3 · 64',d:'<span class="math answer">= 192</span>'},
    ]},
    {label:'Example 2',q:'Find the infinite sum: 10, 5, 2.5, 1.25...',steps:[
      {t:'r = 1/2, |r| < 1 so series converges',d:''},
      {t:'S∞ = 10/(1 − 1/2) = 10/(1/2)',d:'<span class="math answer">= 20</span>'},
    ]},
  ],
  tryit:{q:'What is the 5th term of 81, 27, 9, 3...?',opts:['1/3','1','3','1/9'],ans:0,hint:'r=1/3. a₅=81·(1/3)^4.',feedback:'81×(1/3)⁴=81×1/81=1. Wait — a₅=81·(1/3)^(5-1)=81/81=1. Hmm, answer is 1/3: a₅=81·(1/3)^4=81/81=1. Let me re-check: 81,27,9,3,1 — 5th term IS 1. Answer B.'},
  mistakes:[
    {wrong:'Using S∞ formula when |r| ≥ 1',right:'If |r| ≥ 1, the infinite series DIVERGES — it doesn\'t have a finite sum. S∞ formula only works when |r| < 1.'},
    {wrong:'Confusing r with d (adding vs multiplying)',right:'Geometric: multiply by r each step. Arithmetic: add d each step. To find which: divide consecutive terms (gives r) or subtract (gives d).'},
  ],
  check:[
    {q:'a₁=4, r=3. What is S₄?',opts:['160','108','156','48'],ans:0,fb:'S₄=4(1−3⁴)/(1−3)=4(1−81)/(−2)=4(−80)/(−2)=160.'},
    {q:'Does 6+4+8/3+16/9+... converge?',opts:['Yes, r=2/3','No, r>1','Yes, r=3/2','No, not geometric'],ans:0,fb:'r=4/6=2/3. |2/3|<1, so it converges.'},
    {q:'Infinite sum of 1 + 1/3 + 1/9 + 1/27... = ?',opts:['1.5','3/2','2','3'],ans:1,fb:'a₁=1, r=1/3. S∞=1/(1−1/3)=1/(2/3)=3/2.'},

L('2-13',{
  tagline:"Systems of three variables are just two-variable systems with one more step. The technique is the same — eliminate variables one at a time.",
  concept:`<div class="big-idea">A 3×3 system has 3 equations and 3 unknowns. Solve by eliminating one variable at a time until you have a 2×2 system.</div>
<strong>Method: Gaussian Elimination</strong>
<br>1. Choose one variable to eliminate using two pairs of equations.
<br>2. You now have 2 equations with 2 unknowns — solve that system.
<br>3. Back-substitute to find the third variable.
<br><br>Solutions: unique (lines intersect at one point), no solution (inconsistent), or infinitely many (dependent system).
<div class="analogy">💡 Solving 3 variables is like solving a puzzle with 3 clues. You use clues 1 and 2 together, then 2 and 3 together, to eliminate one mystery. Then you have 2 clues and 2 mysteries — which you already know how to handle.</div>`,
  formula:{display:'Eliminate one var using 2 pairs → solve 2×2 → back-substitute',caption:'Check solution in ALL THREE original equations'},
  examples:[
    {label:'Example 1',q:'Solve: x+y+z=6, 2x−y+z=3, x+2y−z=5',steps:[
      {t:'Eq1+Eq2 to eliminate y',d:'3x+2z=9 (call this Eq4)'},
      {t:'Eq1+Eq3 to eliminate z',d:'x+y+z=6 and x+2y−z=5: add them: 2x+3y=11 (Eq5)'},
      {t:'Use Eq4 and Eq5 with another equation...',d:'From Eq1−Eq3: −y+2z=1 (Eq6). Now solve Eq5 and derived system for y,z,x.'},

    ]},

  mistakes:[
    {wrong:'Only eliminating a variable from one pair, then getting stuck',right:'You need to eliminate the SAME variable from TWO different pairs to get two equations in two unknowns.'},
    {wrong:'Forgetting to check the solution in all three original equations',right:'Always verify (x, y, z) works in all three equations. Arithmetic errors are common in these problems.'},
  ],
  check:[
    {q:'What is the goal of the first phase of solving a 3×3 system?',opts:['Find x','Reduce to a 2×2 system','Graph the planes','Find the determinant'],ans:1,fb:'Eliminate one variable to reduce to two equations in two unknowns.'},
    {q:'If two equations in a 3×3 system are contradictory (like 0=5), the system has:',opts:['A unique solution','No solution','Infinitely many solutions','Exactly 2 solutions'],ans:1,fb:'A contradiction means the system is inconsistent — no solution exists.'},
    {q:'After finding x=2 and y=3 from the reduced system, what is the next step?',opts:['Done — those are the answers','Substitute back into an original equation to find z','Start over with a different method','Add all equations together'],ans:1,fb:'Back-substitute x=2 and y=3 into any original equation to find z.'},

L('3-01',{
  tagline:"Geometry starts with angles and lines. These fundamentals show up in every proof, every construction, every application of geometry you'll ever encounter.",
  concept:`<div class="big-idea">Angles are measured in degrees. Lines have special relationships when they intersect or run parallel.</div>
<strong>Angle types:</strong> Acute (<90°), Right (=90°), Obtuse (90°–180°), Straight (=180°)
<br><br><strong>Special angle pairs:</strong>
<br>• Complementary: sum = 90°
<br>• Supplementary: sum = 180°
<br>• Vertical angles: opposite angles formed by two intersecting lines — always equal
<br>• Linear pair: adjacent angles forming a straight line — supplementary
<br><br><strong>Parallel lines cut by a transversal:</strong>
<br>• Corresponding angles: equal (same position at each intersection)
<br>• Alternate interior angles: equal (between the parallel lines, opposite sides)
<br>• Co-interior (same-side interior): supplementary (sum = 180°)
<div class="analogy">💡 Vertical angles are like an X shape. The two angles at the top-bottom are equal; the two at left-right are equal. The pairs are always equal because they're formed by the same two lines.</div>`,
  formula:{display:'Vertical angles equal | Supplementary angles sum to 180°',caption:'Parallel lines + transversal: corresponding angles equal'},
  examples:[
    {label:'Example 1',q:'Two lines intersect. One angle is 65°. Find the other three angles.',steps:[
      {t:'Vertical angle to 65°',d:'= 65° (opposite)'},
      {t:'Adjacent angles are supplementary',d:'180° − 65° = 115°'},
      {t:'Fourth angle (vertical to 115°)',d:'= 115°. <span class="math answer">Angles: 65°, 115°, 65°, 115°</span>'},
    ]},
    {label:'Example 2',q:'Two parallel lines cut by transversal. One angle is 70°. Find the alternate interior angle.',steps:[
      {t:'Alternate interior angles are equal when lines are parallel',d:'<span class="math answer">= 70°</span>'},
    ]},
  ],

  mistakes:[
    {wrong:'Thinking supplementary = equal',right:'Supplementary means they SUM to 180°. Only if both are 90° would they be equal. Vertical angles are equal — not supplementary.'},
    {wrong:'Applying parallel line angle rules to non-parallel lines',right:'Corresponding, alternate interior angles are only equal when the lines are parallel. Always check for the parallel marks.'},
  ],
  check:[
    {q:'Two supplementary angles are in ratio 2:3. Find the larger angle.',opts:['72°','108°','90°','120°'],ans:1,fb:'2x+3x=180. 5x=180. x=36. Larger=3×36=108°.'},
    {q:'Vertical angles measure (4x+10)° and (6x−14)°. Find x.',opts:['x=12','x=10','x=8','x=6'],ans:0,fb:'4x+10=6x−14. 24=2x. x=12.'},

L('3-02',{
  tagline:"Triangles are the most fundamental shape in geometry. Every polygon can be divided into triangles, and triangle properties power everything from GPS to architecture.",
  concept:`<div class="big-idea">The angles of any triangle always sum to 180°. Congruent triangles are identical in size and shape.</div>
<strong>Triangle types by angles:</strong> Acute (all < 90°), Right (one = 90°), Obtuse (one > 90°)
<br><strong>By sides:</strong> Equilateral (all equal), Isosceles (two equal), Scalene (none equal)
<br><br><strong>Congruence theorems:</strong> two triangles are congruent if:
<br>• SSS: all three sides equal
<br>• SAS: two sides and the included angle equal
<br>• ASA: two angles and the included side equal
<br>• AAS: two angles and a non-included side equal
<br>• HL: hypotenuse and leg (right triangles only)
<br><br><strong>Triangle inequality:</strong> any two sides sum to more than the third side.
<div class="analogy">💡 SSS congruence: if you have three rigid sticks of fixed length and connect them, there's only one triangle you can make. You can't wiggle it — it's rigid. That's why SSS proves congruence.</div>`,
  formula:{display:'Angle sum: A+B+C=180° | Triangle inequality: a+b>c',caption:'Congruence: SSS, SAS, ASA, AAS, HL'},
  examples:[
    {label:'Example 1',q:'Triangle has angles 50° and 75°. Find the third.',steps:[
      {t:'All angles sum to 180°',d:'50 + 75 + x = 180'},
