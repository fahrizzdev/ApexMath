});

L('6-04',{
  tagline:"Partial fractions decompose rational functions into simple fractions you can integrate term by term. It's an algebra technique that enables integration.",
  concept:`<div class="big-idea">A rational function P(x)/Q(x) (where degree P < degree Q) can be decomposed into a sum of simpler fractions.</div>
<strong>Factoring types in denominator:</strong>
<br>• Linear (x−a): contributes A/(x−a)
<br>• Repeated linear (x−a)²: contributes A/(x−a)+B/(x−a)²
<br>• Irreducible quadratic (x²+bx+c): contributes (Ax+B)/(x²+bx+c)
<br><br><strong>Process:</strong>
<br>1. Factor denominator completely
<br>2. Set up partial fraction decomposition
<br>3. Multiply both sides by denominator
<br>4. Solve for A, B, C...
<br>5. Integrate each term (log or arctan)
<div class="analogy">💡 1/(x(x+2)) = A/x + B/(x+2). You\'re splitting the fraction apart. Each piece is easy to integrate (just logarithms). Together, they\'re impossible. Split apart, they\'re trivial.</div>`,
  formula:{display:'P(x)/((x−a)(x−b)) = A/(x−a) + B/(x−b)',caption:'Multiply through by denominator, then match coefficients or plug in roots'},
  examples:[
    {label:'Example 1',q:'∫ 1/((x+1)(x−3)) dx',steps:[
      {t:'Decompose: A/(x+1) + B/(x−3)',d:'1 = A(x−3)+B(x+1)'},
      {t:'x=3: 1=4B → B=1/4. x=−1: 1=−4A → A=−1/4',d:''},
      {t:'∫(−1/4)/(x+1)+(1/4)/(x−3)dx',d:'<span class="math answer">=(1/4)ln|x−3|−(1/4)ln|x+1|+C</span>'},
    ]},
  ],
  tryit:{q:'Decompose: 5/(x(x−5)) = A/x + B/(x−5). What is A?',opts:['1','−1','5','−5'],ans:1,hint:'Multiply both sides by x(x−5): 5=A(x−5)+Bx. Set x=0.',feedback:'x=0: 5=A(−5) → A=−1.'},
  mistakes:[
    {wrong:'Using partial fractions when degree of numerator ≥ degree of denominator',right:'First do polynomial long division to reduce degree of numerator below degree of denominator.'},
    {wrong:'Forgetting to include all powers for repeated factors: (x−a)² needs A/(x−a)+B/(x−a)²',right:'Each power of a repeated factor needs its own term.'},
  ],
  check:[
    {q:'∫ 1/(x²−1) dx. After factoring x²−1=(x+1)(x−1), the decomposition is:',opts:['A/(x²−1)','A/(x+1)+B/(x−1)','A/(x+1)·B/(x−1)','Ax+B over x²−1'],ans:1,fb:'Two distinct linear factors: A/(x+1)+B/(x−1).'},
    {q:'For the integral ∫1/(x(x+1))dx, after partial fractions A=1 and B=−1. Result?',opts:['ln|x|−ln|x+1|+C','ln|x(x+1)|+C','ln|x|+ln|x+1|+C','−1/x+1/(x+1)+C'],ans:0,fb:'∫1/x dx−∫1/(x+1)dx=ln|x|−ln|x+1|+C.'},
    {q:'What is the form for: x/((x²+1)(x−2))?',opts:['A/x + B/(x−2)','(Ax+B)/(x²+1) + C/(x−2)','A/(x²+1)+B/(x−2)','Ax/(x²+1)+B/(x−2)'],ans:1,fb:'Irreducible quadratic gets (Ax+B) in numerator. Linear factor gets C.'},
  ]
});

L('6-05',{
  tagline:"Improper integrals extend integration to infinite intervals or unbounded functions. The key idea: replace the infinity with a limit.",
  concept:`<div class="big-idea">An improper integral has either an infinite limit of integration or an integrand that blows up inside the interval. Evaluate using limits.</div>
<strong>Type 1 (infinite limits):</strong>
<br>∫ₐ^∞ f(x)dx = lim_{b→∞} ∫ₐᵇ f(x)dx
<br><br><strong>Type 2 (vertical asymptote):</strong>
<br>∫ₐᵇ f(x)dx where f→∞ at c∈[a,b]:
<br>= lim_{t→c⁻} ∫ₐᵗ f dx + lim_{t→c⁺} ∫ᵗᵇ f dx
<br><br><strong>Convergence vs Divergence:</strong>
<br>If the limit exists and is finite: converges.
<br>If the limit is ±∞ or DNE: diverges.
<br><br>∫₁^∞ 1/xᵖ dx: converges for p>1, diverges for p≤1.
<div class="analogy">💡 ∫₁^∞ 1/x² dx converges (=1). ∫₁^∞ 1/x dx diverges. Though 1/x and 1/x² both go to zero, 1/x goes too slowly — there\'s still infinite area under it.</div>`,
  formula:{display:'∫ₐ^∞ f dx = lim_{b→∞} ∫ₐᵇ f dx',caption:'Converges if limit is finite. Diverges if limit is ∞ or DNE.'},
  examples:[
    {label:'Example 1',q:'∫₁^∞ 1/x² dx',steps:[
      {t:'lim_{b→∞} ∫₁ᵇ x⁻² dx = lim_{b→∞} [−1/x]₁ᵇ',d:''},
      {t:'= lim_{b→∞}(−1/b + 1)',d:'= 0+1'},
      {t:'',d:'<span class="math answer">Converges to 1</span>'},
    ]},
    {label:'Example 2',q:'∫₁^∞ 1/x dx',steps:[
      {t:'lim_{b→∞} [ln x]₁ᵇ = lim_{b→∞} ln(b)',d:'= ∞'},
      {t:'',d:'<span class="math answer">Diverges</span>'},
    ]},
  ],
  tryit:{q:'∫₀^∞ e^(−x) dx = ?',opts:['0','1','∞','−1'],ans:1,hint:'lim_{b→∞}[−e^(−x)]₀ᵇ = lim(−e^(−b)+1).',feedback:'lim_{b→∞}(−e^(−b)+1)=0+1=1. Converges to 1.'},
  mistakes:[
    {wrong:'Computing improper integrals without limits: just plugging in ∞',right:'∞ is not a number — you can\'t plug it in. Always write as a limit first, then evaluate.'},
    {wrong:'Assuming ∫₋∞^∞ f dx exists just because f is symmetric',right:'∫₋∞^∞ f dx = lim_{a→−∞, b→∞} ∫ₐᵇ f dx. Both limits must converge independently.'},
  ],
  check:[
    {q:'∫₀^1 1/√x dx converges or diverges?',opts:['Diverges','Converges to 2','Converges to 1','Diverges (∞)'],ans:1,fb:'lim_{t→0⁺}[2√x]ₜ¹=2−0=2. Converges.'},
    {q:'For ∫₁^∞ 1/xᵖ dx, it converges when:',opts:['p<1','p=1','p>1','All p'],ans:2,fb:'∫₁^∞ x⁻ᵖ dx = [x^(1−p)/(1−p)]₁^∞. This converges only when 1−p<0, i.e., p>1.'},
    {q:'∫₋∞^0 eˣ dx = ?',opts:['1','−1','∞','0'],ans:0,fb:'lim_{a→−∞}[eˣ]ₐ⁰=e⁰−lim e^a=1−0=1.'},
  ]
});

L('6-06',{
  tagline:"A sequence is an ordered list of numbers generated by a formula. Understanding convergence of sequences is the foundation for understanding infinite series.",
  concept:`<div class="big-idea">A sequence {aₙ} converges if lim_{n→∞} aₙ = L (a finite number). Otherwise it diverges.</div>
<strong>Convergence tests for sequences:</strong>
<br>• If |r|<1: rⁿ → 0. If |r|>1: rⁿ → ∞.
<br>• Squeeze theorem: if aₙ≤bₙ≤cₙ and aₙ,cₙ→L, then bₙ→L.
<br>• If f(x)→L as x→∞ and aₙ=f(n), then aₙ→L.
<br><br><strong>Common limits:</strong>
<br>• 1/nᵖ → 0 for p>0
<br>• (1+1/n)ⁿ → e
<br>• n^(1/n) → 1
<br>• (ln n)/n → 0
<div class="analogy">💡 Think of a sequence as the list of your bank balance at the end of each year. If it approaches a stable amount, it converges. If it grows without bound or oscillates, it diverges.</div>`,
  formula:{display:'lim_{n→∞} aₙ = L: sequence converges to L',caption:'|r|<1: rⁿ→0. |r|>1: rⁿ→∞.'},
  examples:[
    {label:'Example 1',q:'Does aₙ = (2n+1)/(3n−4) converge?',steps:[
      {t:'Divide by n: (2+1/n)/(3−4/n)',d:''},
      {t:'As n→∞: (2+0)/(3−0)=2/3',d:''},
      {t:'',d:'<span class="math answer">Converges to 2/3</span>'},
    ]},
    {label:'Example 2',q:'aₙ = (−1)ⁿ. Converge?',steps:[
      {t:'Terms: −1, 1, −1, 1, ...',d:'Oscillates, never settles'},
      {t:'',d:'<span class="math answer">Diverges</span>'},
    ]},
  ],
  tryit:{q:'aₙ = 5/n². Does it converge?',opts:['Yes, to 5','Yes, to 0','No, diverges','Yes, to ∞'],ans:1,hint:'What happens to 1/n² as n→∞?',feedback:'5/n²→5·(0)=0. Converges to 0.'},
  mistakes:[
    {wrong:'Confusing convergence of a sequence with convergence of a series',right:'Sequence: the terms aₙ. Series: the sum of the terms ∑aₙ. Different things. A sequence can converge but its series diverge (harmonic).'},
    {wrong:'A sequence diverges if its terms aren\'t going to zero',right:'Divergence can also be oscillation. (−1)ⁿ oscillates without bound — it diverges even though |aₙ|=1 stays bounded.'},
  ],
  check:[
    {q:'aₙ=(3/2)ⁿ. Does it converge?',opts:['Yes, to 0','Yes, to 3/2','No, diverges to ∞','No, oscillates'],ans:2,fb:'Base r=3/2>1. rⁿ→∞. Diverges.'},
    {q:'aₙ=sin(n)/n. Converge?',opts:['No — sin oscillates','Yes to 0 (squeeze theorem)','Yes to 1','Diverges to ∞'],ans:1,fb:'|sin(n)|≤1, so |sin(n)/n|≤1/n→0. By squeeze, aₙ→0.'},
    {q:'(1+1/n)ⁿ as n→∞ approaches:',opts:['1','2','e','∞'],ans:2,fb:'This is the definition of e≈2.718. Classic limit.'},
  ]
});

L('6-08',{
  tagline:"Power series let you represent functions as infinite polynomials. This is how calculators compute sin, cos, and eˣ to arbitrary precision.",
  concept:`<div class="big-idea">A power series is ∑ cₙ(x−a)ⁿ. It represents a function within its radius of convergence R.</div>
<strong>Radius of convergence:</strong> use the Ratio Test:
<br>R = lim_{n→∞} |cₙ/cₙ₊₁|
<br>The series converges for |x−a| < R, diverges for |x−a| > R.
<br>At |x−a| = R, test endpoints separately.
<br><br><strong>Key geometric series:</strong>
<br>1/(1−x) = ∑ xⁿ for |x|<1
<br><br><strong>Differentiation and integration of power series:</strong>
<br>Differentiate/integrate term by term within the radius of convergence.
<div class="analogy">💡 A power series is an infinite polynomial. A calculator computing cos(0.1) doesn\'t use a circle — it uses the first few terms of the power series 1 − x²/2! + x⁴/4! − ... until the answer is accurate enough.</div>`,
  formula:{display:'∑cₙxⁿ converges for |x|<R where R=lim|cₙ/cₙ₊₁|',caption:'Ratio test gives radius. Check endpoints separately.'},
  examples:[
    {label:'Example 1',q:'Find radius of convergence for ∑ xⁿ/n',steps:[
      {t:'Ratio test: |aₙ₊₁/aₙ| = |x^(n+1)/(n+1)| · |n/xⁿ| = |x|·n/(n+1)',d:''},
      {t:'As n→∞: |x|·1 = |x|',d:''},
      {t:'Converges when |x|<1, so R=1',d:'<span class="math answer">R=1</span>'},
    ]},
  ],
  tryit:{q:'∑(x/3)ⁿ. Radius of convergence?',opts:['R=1','R=3','R=1/3','R=9'],ans:1,hint:'Ratio test: |x/3|<1 means |x|<3.',feedback:'|(x/3)^(n+1)/(x/3)^n|=|x/3|→|x/3|. Converges when |x/3|<1 → |x|<3. R=3.'},
  mistakes:[
    {wrong:'Confusing radius R with the interval (−R,R)',right:'R=3 means the interval of convergence is (−3,3) — you still need to check endpoints ±3 separately.'},
    {wrong:'Differentiating a power series changes its radius',right:'Differentiation doesn\'t change R (though it can affect endpoint behavior).'},
  ],
  check:[
    {q:'1/(1−x)=∑xⁿ for which x?',opts:['All x','|x|<1','|x|≤1','x>0'],ans:1,fb:'Geometric series converges for |r|=|x|<1.'},
    {q:'If ∑cₙxⁿ has R=5, the series definitely converges at:',opts:['x=5','x=−5','x=3','x=6'],ans:2,fb:'|3|<5, so x=3 is within the radius. x=±5 are on the boundary — need separate check. x=6 is outside.'},
    {q:'d/dx[∑xⁿ/n!] = ? (same as the series for eˣ)',opts:['∑xⁿ/n!','∑nxⁿ⁻¹/n!','∑xⁿ⁻¹/(n−1)! = eˣ','Both B and C'],ans:3,fb:'Term by term: d/dx[xⁿ/n!]=nxⁿ⁻¹/n!=xⁿ⁻¹/(n−1)!. Re-indexing gives the same eˣ series. B and C are equal.'},
  ]
});

L('6-09',{
  tagline:"Taylor and Maclaurin series let you approximate ANY differentiable function as an infinite polynomial. This is foundational for numerical methods and physics.",
  concept:`<div class="big-idea">Taylor series of f(x) centered at a: f(x) = ∑ f⁽ⁿ⁾(a)/n! · (x−a)ⁿ</div>
Maclaurin series: centered at a=0. f(x) = ∑ f⁽ⁿ⁾(0)/n! · xⁿ
<br><br><strong>Key Maclaurin series (memorize these):</strong>
<br>• eˣ = 1 + x + x²/2! + x³/3! + ... = ∑ xⁿ/n!
<br>• sin(x) = x − x³/3! + x⁵/5! − ... = ∑ (−1)ⁿx^(2n+1)/(2n+1)!
<br>• cos(x) = 1 − x²/2! + x⁴/4! − ... = ∑ (−1)ⁿx^(2n)/(2n)!
<br>• 1/(1−x) = 1+x+x²+x³+... = ∑ xⁿ, |x|<1
<br><br>Error is bounded by the first omitted term (for alternating series).
<div class="analogy">💡 Euler\'s Identity e^(iπ)+1=0 comes from Taylor series. Plug ix into eˣ series, collect real and imaginary parts — you get cos and sin. The most beautiful equation in math is just Taylor series applied cleverly.</div>`,
  formula:{display:'f(x)=∑f⁽ⁿ⁾(a)/n!·(x−a)ⁿ | eˣ=∑xⁿ/n!',caption:'The coefficient of (x−a)ⁿ is the nth derivative at a, divided by n!'},
  examples:[
    {label:'Example 1',q:'Write the first 4 terms of Maclaurin series for eˣ',steps:[
      {t:'f(x)=eˣ, all derivatives equal eˣ, all equal 1 at x=0',d:''},
      {t:'Terms: f(0)/0!+f\'(0)/1!·x+f\'\'(0)/2!·x²+...',d:'= 1+x+x²/2!+x³/3!'},
      {t:'',d:'<span class="math answer">eˣ ≈ 1+x+x²/2+x³/6</span>'},
    ]},
  ],
  tryit:{q:'The Maclaurin series for cos(x) starts with:',opts:['x−x³/6','1−x²/2','1+x+x²/2','x+x³/6'],ans:1,hint:'cos(0)=1, cos\'(0)=−sin(0)=0, cos\'\'(0)=−cos(0)=−1.',feedback:'cos(x)=1+(0)x+(−1)x²/2!+...=1−x²/2+...'},
  mistakes:[
    {wrong:'Taylor series coefficients are just f⁽ⁿ⁾(a)',right:'Coefficients are f⁽ⁿ⁾(a)/n!. The n! in the denominator is essential — it comes from differentiating xⁿ repeatedly.'},
    {wrong:'The series equals the function everywhere',right:'Taylor series equals f(x) only within the radius of convergence. eˣ converges everywhere, but 1/(1−x) only for |x|<1.'},
  ],
  check:[
    {q:'sin(x) ≈ x for small x. Why?',opts:['sin and x are always equal','First term of Maclaurin series is x','sin(0)=0=x when x=0','Approximation formula'],ans:1,fb:'sin(x)=x−x³/6+... For small x, higher powers are negligible. sin(x)≈x.'},
    {q:'e^(0.1) ≈ 1+0.1+0.01/2 = ?',opts:['1.100','1.105','1.01','1.110'],ans:1,fb:'1+0.1+0.005=1.105. (Actual value ≈ 1.10517)'},
    {q:'The Taylor series uses f⁽ⁿ⁾(a) instead of f(a) for n>0 because:',opts:['It\'s more accurate','Matching derivatives ensures the polynomial matches f at all orders','It\'s the definition of limits','a doesn\'t change'],ans:1,fb:'Setting f⁽ⁿ⁾(a) = (nth derivative of polynomial at a) ensures the polynomial matches f in value, slope, curvature, etc.'},
  ]
});

L('6-10',{
  tagline:"Vectors have both magnitude and direction — they're the language of physics. Every force, velocity, and displacement is a vector.",
  concept:`<div class="big-idea">A vector v = ⟨a, b, c⟩ has magnitude |v| = √(a²+b²+c²) and direction given by its components.</div>
<strong>Operations:</strong>
<br>• Addition: ⟨a,b⟩+⟨c,d⟩=⟨a+c,b+d⟩
<br>• Scalar multiplication: k⟨a,b⟩=⟨ka,kb⟩
<br>• Magnitude: |v|=√(a²+b²) in 2D
<br><br><strong>Unit vector:</strong> v̂=v/|v| — same direction, magnitude 1.
<br><br><strong>Standard basis vectors:</strong> i=⟨1,0,0⟩, j=⟨0,1,0⟩, k=⟨0,0,1⟩
<br>Any vector: v=ai+bj+ck
<br><br><strong>Component form from magnitude and angle:</strong>
<br>v = |v|⟨cos(θ), sin(θ)⟩
<div class="analogy">💡 Walking 3 miles east and 4 miles north: displacement vector ⟨3,4⟩. Magnitude=5 (straight-line distance). Direction=arctan(4/3)≈53° from east.</div>`,
  formula:{display:'|v|=√(a²+b²+c²) | Unit vector: v̂=v/|v|',caption:'Vectors add tip-to-tail geometrically, component-wise algebraically'},
  examples:[

      {t:'|v|=√(9+16)=5',d:''},

    ]},
    {label:'Example 2',q:'Add: u=⟨2,−1,3⟩, w=⟨−1,4,1⟩',steps:[
      {t:'Add components',d:'⟨2+(−1), −1+4, 3+1⟩'},

  mistakes:[
    {wrong:'Adding magnitudes of vectors directly',right:'|u+v|≠|u|+|v| in general. Add the component vectors, then find the magnitude of the result.'},
    {wrong:'Unit vector is the direction of the vector divided by 1',right:'Unit vector = v/|v|. Divide the component vector by its magnitude.'},
  ],
  check:[
    {q:'v=⟨−6,8⟩. |v|=?',opts:['14','10','2','100'],ans:1,fb:'√(36+64)=√100=10.'},
    {q:'2⟨3,−1⟩+⟨−1,4⟩=?',opts:['⟨5,2⟩','⟨5,−2⟩','⟨7,−2⟩','⟨6,2⟩'],ans:0,fb:'2⟨3,−1⟩=⟨6,−2⟩. +⟨−1,4⟩=⟨5,2⟩.'},
    {q:'Unit vector for ⟨0,−5⟩:',opts:['⟨0,−1⟩','⟨0,5⟩','⟨0,−5⟩','⟨−1,0⟩'],ans:0,fb:'|v|=5. ⟨0,−5⟩/5=⟨0,−1⟩.'},
  ]
});

L('6-11',{
  tagline:"Dot product and cross product are the two ways to multiply vectors — and they reveal perpendicularity, area, and 3D direction.",
  concept:`<div class="big-idea">Dot product: u·v = |u||v|cos(θ). Gives a scalar. Cross product: u×v = vector perpendicular to both.</div>
<strong>Dot product formula:</strong>
<br>⟨a,b,c⟩·⟨d,e,f⟩ = ad+be+cf
<br>• If u·v=0: vectors are perpendicular
<br>• cos(θ)=u·v/(|u||v|)
<br><br><strong>Cross product (3D only):</strong>
<br>u×v = ⟨b·f−c·e, c·d−a·f, a·e−b·d⟩
<br>|u×v| = |u||v|sin(θ) = area of parallelogram formed by u and v
<br>u×v is perpendicular to both u and v (right-hand rule gives direction)
<div class="analogy">💡 Torque = r×F. The force F applied at distance r creates rotation. The cross product gives the rotational axis and magnitude. Physics uses cross product constantly for rotation, magnetism, and angular momentum.</div>`,
  formula:{display:'u·v=ad+be+cf | |u×v|=|u||v|sin(θ)=area of parallelogram',caption:'Dot product = scalar. Cross product = vector (perpendicular to both).'},
  examples:[
    {label:'Example 1',q:'u=⟨2,3⟩, v=⟨−3,2⟩. Find u·v and the angle.',steps:[
      {t:'u·v=2(−3)+3(2)=−6+6=0',d:''},
      {t:'u·v=0 → perpendicular',d:'<span class="math answer">θ=90°</span>'},
    ]},
    {label:'Example 2',q:'u=⟨1,0,0⟩, v=⟨0,1,0⟩. Find u×v.',steps:[
      {t:'i: (0·0−0·1)=0',d:'j: −(1·0−0·0)=0 | k: 1·1−0·0=1'},
      {t:'',d:'<span class="math answer">u×v=⟨0,0,1⟩=k</span>'},
    ]},
  ],
  tryit:{q:'u=⟨1,2,−1⟩, v=⟨3,0,4⟩. u·v=?',opts:['−1','1','5','11'],ans:0,hint:'Multiply component by component and add: 1×3+2×0+(−1)×4.',feedback:'3+0−4=−1.'},
  mistakes:[
    {wrong:'Dot product gives a vector',right:'Dot product gives a SCALAR (a number). Cross product gives a vector.'},
    {wrong:'Cross product is commutative: u×v=v×u',right:'Cross product is anti-commutative: u×v=−(v×u). Order matters!'},
  ],
  check:[
    {q:'If u·v=|u||v|, then θ=?',opts:['0°','90°','45°','180°'],ans:0,fb:'u·v=|u||v|cos(θ). If u·v=|u||v|, then cos(θ)=1, θ=0° (parallel vectors).'},
    {q:'|u×v| equals the area of what shape?',opts:['Triangle with sides u,v','Parallelogram with sides u,v','Rectangle','Circle'],ans:1,fb:'|u×v|=|u||v|sin(θ)=area of parallelogram formed by u and v.'},
    {q:'Two vectors are perpendicular if and only if:',opts:['u×v=0','u·v=0','|u|=|v|','u+v=0'],ans:1,fb:'u·v=|u||v|cos(θ). cos(90°)=0. So perpendicular ↔ u·v=0.'},

L('6-12',{
  tagline:"Matrices are rectangular arrays of numbers that represent linear transformations, systems of equations, and much more. They're the language of linear algebra.",
  concept:`<div class="big-idea">A matrix is an m×n array of numbers. Matrix multiplication combines linear transformations.</div>
<strong>Matrix operations:</strong>
<br>• Addition: same dimensions, add element-by-element
<br>• Scalar multiplication: multiply every element by scalar
<br>• Matrix multiplication: (AB)ᵢⱼ = (row i of A) · (column j of B) — dot product
<br><br><strong>Matrix multiplication rules:</strong>
<br>• A(m×n) times B(n×p) = C(m×p) — inner dimensions must match
<br>• NOT commutative: AB ≠ BA in general
<br>• Associative: (AB)C = A(BC)
<br><br><strong>Identity matrix I:</strong> AI = IA = A. Diagonal of 1s, rest 0.
<div class="analogy">💡 Matrix multiplication AB: each entry in C is the dot product of a row from A and a column from B. You\'re asking: "how do these two transformations combine?" The answer is each output component depends on all inputs.</div>`,
  formula:{display:'(AB)ᵢⱼ = Σₖ Aᵢₖ·Bₖⱼ (row × column)',caption:'Inner dimensions must match: (m×n)(n×p)=(m×p)'},
  examples:[
    {label:'Example 1',q:'Multiply: [[1,2],[3,4]] × [[5,6],[7,8]]',steps:[
      {t:'(1,1): 1·5+2·7=19',d:'(1,2): 1·6+2·8=22'},
      {t:'(2,1): 3·5+4·7=43',d:'(2,2): 3·6+4·8=50'},
      {t:'',d:'<span class="math answer">[[19,22],[43,50]]</span>'},
    ]},
  ],
  tryit:{q:'For (3×4) matrix A and (4×2) matrix B, AB is size:',opts:['4×4','3×2','4×2','3×4'],ans:1,hint:'Result is (outer dimensions): m×p = first rows × last columns.',feedback:'(3×4)(4×2)=(3×2).'},
  mistakes:[
    {wrong:'Adding matrices of different sizes',right:'Matrix addition is only defined for matrices of the SAME dimensions.'},
    {wrong:'AB=BA always',right:'Matrix multiplication is generally NOT commutative. AB and BA may have different dimensions or values.'},
  ],
  check:[
    {q:'2×[[3,1],[0,5]]=?',opts:['[[6,2],[0,10]]','[[5,3],[2,7]]','[[6,1],[0,5]]','[[3,1],[0,5]]'],ans:0,fb:'Multiply every element by 2.'},
    {q:'(2×3)(3×3) matrix product is size:',opts:['2×3','3×2','2×2','3×3'],ans:0,fb:'(2×3)(3×3)=(2×3). Outer dimensions: 2 rows, 3 columns.'},
    {q:'I = [[1,0],[0,1]]. What is AI for any 2×2 matrix A?',opts:['I','A','0','2A'],ans:1,fb:'I is the identity matrix. AI=IA=A for any compatible matrix A.'},
  ]
});

L('6-13',{
  tagline:"Determinants encode the scaling factor of a linear transformation. Inverses let you reverse transformations and solve matrix equations.",
  concept:`<div class="big-idea">det(A) = ad−bc for 2×2. If det≠0, the inverse exists. A⁻¹A = AA⁻¹ = I.</div>
<strong>2×2 determinant:</strong>
<br>det([[a,b],[c,d]]) = ad − bc
<br><br><strong>2×2 inverse:</strong>
<br>A⁻¹ = (1/det(A)) × [[d,−b],[−c,a]]
<br><br><strong>3×3 determinant:</strong> expand along any row or column (cofactor expansion).
<br>Sarrus' rule: diagonal products.
<br><br><strong>Solving Ax=b:</strong> x = A⁻¹b (if A is invertible)
<br><br>det=0 means the matrix is singular (non-invertible) — the system has no unique solution.
<div class="analogy">💡 det(A) = the factor by which a matrix scales area. det=2: areas double. det=−1: areas preserved but orientation flipped. det=0: the transformation collapses to a lower dimension — you can\'t reverse it.</div>`,
  formula:{display:'det([[a,b],[c,d]])=ad−bc | A⁻¹=(1/det)[[d,−b],[−c,a]]',caption:'det=0 → singular → no inverse → system has no unique solution'},
  examples:[
    {label:'Example 1',q:'A=[[3,1],[2,4]]. Find det and A⁻¹.',steps:[
      {t:'det=3·4−1·2=12−2=10',d:''},
      {t:'A⁻¹=(1/10)[[4,−1],[−2,3]]',d:'<span class="math answer">=[[0.4,−0.1],[−0.2,0.3]]</span>'},
    ]},
  ],
  tryit:{q:'det([[5,2],[3,1]])=?',opts:['5','−1','1','11'],ans:2,hint:'ad−bc=5·1−2·3.',feedback:'5−6=−1. Answer: −1.'},
  mistakes:[
    {wrong:'det([[a,b],[c,d]])=ac−bd',right:'det=ad−bc. Main diagonal minus anti-diagonal. Not ac−bd.'},
    {wrong:'A⁻¹ = 1/A (treating like a scalar)',right:'A⁻¹ is computed using the formula. You can\'t just divide — matrix division isn\'t defined.'},
  ],
  check:[
    {q:'det([[1,0],[0,1]])=?',opts:['1','0','2','−1'],ans:0,fb:'1·1−0·0=1. Determinant of identity matrix is always 1.'},
    {q:'det([[2,4],[1,2]])=0. This means:',opts:['A is invertible','The system Ax=b has infinitely many or no solutions','det was computed wrong','A=0'],ans:1,fb:'det=0 → singular → not invertible → Ax=b has no unique solution.'},
    {q:'A=[[1,2],[3,4]]. det=−2. A⁻¹=?',opts:['(−1/2)[[4,−2],[−3,1]]','(1/2)[[4,−2],[−3,1]]','(−1/2)[[1,2],[3,4]]','[[−2,1],[1.5,−0.5]]'],ans:0,fb:'A⁻¹=(1/det)[[d,−b],[−c,a]]=(1/−2)[[4,−2],[−3,1]].'},
  ]
});

L('6-14',{
  tagline:"Differential equations relate a function to its own derivative. They model everything from population growth to heat flow to quantum mechanics.",
  concept:`<div class="big-idea">A differential equation (DE) involves a function and its derivatives. Solving means finding the function itself.</div>
<strong>Types:</strong>
<br>• Separable: dy/dx = f(x)g(y) → separate and integrate both sides
<br>• Linear first-order: dy/dx + P(x)y = Q(x) → use integrating factor
<br><br><strong>Separable DEs:</strong>
<br>dy/g(y) = f(x)dx → integrate both sides → solve for y
<br><br><strong>Integrating factor for linear DEs:</strong>
<br>μ(x) = e^(∫P(x)dx)
<br>Multiply both sides by μ, left side becomes d/dx[μy], integrate both sides.
<br><br><strong>Initial value problems (IVP):</strong> a DE with a specific starting condition like y(0)=3. Use it to find C.
<div class="analogy">💡 Population P grows proportional to itself: dP/dt=kP. Separating: dP/P=k dt. Integrating: ln P = kt+C. So P=P₀eᵏᵗ. The exponential growth you\'ve seen before is just the solution to this DE.</div>`,
  formula:{display:'Separable: ∫dy/g(y)=∫f(x)dx | Linear: integrating factor μ=e^(∫P dx)',caption:'IVP: use initial condition to find the constant C'},
  examples:[
    {label:'Example 1 — Separable',q:'dy/dx = xy. Find y.',steps:[
      {t:'Separate: dy/y = x dx',d:''},
      {t:'Integrate: ln|y| = x²/2 + C',d:''},
      {t:'Exponentiate',d:'<span class="math answer">y = Ae^(x²/2)</span>'},
    ]},
    {label:'Example 2 — IVP',q:'dy/dx = 2y, y(0) = 3',steps:[
      {t:'General solution: y = Ae^(2x)',d:''},
      {t:'y(0) = A = 3',d:''},
      {t:'',d:'<span class="math answer">y = 3e^(2x)</span>'},
    ]},
  ],
  tryit:{q:'Solve: dy/dx = x/y. (Separable)',opts:['y=x+C','y²=x²+C','y=eˣ+C','y=x²/2+C'],ans:1,hint:'Separate: y dy = x dx. Integrate both sides.',feedback:'y²/2=x²/2+C₁. Multiply by 2: y²=x²+C.'},
  mistakes:[
    {wrong:'Not including +C when integrating to solve a DE',right:'The +C is essential — it represents the family of all solutions. Only an initial condition pins down a specific one.'},
    {wrong:'Separating non-separable DEs',right:'dy/dx=x+y is NOT separable (can\'t write as f(x)g(y)). It requires the integrating factor method.'},
  ],
  check:[
    {q:'dy/dx = 3y, y(0)=5. Solution?',opts:['y=5e^(3x)','y=3e^(5x)','y=5+3x','y=5e^x'],ans:0,fb:'General: y=Ae^(3x). y(0)=A=5. y=5e^(3x).'},
    {q:'A separable DE has the form:',opts:['dy/dx=f(x)+g(y)','dy/dx=f(x)·g(y)','d²y/dx²=f(x)','dy/dx=f(x)/f(y)'],ans:1,fb:'Separable: dy/dx=f(x)g(y). You can divide both sides by g(y) to separate.'},
    {q:'What does solving a DE give you?',opts:['A derivative','A function y(x)','A number','A slope field only'],ans:1,fb:'Solving a DE means finding the function y(x) that satisfies the equation — not just a value or derivative.'},
  ]
});

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function getProgress(){ try{return JSON.parse(localStorage.getItem('apexmath_lessons')||'{}')}catch(e){return{}} }
function markDone(id){ const p=getProgress(); p[id]=true; localStorage.setItem('apexmath_lessons',JSON.stringify(p)); }

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────────
let currentLessonId = null;
let allLessonBtns = [];

function buildSidebar(){
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML='';
  const progress = getProgress();
  CURRICULUM.forEach((lvl,li)=>{
    const group = document.createElement('div'); group.className='level-group';
    const header = document.createElement('button');
    header.className='level-header'+(li===0?' open':'');
    header.innerHTML=`<span>${lvl.emoji} Level ${lvl.level} — ${lvl.name}</span><span class="level-arrow">▶</span>`;
    header.onclick=()=>{
      const isOpen=header.classList.toggle('open');
      list.style.display=isOpen?'flex':'none';
    };
    const list = document.createElement('div'); list.className='lesson-list';
    list.style.display=li===0?'flex':'none';
    lvl.lessons.forEach(lesson=>{
      const btn = document.createElement('button'); btn.className='lesson-btn';
      btn.dataset.id=lesson.id;
      const isDone=progress[lesson.id];
      if(isDone) btn.classList.add('done');
      btn.innerHTML=`<div class="lb-dot"></div>${lesson.title}`;
      btn.onclick=()=>openLesson(lesson.id);
      list.appendChild(btn);
      allLessonBtns.push(btn);
    });
    group.appendChild(header); group.appendChild(list);
    nav.appendChild(group);
  });
}

function filterLessons(query){
  const q=query.toLowerCase().trim();
  allLessonBtns.forEach(btn=>{
    const match=!q||btn.textContent.toLowerCase().includes(q);
    btn.style.display=match?'':'none';
  });
  if(q){
    document.querySelectorAll('.level-header').forEach(h=>{h.classList.add('open');h.nextElementSibling.style.display='flex';});
  }
}

function renderHome(){
  currentLessonId=null;
  const progress=getProgress();
  const main=document.getElementById('main-content');
  main.innerHTML='';
  const div=document.createElement('div'); div.className='home-screen';
  const totalDone=Object.keys(progress).length;
  const totalLessons=CURRICULUM.reduce((a,lvl)=>a+lvl.lessons.length,0);
  div.innerHTML=`
    <div class="home-eyebrow">ApexMath Lessons</div>
    <h1 class="home-h1">Learn the math.<br><em>All of it.</em></h1>
    <p class="home-sub">93 lessons from Arithmetic to Calculus II. Each one has a clear explanation, worked examples, guided practice, and a quick check at the end.</p>
    ${totalDone>0?`<div style="font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem">✓ ${totalDone}/${totalLessons} lessons completed</div>`:''}
    <div class="level-cards">${CURRICULUM.map(lvl=>{
      const done=lvl.lessons.filter(l=>progress[l.id]).length;
      const pct=Math.round(done/lvl.lessons.length*100);
      return`<div class="level-card" onclick="openFirstLesson(${lvl.level})">

        <div class="lc-count">${lvl.lessons.length} lessons · ${done} done</div>
        <div class="lc-prog"><div class="lc-prog-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}</div>
  `;
  main.appendChild(div);
}

function openFirstLesson(levelNum){
  const lvl=CURRICULUM[levelNum];
  if(lvl&&lvl.lessons.length) openLesson(lvl.lessons[0].id);
}

// ── RENDER LESSON ─────────────────────────────────────────────────────────────
let checkAnswers={}, tryitAnswered=false, checkScores=[], hintShown=false;

function openLesson(id){
  currentLessonId=id;
  tryitAnswered=false; checkAnswers={}; checkScores=[];
  // Update sidebar
  allLessonBtns.forEach(b=>{
    b.classList.toggle('active',b.dataset.id===id);
    if(b.dataset.id===id){
      // Open that level group
      const list=b.closest('.lesson-list');
      const header=list?.previousElementSibling;
      if(header&&!header.classList.contains('open')){
        header.classList.add('open'); list.style.display='flex';
      }
      b.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  });
  const data = LESSONS[id] || getDefaultLesson(id);
  if(!data){ renderHome(); return; }
  // Find lesson metadata
  let lessonMeta=null, levelData=null, lessonIdx=0;
  for(const lvl of CURRICULUM){
    const idx=lvl.lessons.findIndex(l=>l.id===id);
    if(idx>=0){ lessonMeta=lvl.lessons[idx]; levelData=lvl; lessonIdx=idx; break; }
  }
  const allLessons=CURRICULUM.flatMap(l=>l.lessons);
  const globalIdx=allLessons.findIndex(l=>l.id===id);
  const prevLesson=globalIdx>0?allLessons[globalIdx-1]:null;
  const nextLesson=globalIdx<allLessons.length-1?allLessons[globalIdx+1]:null;
  const progress=getProgress();
  const totalInLevel=levelData.lessons.length;
  const doneInLevel=levelData.lessons.filter(l=>progress[l.id]).length;
  const progPct=Math.round(doneInLevel/totalInLevel*100);

  const main=document.getElementById('main-content');
  main.innerHTML='';
  const inner=document.createElement('div'); inner.className='main-inner';

  inner.innerHTML=`
    <div class="lesson-nav">
      <button class="lesson-nav-btn" onclick="${prevLesson?`openLesson('${prevLesson.id}')`:'renderHome()'}" ${!prevLesson?'disabled':''}>
        ← ${prevLesson?prevLesson.title.split(' ').slice(0,3).join(' ')+'…':'Home'}
      </button>
      <div class="lesson-crumb">Level ${levelData.level} · ${lessonIdx+1} / ${totalInLevel}</div>
      <button class="lesson-nav-btn" onclick="${nextLesson?`openLesson('${nextLesson.id}')`:'renderHome()'}" ${!nextLesson?'disabled':''}>
        ${nextLesson?nextLesson.title.split(' ').slice(0,3).join(' ')+'…':'Home'} →
      </button>
    </div>
    <div class="lesson-progress"><div class="lesson-progress-fill" style="width:${progPct}%"></div></div>
    <div class="lesson-eyebrow">${levelData.emoji} Level ${levelData.level} — ${levelData.name}</div>
    <h1 class="lesson-title">${lessonMeta.title}</h1>
    <p class="lesson-tagline">${data.tagline}</p>
    <span class="info-tag time">⏱ ~10 min</span>
    <span class="info-tag">📖 Read first, then practice</span>

    <!-- CONCEPT -->
    <div class="block">
      <div class="block-label"><span class="block-label-icon">💡</span> The Concept</div>
      <div class="concept-box">${data.concept}</div>
    </div>

    ${data.formula?`<div class="block">
      <div class="block-label"><span class="block-label-icon">📌</span> Key Formula</div>
      <div class="formula-box"><div class="formula-display">${data.formula.display}</div><div class="formula-caption">${data.formula.caption}</div></div>
    </div>`:''}

    <!-- EXAMPLES -->
    <div class="block">
      <div class="block-label"><span class="block-label-icon">🔍</span> Worked Examples</div>
      ${data.examples.map((ex,ei)=>`
        <div class="example-card">
          <div class="example-header">
            <span class="example-label">${ex.label}</span>
            <span class="example-q">${ex.q}</span>
          </div>
          <div class="example-body">
            <div class="step-list">${ex.steps.map((s,si)=>`
              <div class="step">
                <div class="step-num">${si+1}</div>
                <div class="step-content"><strong>${s.t}</strong>${s.d?'<br>'+s.d:''}</div>
              </div>
            `).join('')}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- COMMON MISTAKES -->
    ${data.mistakes&&data.mistakes.length?`<div class="block">
      <div class="block-label"><span class="block-label-icon">⚠️</span> Common Mistakes</div>
      <div class="mistake-box">${data.mistakes.map(m=>`
        <div class="mistake-item"><span class="mistake-x">✗</span><span class="mistake-text"><strong>Wrong:</strong> ${m.wrong}<br><strong>Right:</strong> ${m.right}</span></div>
      `).join('')}</div>
    </div>`:''}

    <!-- TRY IT -->
    <div class="block">
      <div class="block-label"><span class="block-label-icon">✏️</span> Try It Yourself</div>
      <div class="tryit-card" id="tryit-card">
        <div class="tryit-q">${data.tryit.q}</div>
        ${data.tryit.hint?`<button class="tryit-hint-btn" id="tryit-hint-btn" onclick="showTryitHint()">💡 Need a hint?</button>
        <div class="tryit-hint" id="tryit-hint">${data.tryit.hint}</div>`:''}
        <div class="tryit-opts" id="tryit-opts">
          ${data.tryit.opts.map((opt,oi)=>`
            <button class="tryit-opt" onclick="handleTryit(${oi},${data.tryit.ans})">
              <span class="tryit-letter">${['A','B','C','D'][oi]}</span>${opt}
            </button>
          `).join('')}
        </div>
        <div class="tryit-feedback" id="tryit-fb"></div>
      </div>
    </div>

    <!-- QUICK CHECK -->
    <div class="block">
      <div class="block-label"><span class="block-label-icon">✅</span> Quick Check — 3 Questions</div>
      <div class="check-section">
        <div class="check-header">Answer all 3 before seeing your score.</div>
        <div class="check-body" id="check-body">
          ${data.check.map((q,qi)=>`
            <div class="check-item" data-idx="${qi}">
              <div class="check-q">${qi+1}. ${q.q}</div>
              <div class="check-opts" id="check-opts-${qi}">
                ${q.opts.map((opt,oi)=>`
                  <div class="check-opt" onclick="handleCheck(${qi},${oi},${q.ans},'${encodeURIComponent(q.fb)}')">
                    <span class="tryit-letter">${['A','B','C','D'][oi]}</span>${opt}
                  </div>
                `).join('')}
              </div>
              <div class="check-fb" id="check-fb-${qi}"></div>
            </div>
          `).join('')}
        </div>
        <div class="check-score" id="check-score"></div>
      </div>
    </div>

    <!-- DONE -->
    <div class="lesson-done" id="lesson-done">
      <div class="lesson-done-icon">🎉</div>
      <div class="lesson-done-title">Lesson Complete!</div>
      <div class="lesson-done-sub" id="lesson-done-sub">You've finished this lesson. The next one is waiting.</div>
      ${nextLesson?`<button class="next-lesson-btn" onclick="openLesson('${nextLesson.id}')">Next: ${nextLesson.title} →</button>`:'<button class="next-lesson-btn" onclick="renderHome()">← Back to All Lessons</button>'}
    </div>
  `;
  main.appendChild(inner);
  main.scrollTo(0,0);
  window.scrollTo(0,0);
}

function showTryitHint(){
  document.getElementById('tryit-hint')?.classList.add('show');
  document.getElementById('tryit-hint-btn')?.style.setProperty('display','none');
}

function handleTryit(chosen, correct){
  if(tryitAnswered) return;
  tryitAnswered=true;
  const opts=document.querySelectorAll('.tryit-opt');
  opts.forEach((o,i)=>{
    o.classList.add('disabled');
    if(i===correct) o.classList.add('correct');
    if(i===chosen&&chosen!==correct) o.classList.add('wrong');
  });
  const fb=document.getElementById('tryit-fb');
  const data=LESSONS[currentLessonId]||getDefaultLesson(currentLessonId);
  fb.className='tryit-feedback '+(chosen===correct?'right':'wrong');
  fb.innerHTML=chosen===correct?`<strong>✓ Correct!</strong> ${data.tryit.feedback}`:`<strong>✗ Not quite.</strong> ${data.tryit.feedback}`;
  const card=document.getElementById('tryit-card');
  if(card) card.className='tryit-card '+(chosen===correct?'answered-right':'answered-wrong');
}

let checkAnswered={};
function handleCheck(qi, chosen, correct, fbEncoded){
  if(checkAnswered[qi]) return;
  checkAnswered[qi]={chosen,correct};
  const opts=document.querySelectorAll(`#check-opts-${qi} .check-opt`);
  opts.forEach((o,i)=>{
    o.classList.add('disabled');
    if(i===correct) o.classList.add('correct');
    if(i===chosen&&chosen!==correct) o.classList.add('wrong');
  });
  const fb=document.getElementById(`check-fb-${qi}`);
  const isRight=chosen===correct;
  fb.className='check-fb show '+(isRight?'right':'wrong');
  fb.textContent=decodeURIComponent(fbEncoded);
  // Check if all answered
  const data=LESSONS[currentLessonId]||getDefaultLesson(currentLessonId);
  if(Object.keys(checkAnswered).length===data.check.length) showCheckScore(data);
}

function showCheckScore(data){
  const score=Object.values(checkAnswered).filter(a=>a.chosen===a.correct).length;
  const total=data.check.length;
  const scoreEl=document.getElementById('check-score');
  const msgs=['Keep at it — review the examples above and try again!','Getting there! Re-read the concept section.','Solid! You\'ve got the core idea.'];
  const msg=score===total?'Perfect! You nailed it. 🎉':msgs[Math.min(score,2)];
  scoreEl.innerHTML=`<div class="check-score-num">${score}/${total}</div><div class="check-score-label">Quick Check Score</div><div class="check-score-msg">${msg}</div>`;
  scoreEl.classList.add('show');
  if(score===total||(score/total>=0.67)){
    markDone(currentLessonId);
    document.getElementById('lesson-done')?.classList.add('show');
    buildSidebar();
  }
}
