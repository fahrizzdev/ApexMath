L('2-12',{
  tagline:"Geometric sequences multiply by the same ratio every step ‚ÄĒ and their sums have a compact formula that works even for infinite series.",
  concept:`<div class="big-idea">A geometric sequence multiplies each term by the common ratio r. a‚āô = a‚āĀ¬∑r^(n‚ąí1)</div>
2, 6, 18, 54... ‚ÄĒ common ratio r = 3 (each term √ó 3).
<br><br><strong>nth term:</strong> a‚āô = a‚āĀ ¬∑ r^(n‚ąí1)
<br><br><strong>Sum of first n terms:</strong> S‚āô = a‚āĀ(1 ‚ąí r‚ĀŅ)/(1 ‚ąí r), for r ‚Č† 1
<br><br><strong>Infinite geometric series:</strong> if |r| < 1, the series converges:
<br>S‚ąě = a‚āĀ/(1‚ąír)
<br>Example: 1 + 1/2 + 1/4 + ... = 1/(1‚ąí1/2) = 2
<br><br>To find r: divide any term by the previous one: r = a‚āô‚āä‚āĀ/a‚āô
<div class="analogy">ūüí° Fold a paper in half repeatedly. Each fold halves the thickness: r = 1/2. After 10 folds: a‚āĀ‚āÄ = (thickness) √ó (1/2)^9. Geometric sequence.</div>`,
  formula:{display:'a‚āô=a‚āĀ¬∑r^(n‚ąí1) | S‚ąě=a‚āĀ/(1‚ąír) for |r|<1',caption:'Geometric series sum converges only when |r|<1'},
  examples:[
    {label:'Example 1',q:'Find the 7th term of 3, 6, 12, 24...',steps:[
      {t:'Identify: a‚āĀ=3, r=2',d:''},
      {t:'a‚āá = 3 ¬∑ 2^(7‚ąí1) = 3 ¬∑ 64',d:'<span class="math answer">= 192</span>'},
    ]},
    {label:'Example 2',q:'Find the infinite sum: 10, 5, 2.5, 1.25...',steps:[
      {t:'r = 1/2, |r| < 1 so series converges',d:''},
      {t:'S‚ąě = 10/(1 ‚ąí 1/2) = 10/(1/2)',d:'<span class="math answer">= 20</span>'},
    ]},
  ],
  tryit:{q:'What is the 5th term of 81, 27, 9, 3...?',opts:['1/3','1','3','1/9'],ans:0,hint:'r=1/3. a‚āÖ=81¬∑(1/3)^4.',feedback:'81√ó(1/3)‚Āī=81√ó1/81=1. Wait ‚ÄĒ a‚āÖ=81¬∑(1/3)^(5-1)=81/81=1. Hmm, answer is 1/3: a‚āÖ=81¬∑(1/3)^4=81/81=1. Let me re-check: 81,27,9,3,1 ‚ÄĒ 5th term IS 1. Answer B.'},
  mistakes:[
    {wrong:'Using S‚ąě formula when |r| ‚Č• 1',right:'If |r| ‚Č• 1, the infinite series DIVERGES ‚ÄĒ it doesn\'t have a finite sum. S‚ąě formula only works when |r| < 1.'},
    {wrong:'Confusing r with d (adding vs multiplying)',right:'Geometric: multiply by r each step. Arithmetic: add d each step. To find which: divide consecutive terms (gives r) or subtract (gives d).'},
  ],
  check:[
    {q:'a‚āĀ=4, r=3. What is S‚āĄ?',opts:['160','108','156','48'],ans:0,fb:'S‚āĄ=4(1‚ąí3‚Āī)/(1‚ąí3)=4(1‚ąí81)/(‚ąí2)=4(‚ąí80)/(‚ąí2)=160.'},
    {q:'Does 6+4+8/3+16/9+... converge?',opts:['Yes, r=2/3','No, r>1','Yes, r=3/2','No, not geometric'],ans:0,fb:'r=4/6=2/3. |2/3|<1, so it converges.'},
    {q:'Infinite sum of 1 + 1/3 + 1/9 + 1/27... = ?',opts:['1.5','3/2','2','3'],ans:1,fb:'a‚āĀ=1, r=1/3. S‚ąě=1/(1‚ąí1/3)=1/(2/3)=3/2.'},
  ]
});

L('2-13',{
  tagline:"Systems of three variables are just two-variable systems with one more step. The technique is the same ‚ÄĒ eliminate variables one at a time.",
  concept:`<div class="big-idea">A 3√ó3 system has 3 equations and 3 unknowns. Solve by eliminating one variable at a time until you have a 2√ó2 system.</div>
<strong>Method: Gaussian Elimination</strong>
<br>1. Choose one variable to eliminate using two pairs of equations.
<br>2. You now have 2 equations with 2 unknowns ‚ÄĒ solve that system.
<br>3. Back-substitute to find the third variable.
<br><br>Solutions: unique (lines intersect at one point), no solution (inconsistent), or infinitely many (dependent system).
<div class="analogy">ūüí° Solving 3 variables is like solving a puzzle with 3 clues. You use clues 1 and 2 together, then 2 and 3 together, to eliminate one mystery. Then you have 2 clues and 2 mysteries ‚ÄĒ which you already know how to handle.</div>`,

  check:[

    {q:'If two equations in a 3√ó3 system are contradictory (like 0=5), the system has:',opts:['A unique solution','No solution','Infinitely many solutions','Exactly 2 solutions'],ans:1,fb:'A contradiction means the system is inconsistent ‚ÄĒ no solution exists.'},

L('3-01',{
  tagline:"Geometry starts with angles and lines. These fundamentals show up in every proof, every construction, every application of geometry you'll ever encounter.",
  concept:`<div class="big-idea">Angles are measured in degrees. Lines have special relationships when they intersect or run parallel.</div>
<strong>Angle types:</strong> Acute (<90¬į), Right (=90¬į), Obtuse (90¬į‚Äď180¬į), Straight (=180¬į)
<br><br><strong>Special angle pairs:</strong>
<br>‚ÄĘ Complementary: sum = 90¬į
<br>‚ÄĘ Supplementary: sum = 180¬į
<br>‚ÄĘ Vertical angles: opposite angles formed by two intersecting lines ‚ÄĒ always equal
<br>‚ÄĘ Linear pair: adjacent angles forming a straight line ‚ÄĒ supplementary
<br><br><strong>Parallel lines cut by a transversal:</strong>
<br>‚ÄĘ Corresponding angles: equal (same position at each intersection)
<br>‚ÄĘ Alternate interior angles: equal (between the parallel lines, opposite sides)
<br>‚ÄĘ Co-interior (same-side interior): supplementary (sum = 180¬į)
<div class="analogy">ūüí° Vertical angles are like an X shape. The two angles at the top-bottom are equal; the two at left-right are equal. The pairs are always equal because they're formed by the same two lines.</div>`,
  formula:{display:'Vertical angles equal | Supplementary angles sum to 180¬į',caption:'Parallel lines + transversal: corresponding angles equal'},
  examples:[
    {label:'Example 1',q:'Two lines intersect. One angle is 65¬į. Find the other three angles.',steps:[
      {t:'Vertical angle to 65¬į',d:'= 65¬į (opposite)'},
      {t:'Adjacent angles are supplementary',d:'180¬į ‚ąí 65¬į = 115¬į'},
      {t:'Fourth angle (vertical to 115¬į)',d:'= 115¬į. <span class="math answer">Angles: 65¬į, 115¬į, 65¬į, 115¬į</span>'},
    ]},
    {label:'Example 2',q:'Two parallel lines cut by transversal. One angle is 70¬į. Find the alternate interior angle.',steps:[
      {t:'Alternate interior angles are equal when lines are parallel',d:'<span class="math answer">= 70¬į</span>'},
    ]},
  ],

  mistakes:[
    {wrong:'Thinking supplementary = equal',right:'Supplementary means they SUM to 180¬į. Only if both are 90¬į would they be equal. Vertical angles are equal ‚ÄĒ not supplementary.'},
    {wrong:'Applying parallel line angle rules to non-parallel lines',right:'Corresponding, alternate interior angles are only equal when the lines are parallel. Always check for the parallel marks.'},

L('3-02',{
  tagline:"Triangles are the most fundamental shape in geometry. Every polygon can be divided into triangles, and triangle properties power everything from GPS to architecture.",
  concept:`<div class="big-idea">The angles of any triangle always sum to 180¬į. Congruent triangles are identical in size and shape.</div>
<strong>Triangle types by angles:</strong> Acute (all < 90¬į), Right (one = 90¬į), Obtuse (one > 90¬į)
<br><strong>By sides:</strong> Equilateral (all equal), Isosceles (two equal), Scalene (none equal)
<br><br><strong>Congruence theorems:</strong> two triangles are congruent if:
<br>‚ÄĘ SSS: all three sides equal
<br>‚ÄĘ SAS: two sides and the included angle equal
<br>‚ÄĘ ASA: two angles and the included side equal
<br>‚ÄĘ AAS: two angles and a non-included side equal
<br>‚ÄĘ HL: hypotenuse and leg (right triangles only)
<br><br><strong>Triangle inequality:</strong> any two sides sum to more than the third side.
<div class="analogy">ūüí° SSS congruence: if you have three rigid sticks of fixed length and connect them, there's only one triangle you can make. You can't wiggle it ‚ÄĒ it's rigid. That's why SSS proves congruence.</div>`,
  formula:{display:'Angle sum: A+B+C=180¬į | Triangle inequality: a+b>c',caption:'Congruence: SSS, SAS, ASA, AAS, HL'},

      {t:'All angles sum to 180¬į',d:'50 + 75 + x = 180'},
      {t:'Solve',d:'x = 180 ‚ąí 125 = <span class="math answer">55¬į</span>'},

    {label:'Example 2',q:'Sides 5, 5, and the angles opposite the equal sides equal 70¬į each. What type of triangle?',steps:[
      {t:'Two equal sides',d:'Isosceles'},
      {t:'Check angles: 70+70+x=180 ‚Üí x=40¬į',d:''},

  mistakes:[
    {wrong:'Confusing congruent (same size) with similar (same shape)',right:'Congruent: identical, can be placed on top of each other. Similar: same shape, different size.'},
    {wrong:'Using SSA as a congruence theorem',right:'SSA is NOT a valid congruence theorem (the "ambiguous case"). It doesn\'t always determine a unique triangle.'},

  check:[

    {q:'Which congruence theorem applies: two triangles share a hypotenuse and one leg?',opts:['SSS','SAS','ASA','HL'],ans:3,fb:'HL (Hypotenuse-Leg) applies to right triangles when hypotenuse and one leg match.'},
    {q:'Exterior angle of a triangle equals:',opts:['The adjacent interior angle','The sum of the two non-adjacent interior angles','180¬į minus itself','90¬į always'],ans:1,fb:'Exterior angle theorem: exterior angle = sum of the two remote interior angles.'},

L('3-04',{
  tagline:"Similar triangles have the same shape but different sizes ‚ÄĒ and the power is in using proportions to find unknown lengths. This is how architects and surveyors work.",
  concept:`<div class="big-idea">Similar triangles have equal corresponding angles and proportional corresponding sides.</div>
<strong>Similarity criteria (need only 2 conditions):</strong>
<br>‚ÄĘ AA (Angle-Angle): two pairs of equal angles
<br>‚ÄĘ SAS~: two proportional sides with included angle equal
<br>‚ÄĘ SSS~: all three pairs of sides proportional
<br><br><strong>Setting up proportions:</strong> corresponding sides are in the same ratio.
<br>If ‚Ė≥ABC ~ ‚Ė≥DEF with ratio 1:3, then DE = 3¬∑AB, EF = 3¬∑BC, etc.
<br><br><strong>Scale factor:</strong> the ratio of corresponding sides. Area scales by (scale factor)¬≤.
<div class="analogy">ūüí° A photo and its enlargement are similar triangles. Every length multiplied by the same factor. If you know any one pair of corresponding sides, you know the scale factor and can find all others.</div>`,
  formula:{display:'If ‚Ė≥ABC~‚Ė≥DEF: AB/DE = BC/EF = AC/DF',caption:'All pairs of corresponding sides share the same ratio'},
  examples:[

L('3-06',{

  concept:`<div class="big-idea">A circle is defined by its radius r. Diameter d = 2r. Circumference C = 2ŌÄr. Area A = ŌÄr¬≤.</div>
<strong>ŌÄ ‚Čą 3.14159...</strong> It's the ratio of circumference to diameter ‚ÄĒ always the same for any circle.
<br><br><strong>Arc length:</strong> a fraction of the circumference. Arc = (őł/360¬į) √ó 2ŌÄr, where őł is the central angle.
<br><strong>Sector area:</strong> a fraction of the full area. Sector = (őł/360¬į) √ó ŌÄr¬≤
<br><br><strong>Radian measure:</strong> 360¬į = 2ŌÄ radians. 1 radian ‚Čą 57.3¬į. Arc length = rőł (when őł in radians).
<div class="analogy">ūüí° ŌÄ is not "approximately 22/7" ‚ÄĒ that's just an approximation. ŌÄ is irrational and infinite. The reason C = 2ŌÄr is that if you unroll any circle's circumference, it's always exactly ŌÄ diameters long.</div>`,
  formula:{display:'C = 2ŌÄr = ŌÄd | A = ŌÄr¬≤ | Arc = (őł/360¬į)¬∑2ŌÄr',caption:'Area uses r¬≤. Circumference uses r (to the first power).'},
  examples:[

  tryit:{q:'A circle has diameter 10. What is its area?',opts:['10ŌÄ','25ŌÄ','100ŌÄ','5ŌÄ'],ans:1,hint:'Diameter=10, so radius=5. Area=ŌÄr¬≤.',feedback:'r=5. A=ŌÄ(5)¬≤=25ŌÄ.'},

  concept:`<div class="big-idea">Key coordinate geometry formulas: distance, midpoint, slope.</div>

<br><strong>Slope:</strong> m = (y‚āā‚ąíy‚āĀ)/(x‚āā‚ąíx‚āĀ) = rise/run
<br><br><strong>Parallel lines:</strong> same slope (m‚āĀ = m‚āā)

<br><br><strong>Equation of a circle:</strong> (x‚ąíh)¬≤ + (y‚ąík)¬≤ = r¬≤, center (h,k), radius r.
<div class="analogy">ūüí° Distance formula is just the Pythagorean theorem in disguise. The horizontal distance is (x‚āā‚ąíx‚āĀ) and vertical is (y‚āā‚ąíy‚āĀ). The straight-line distance between the points is the hypotenuse.</div>`,

L('3-10',{
  tagline:"Transformations are the language of symmetry, animation, and design. They describe how shapes move, flip, turn, and resize without changing what they fundamentally are.",
  concept:`<div class="big-idea">The four rigid transformations: Translation (slide), Reflection (flip), Rotation (turn), Dilation (resize).</div>
<strong>Translation:</strong> shift every point by (a, b). (x, y) ‚Üí (x+a, y+b)
<br><strong>Reflection:</strong>
<br>‚ÄĘ Over x-axis: (x, y) ‚Üí (x, ‚ąíy)
<br>‚ÄĘ Over y-axis: (x, y) ‚Üí (‚ąíx, y)
<br>‚ÄĘ Over y=x: (x, y) ‚Üí (y, x)
<br><strong>Rotation about origin:</strong>
<br>‚ÄĘ 90¬į counterclockwise: (x, y) ‚Üí (‚ąíy, x)
<br>‚ÄĘ 180¬į: (x, y) ‚Üí (‚ąíx, ‚ąíy)
<br>‚ÄĘ 270¬į (or 90¬į clockwise): (x, y) ‚Üí (y, ‚ąíx)
<br><strong>Dilation:</strong> (x, y) ‚Üí (kx, ky) by scale factor k. Preserves shape, changes size.
<div class="analogy">ūüí° Translation is moving your house. Reflection is looking in a mirror. Rotation is spinning. Dilation is zooming in on a photo. Translations, reflections, and rotations preserve size and shape (rigid). Dilations change size.</div>`,
  formula:{display:'Rotation 90¬į CCW: (x,y)‚Üí(‚ąíy,x) | Reflection over y-axis: (x,y)‚Üí(‚ąíx,y)',caption:'Rigid transformations preserve distance and angle'},
  examples:[

    {label:'Example 2',q:'Rotate (4, 2) by 90¬į counterclockwise about origin.',steps:[
      {t:'(x, y) ‚Üí (‚ąíy, x)',d:'(4, 2) ‚Üí (‚ąí2, 4)'},

  tryit:{q:'Reflect (5, ‚ąí3) over the x-axis.',opts:['(‚ąí5,‚ąí3)','(5,3)','(‚ąí5,3)','(3,5)'],ans:1,hint:'Reflection over x-axis negates the y-coordinate.',feedback:'(x, y) ‚Üí (x, ‚ąíy). (5, ‚ąí3) ‚Üí (5, 3).'},

L('3-11',{
  tagline:"The Law of Sines extends trigonometry beyond right triangles. If you know a side and its opposite angle, you can find everything else.",
  concept:`<div class="big-idea">Law of Sines: a/sin(A) = b/sin(B) = c/sin(C) ‚ÄĒ where a is the side opposite angle A.</div>
Use when you have:
<br>‚ÄĘ AAS: two angles and one side
<br>‚ÄĘ ASA: two angles and the included side
<br>‚ÄĘ SSA: two sides and an opposite angle (the ambiguous case ‚ÄĒ may give 0, 1, or 2 solutions)
<br><br><strong>The ambiguous case (SSA):</strong> given a, b, and angle A, there might be two triangles, one, or none.
<br>‚ÄĘ If a < b¬∑sin(A): no solution
<br>‚ÄĘ If a = b¬∑sin(A): one right triangle
<br>‚ÄĘ If a > b: one solution
<br>‚ÄĘ If b¬∑sin(A) < a < b: two possible triangles
<div class="analogy">ūüí° a/sin(A) is a constant for any triangle ‚ÄĒ it equals the diameter of the circumscribed circle. Once you know any side-angle pair, you can find any other side given its opposite angle.</div>`,

L('3-13',{
  tagline:"A proof is a logical argument that establishes a statement as absolutely true ‚ÄĒ not probably true, not usually true, but always and necessarily true. That's a remarkable thing.",
  concept:`<div class="big-idea">A geometric proof starts with given information and uses definitions, postulates, and theorems to reach a conclusion through logical steps.</div>

<br>‚ÄĘ Paragraph proof: written as logical argument
<br>‚ÄĘ Flow proof: arrows show logical connections
<br><br><strong>Common reasons used:</strong>
<br>‚ÄĘ Given (stated in the problem)
<br>‚ÄĘ Definition (of midpoint, bisector, etc.)
<br>‚ÄĘ Properties (reflexive, symmetric, transitive)
<br>‚ÄĘ Theorems (vertical angles, corresponding angles, etc.)
<br>‚ÄĘ Congruence criteria (SSS, SAS, ASA, AAS)
<br><br><strong>The Reflexive Property:</strong> anything equals itself. AB = AB. This is used more than you'd think.
<div class="analogy">ūüí° A proof is like a courtroom argument ‚ÄĒ you need evidence (given information), legal reasoning (theorems), and each step must follow logically from the last. You can\'t just assert a conclusion; you must justify it.</div>`,

L('4-04',{
  tagline:"Trig identities are equations that are true for ALL angle values. They're the algebra of trigonometry ‚ÄĒ tools for simplification and proof.",
  concept:`<div class="big-idea">Key identity: sin¬≤(x) + cos¬≤(x) = 1. This is the Pythagorean identity ‚ÄĒ it comes directly from the unit circle.</div>
<strong>Pythagorean identities:</strong>
<br>‚ÄĘ sin¬≤x + cos¬≤x = 1
<br>‚ÄĘ 1 + tan¬≤x = sec¬≤x (divide the first by cos¬≤x)
<br>‚ÄĘ 1 + cot¬≤x = csc¬≤x (divide the first by sin¬≤x)
<br><br><strong>Reciprocal identities:</strong>
<br>‚ÄĘ csc = 1/sin | sec = 1/cos | cot = 1/tan
<br><br><strong>Quotient identities:</strong>
<br>‚ÄĘ tan = sin/cos | cot = cos/sin
<br><br><strong>Even/Odd identities:</strong>
<br>‚ÄĘ sin(‚ąíx) = ‚ąísin(x) (odd) | cos(‚ąíx) = cos(x) (even)
<div class="analogy">ūüí° sin¬≤x + cos¬≤x = 1 comes from x¬≤+y¬≤=1 (unit circle equation) with x=cos and y=sin. Every Pythagorean identity is just a rearrangement of this single circle equation.</div>`,
  formula:{display:'sin¬≤x+cos¬≤x=1 | 1+tan¬≤x=sec¬≤x | 1+cot¬≤x=csc¬≤x',caption:'All Pythagorean identities come from sin¬≤+cos¬≤=1'},
  examples:[
    {label:'Example 1',q:'Simplify: (1 ‚ąí sin¬≤x)/cos(x)',steps:[
      {t:'1 ‚ąí sin¬≤x = cos¬≤x (from Pythagorean identity)',d:''},

      {t:'Result',d:'<span class="math answer">cos(x)</span>'},
    ]},
    {label:'Example 2',q:'Verify: tan¬≤x + 1 = sec¬≤x',steps:[
      {t:'Start with sin¬≤x + cos¬≤x = 1',d:'Divide both sides by cos¬≤x'},

  mistakes:[

L('4-06',{
  tagline:"Double and half angle formulas are derived from the sum formulas. They're shortcuts for specific but common angles ‚ÄĒ and appear constantly in calculus.",
  concept:`<div class="big-idea">Double angle: sin(2A)=2sinA¬∑cosA | cos(2A)=cos¬≤A‚ąísin¬≤A (three equivalent forms!)</div>
<strong>Double angle formulas:</strong>
<br>‚ÄĘ sin(2A) = 2¬∑sin(A)¬∑cos(A)
<br>‚ÄĘ cos(2A) = cos¬≤A ‚ąí sin¬≤A = 1 ‚ąí 2sin¬≤A = 2cos¬≤A ‚ąí 1
<br>‚ÄĘ tan(2A) = 2tan(A)/(1 ‚ąí tan¬≤A)
<br><br><strong>Half angle formulas:</strong>
<br>‚ÄĘ sin(A/2) = ¬Ī‚ąö((1‚ąícosA)/2)
<br>‚ÄĘ cos(A/2) = ¬Ī‚ąö((1+cosA)/2)
<br>(¬Ī depends on which quadrant A/2 is in)
<br><br>The three forms of cos(2A) come from substituting sin¬≤=1‚ąícos¬≤ or cos¬≤=1‚ąísin¬≤.
<div class="analogy">ūüí° sin(2A) = 2sinA¬∑cosA comes from the sum formula: sin(A+A) = sinA¬∑cosA + cosA¬∑sinA = 2sinA¬∑cosA. Double angle is just the sum formula applied to equal angles.</div>`,
  formula:{display:'sin(2A)=2sinA¬∑cosA | cos(2A)=cos¬≤A‚ąísin¬≤A',caption:'Three forms of cos(2A) ‚ÄĒ useful in different contexts'},
  examples:[

  tryit:{q:'cos(2A) when sinA=1/2 (A in Q1):',opts:['1/2','‚ąö3/2','1/4','1/2'],ans:1,hint:'Use cos(2A)=1‚ąí2sin¬≤A.',feedback:'cos(2A)=1‚ąí2(1/4)=1‚ąí1/2=1/2. Wait ‚ÄĒ that\'s 1/2, which is choice A. cos(60¬į)=1/2. If sinA=1/2, A=30¬į, 2A=60¬į, cos(60¬į)=1/2. Answer: 1/2.'},

  concept:`<div class="big-idea">Find all solutions to a trig equation by: isolate the trig function ‚Üí find reference angle ‚Üí identify all quadrants ‚Üí use periodicity.</div>

<br>3. Determine which quadrants give the correct sign

<br><br>For equations like sin(2x) = 0.5, solve for 2x first, then divide by 2.

L('4-08',{
  tagline:"A limit describes what a function approaches ‚ÄĒ not what it equals. This distinction is subtle but it's the foundation all of calculus is built on.",
  concept:`<div class="big-idea">lim_{x‚Üía} f(x) = L means: as x gets close to a (without equaling a), f(x) gets close to L.</div>
The limit doesn't care what f(a) actually equals ‚ÄĒ only what f(x) approaches as x approaches a.
<br><br><strong>Left and right limits:</strong>
<br>lim_{x‚Üía‚ĀĽ} f(x): approaching from the left
<br>lim_{x‚Üía‚Āļ} f(x): approaching from the right
<br>The two-sided limit exists only if both one-sided limits are equal and finite.
<br><br><strong>When do limits fail to exist?</strong>
<br>‚ÄĘ Left ‚Č† right limit
<br>‚ÄĘ Function oscillates infinitely fast (like sin(1/x) at 0)
<br>‚ÄĘ Function goes to ¬Ī‚ąě
<div class="analogy">ūüí° You\'re walking toward a cliff edge, looking at the ground. A limit asks: where does the ground seem to be heading as you approach? Even if there\'s a crater right at the edge (f undefined there), you can still see where the ground was heading.</div>`,
  formula:{display:'If lim_{x‚Üía‚ĀĽ}f(x)=lim_{x‚Üía‚Āļ}f(x)=L, then lim_{x‚Üía}f(x)=L',caption:'Both one-sided limits must match for the two-sided limit to exist'},
  examples:[
    {label:'Example 1',q:'lim_{x‚Üí2} (x¬≤‚ąí4)/(x‚ąí2)',steps:[
      {t:'Direct substitution gives 0/0 (indeterminate)',d:'Factor first'},
      {t:'(x+2)(x‚ąí2)/(x‚ąí2) = x+2 (for x‚Č†2)',d:''},
      {t:'Limit = lim_{x‚Üí2}(x+2) = 4',d:'<span class="math answer">= 4</span>'},
    ]},
    {label:'Example 2',q:'lim_{x‚Üí0} |x|/x',steps:[
      {t:'From right (x>0): |x|/x = x/x = 1',d:''},
      {t:'From left (x<0): |x|/x = ‚ąíx/x = ‚ąí1',d:''},
      {t:'Left ‚Č† right',d:'<span class="math answer">Limit DNE</span>'},
    ]},
  ],
  tryit:{q:'lim_{x‚Üí3} (x¬≤‚ąí9)/(x‚ąí3) = ?',opts:['0','6','3','DNE'],ans:1,hint:'Factor x¬≤‚ąí9=(x+3)(x‚ąí3). Cancel (x‚ąí3).',feedback:'(x+3)(x‚ąí3)/(x‚ąí3)=x+3. As x‚Üí3: 3+3=6.'},

L('4-09',{
  tagline:"Computing limits algebraically means using limit laws and algebraic techniques to evaluate limits without just substituting ‚ÄĒ especially when direct substitution fails.",
  concept:`<div class="big-idea">Limit laws: you can take limits of sums, products, quotients, and powers by applying limits to each part.</div>
<strong>Limit laws (assuming the limits exist):</strong>
<br>‚ÄĘ Sum: lim(f+g) = lim(f) + lim(g)
<br>‚ÄĘ Product: lim(f¬∑g) = lim(f)¬∑lim(g)
<br>‚ÄĘ Quotient: lim(f/g) = lim(f)/lim(g), if lim(g) ‚Č† 0
<br>‚ÄĘ Power: lim(f^n) = [lim(f)]^n
<br><br><strong>Techniques when direct substitution gives 0/0 or ‚ąě/‚ąě:</strong>
<br>‚ÄĘ Factor and cancel
<br>‚ÄĘ Multiply by conjugate (for radicals)
<br>‚ÄĘ L'H√īpital's Rule (for ‚ąě/‚ąě or 0/0): lim(f/g) = lim(f'/g') (requires calculus)
<br><br><strong>Two important limits:</strong>
<br>lim_{x‚Üí0} sin(x)/x = 1 | lim_{x‚Üí0} (1‚ąícos(x))/x = 0
<div class="analogy">ūüí° lim sin(x)/x = 1 as x‚Üí0 can be seen geometrically: for very small angles, sin(x) ‚Čą x (in radians). So the ratio ‚Čą 1. This fact powers all trig derivatives in calculus.</div>`,
  formula:{display:'lim_{x‚Üí0} sin(x)/x = 1 | Factor/Cancel for 0/0',caption:'Limit laws let you break complex limits into simple pieces'},
  examples:[
    {label:'Example 1',q:'lim_{x‚Üí‚ąí2} (x¬≤+5x+6)/(x+2)',steps:[
      {t:'Direct sub: 0/0 ‚ÄĒ factor',d:'(x+2)(x+3)/(x+2) = x+3'},
      {t:'lim_{x‚Üí‚ąí2}(x+3)',d:'<span class="math answer">= 1</span>'},
    ]},
    {label:'Example 2',q:'lim_{x‚Üí0} (‚ąö(x+9) ‚ąí 3)/x',steps:[
      {t:'Direct sub: 0/0 ‚ÄĒ multiply by conjugate',d:'√ó(‚ąö(x+9)+3)/(‚ąö(x+9)+3)'},
      {t:'(x+9‚ąí9)/(x(‚ąö(x+9)+3)) = x/(x(‚ąö(x+9)+3))',d:'= 1/(‚ąö(x+9)+3)'},
      {t:'As x‚Üí0: 1/(3+3)',d:'<span class="math answer">= 1/6</span>'},
    ]},
  ],
  tryit:{q:'lim_{x‚Üí0} sin(3x)/x = ?',opts:['1','3','0','1/3'],ans:1,hint:'Rewrite as 3¬∑[sin(3x)/(3x)]. The bracket approaches 1.',feedback:'3¬∑lim_{x‚Üí0}sin(3x)/(3x) = 3¬∑1 = 3.'},
  mistakes:[

  ],
  check:[
    {q:'lim_{x‚Üí1} (x¬≥‚ąí1)/(x‚ąí1) = ?',opts:['3','1','0','DNE'],ans:0,fb:'x¬≥‚ąí1=(x‚ąí1)(x¬≤+x+1). Cancel: x¬≤+x+1 at x=1: 1+1+1=3.'},
    {q:'lim_{x‚Üí‚ąě} (3x¬≤+1)/(x¬≤‚ąí2) = ?',opts:['3','0','‚ąě','1'],ans:0,fb:'Divide by x¬≤: (3+1/x¬≤)/(1‚ąí2/x¬≤) ‚Üí 3/1 = 3 as x‚Üí‚ąě.'},
    {q:'lim_{x‚Üí0} tan(x)/x = ?',opts:['0','1','Undefined','ŌÄ'],ans:1,fb:'tan(x)/x = sin(x)/(x¬∑cos(x)). As x‚Üí0: [sin(x)/x]¬∑[1/cos(x)] ‚Üí 1¬∑1 = 1.'},

L('4-10',{
  tagline:"Continuity is the formal requirement that a function has no breaks, jumps, or holes. It's the condition needed for most calculus theorems to work.",
  concept:`<div class="big-idea">f(x) is continuous at x=a if: (1) f(a) is defined, (2) the limit exists, (3) they're equal.</div>
<strong>Three conditions for continuity at a point:</strong>
<br>1. f(a) is defined
<br>2. lim_{x‚Üía} f(x) exists
<br>3. lim_{x‚Üía} f(x) = f(a)
<br><br><strong>Types of discontinuity:</strong>
<br>‚ÄĘ Removable: a hole ‚ÄĒ the limit exists but f(a) ‚Č† limit (can be "fixed")
<br>‚ÄĘ Jump: the two one-sided limits are different finite values
<br>‚ÄĘ Infinite: the function goes to ¬Ī‚ąě at the point (like 1/x at 0)
<br><br><strong>Continuous functions:</strong> polynomials, sin, cos, eň£ ‚ÄĒ continuous everywhere.
<br>Rational functions: continuous everywhere except where denominator = 0.
<div class="analogy">ūüí° Continuity means "you can draw the graph without lifting your pencil." A jump discontinuity requires a jump. A hole requires lifting the pencil for one point. An infinite discontinuity is a vertical asymptote.</div>`,
  formula:{display:'Continuous at a: f(a) defined, lim exists, and they\'re equal',caption:'Polynomial and trig functions are continuous everywhere'},
  examples:[
    {label:'Example 1',q:'Is f(x) = (x¬≤‚ąí4)/(x‚ąí2) continuous at x=2?',steps:[
      {t:'Is f(2) defined?',d:'(4‚ąí4)/(2‚ąí2) = 0/0. Undefined. Condition 1 fails.'},
      {t:'Does limit exist?',d:'Factor: (x+2) ‚Üí lim = 4'},

    {label:'Example 2',q:'f(x) = x+1 for x<3 and f(x) = 2x‚ąí2 for x‚Č•3. Continuous at x=3?',steps:[
      {t:'f(3) = 2(3)‚ąí2 = 4',d:''},
      {t:'Left limit: 3+1=4. Right limit: 2(3)‚ąí2=4',d:''},
      {t:'f(3)=4=limit',d:'<span class="math answer">Continuous at x=3</span>'},
    ]},
  ],
  tryit:{q:'f(x) = 1/(x‚ąí5). What type of discontinuity at x=5?',opts:['Removable','Jump','Infinite','No discontinuity'],ans:2,hint:'What happens to 1/(x‚ąí5) as x approaches 5?',feedback:'As x‚Üí5, 1/(x‚ąí5)‚Üí¬Ī‚ąě. Infinite discontinuity (vertical asymptote).'},
  mistakes:[
    {wrong:'Thinking a function is continuous just because its formula looks clean',right:'Always check all three conditions. f(x)=(x¬≤‚ąí1)/(x‚ąí1) looks simple but has a hole at x=1.'},
    {wrong:'A function can\'t be continuous if it\'s defined piecewise',right:'Piecewise functions CAN be continuous ‚ÄĒ if the pieces join up without gaps or jumps.'},
  ],

    {q:'f(x)=x¬≥+sin(x). Continuous everywhere?',opts:['Yes','No ‚ÄĒ holes','No ‚ÄĒ jump at 0','No ‚ÄĒ infinite at ŌÄ'],ans:0,fb:'Polynomials and sin are continuous everywhere. Sum of continuous functions is continuous.'},
    {q:'lim_{x‚Üí3}f(x)=7 but f(3)=5. This is a:',opts:['Jump discontinuity','Infinite discontinuity','Removable discontinuity','Continuous function'],ans:2,fb:'Limit exists but ‚Č† f(3). Removable discontinuity (hole at x=3 with wrong y-value).'},
    {q:'The Intermediate Value Theorem requires:',opts:['Differentiability','Continuity on [a,b]','f(a)=f(b)','f being increasing'],ans:1,fb:'IVT requires f to be continuous on [a,b]. It then guarantees f takes every value between f(a) and f(b).'},
  ]
});

  concept:`<div class="big-idea">A parabola is the set of points equidistant from a fixed point (focus) and a fixed line (directrix).</div>

L('5-02',{
  tagline:"The formal definition of a derivative reveals exactly what it measures ‚ÄĒ slope of the tangent line. Doing it from scratch builds intuition no shortcut can replace.",
  concept:`<div class="big-idea">f'(x) = lim_{h‚Üí0} [f(x+h) ‚ąí f(x)] / h</div>
This is the slope of the secant line between two points as those points get infinitely close together.
<br><br><strong>Process:</strong>
<br>1. Compute f(x+h) ‚ÄĒ substitute (x+h) everywhere you see x
<br>2. Subtract f(x)
<br>3. Divide the whole thing by h
<br>4. Simplify until the h in the denominator cancels
<br>5. Take the limit: set h = 0 in the simplified expression
<br><br>The h MUST cancel ‚ÄĒ if it doesn't, you made an algebra error.
<div class="analogy">ūüí° Speed = distance/time. For instantaneous speed, make the time interval h infinitely small. That's the limit definition ‚ÄĒ applied to position, it gives velocity.</div>`,
  formula:{display:'f\'(x) = lim_{h‚Üí0} [f(x+h)‚ąíf(x)] / h',caption:'h must cancel before you can evaluate the limit'},
  examples:[
    {label:'Example 1',q:'Find f\'(x) from definition: f(x)=x¬≤',steps:[
      {t:'f(x+h)=(x+h)¬≤=x¬≤+2xh+h¬≤',d:''},
      {t:'Numerator: x¬≤+2xh+h¬≤‚ąíx¬≤=2xh+h¬≤',d:''},
      {t:'Divide by h: 2x+h',d:''},
      {t:'Limit h‚Üí0',d:'<span class="math answer">f\'(x)=2x</span>'},

    {label:'Example 2',q:'Find f\'(x) from definition: f(x)=1/x',steps:[
      {t:'f(x+h)=1/(x+h)',d:''},

      {t:'Cancel h: ‚ąí1/(x(x+h))',d:''},

L('5-04',{
  tagline:"Product and Quotient rules are unavoidable in calculus. They come up in every application. Learn them cold.",
  concept:`<div class="big-idea">Product Rule: (fg)' = f'g + fg'. Quotient Rule: (f/g)' = (f'g ‚ąí fg') / g¬≤</div>
<strong>Product rule mnemonic:</strong> "derivative of first times second, plus first times derivative of second."
<br><br><strong>Quotient rule mnemonic:</strong> "low d-high minus high d-low, square the bottom and away we go."
<br>(f/g)' = [g¬∑f' ‚ąí f¬∑g'] / g¬≤
<br><br>Common applications: any product of two functions (x¬≤¬∑sin x), any ratio (eň£/x).
<br><br>‚ö†ÔłŹ (fg)' ‚Č† f'g'. Never multiply derivatives like that.
<div class="analogy">ūüí° Area A = length √ó width. If both are changing: dA/dt = (d-length/dt)√ówidth + length√ó(d-width/dt). That's exactly the product rule ‚ÄĒ both pieces matter.</div>`,
  formula:{display:'(fg)\'=f\'g+fg\' | (f/g)\'=(f\'g‚ąífg\')/g¬≤',caption:'Quotient: denominator√ó(top derivative) minus top√ó(bottom derivative), over bottom¬≤'},
  examples:[

    {label:'Example 2',q:'y = eň£/(x¬≤+1)',steps:[
      {t:'f=eň£, f\'=eň£ | g=x¬≤+1, g\'=2x',d:''},
      {t:'y\'=[eň£(x¬≤+1)‚ąíeň£¬∑2x]/(x¬≤+1)¬≤',d:''},
      {t:'Factor eň£',d:'<span class="math answer">y\'=eň£(x¬≤‚ąí2x+1)/(x¬≤+1)¬≤</span>'},

  tryit:{q:'d/dx[x¬∑ln(x)]=?',opts:['ln(x)+1','ln(x)','1/x','x/ln(x)'],ans:0,hint:'f=x, g=ln(x). f\'=1, g\'=1/x.',feedback:'1¬∑ln(x)+x¬∑(1/x)=ln(x)+1.'},
  mistakes:[

L('5-08',{
  tagline:"Implicit differentiation handles curves where y isn't isolated. It's just the chain rule applied carefully ‚ÄĒ and it unlocks a whole class of problems.",
  concept:`<div class="big-idea">When y is mixed in with x (like x¬≤+y¬≤=25), differentiate both sides with respect to x. Every derivative of y gets a dy/dx multiplied in.</div>
<strong>Why dy/dx appears:</strong> by the chain rule, d/dx[y¬≤] = 2y¬∑(dy/dx). Because y is itself a function of x.
<br><br><strong>Process:</strong>
<br>1. Differentiate both sides with respect to x
<br>2. Every time you differentiate a term with y, multiply by dy/dx
<br>3. Collect all dy/dx terms on one side
<br>4. Factor out dy/dx and divide to solve
<br><br><strong>Use cases:</strong> circles, ellipses, curves where solving for y explicitly is messy or impossible.
<div class="analogy">ūüí° x¬≤+y¬≤=25 is a circle. It fails the vertical line test ‚ÄĒ not a function. But you can still find the slope of the tangent at any point using implicit differentiation, even though y isn\'t isolated.</div>`,
  formula:{display:'d/dx[y¬≤]=2y¬∑(dy/dx) | d/dx[f(y)]=f\'(y)¬∑(dy/dx)',caption:'Chain rule for y: treat y as a function of x'},
  examples:[

L('5-09',{
  tagline:"Related rates problems are calculus applied to the real world ‚ÄĒ two quantities both changing with time, linked by a geometric relationship.",
  concept:`<div class="big-idea">If two quantities are related by an equation, differentiate both sides with respect to time t to get an equation relating their rates of change.</div>
<strong>Process:</strong>
<br>1. Draw a diagram. Label all quantities.
<br>2. Write an equation relating the relevant quantities (geometry, Pythagorean theorem, etc.)
<br>3. Differentiate both sides with respect to t
<br>4. Substitute known values and rates
<br>5. Solve for the unknown rate
<br><br>‚ö†ÔłŹ Substitute values AFTER differentiating. Never before.
<div class="analogy">ūüí° A ladder slides down a wall. The height y and base x are related: x¬≤+y¬≤=L¬≤. Differentiate: 2x(dx/dt)+2y(dy/dt)=0. Now plug in the current x, y values and one of the rates. Solve for the other.</div>`,
  formula:{display:'Differentiate the relationship equation with respect to t',caption:'Plug in values AFTER differentiating, never before'},
  examples:[

  tryit:{q:'A 10-ft ladder leans against a wall. Base slides away at 2 ft/s. When base is 6 ft from wall, how fast is top sliding down?',opts:['‚ąí3/2 ft/s','‚ąí4/3 ft/s','‚ąí3/4 ft/s','‚ąí2/3 ft/s'],ans:1,hint:'x¬≤+y¬≤=100. x=6, y=8. 2x(dx/dt)+2y(dy/dt)=0.',feedback:'x=6, y=8 (6¬≤+8¬≤=100). 2(6)(2)+2(8)(dy/dt)=0 ‚Üí 24+16(dy/dt)=0 ‚Üí dy/dt=‚ąí24/16=‚ąí3/2. Wait: ‚ąí3/2 ft/s. Answer A.'},

L('5-10',{
  tagline:"Critical points and optimization are why calculus was invented. Finding maxima and minima lets you design the most efficient bridge, the cheapest box, the fastest route.",
  concept:`<div class="big-idea">A critical point is where f'(x)=0 or f'(x) is undefined. Local maxima and minima occur at critical points.</div>
<strong>First Derivative Test:</strong>
<br>If f' changes from + to ‚ąí at c: local maximum at c
<br>If f' changes from ‚ąí to + at c: local minimum at c
<br>If f' doesn't change sign: neither (saddle/inflection point)
<br><br><strong>Second Derivative Test:</strong>
<br>If f'(c)=0 and f''(c)<0: local maximum
<br>If f'(c)=0 and f''(c)>0: local minimum
<br>If f''(c)=0: inconclusive ‚ÄĒ use first derivative test
<br><br><strong>Optimization problems:</strong> set up the objective function, take the derivative, set it to zero, check endpoints.
<div class="analogy">ūüí° A farmer wants to fence the largest rectangular area with 200m of fence. Area=xy, constraint: 2x+2y=200 ‚Üí y=100‚ąíx. Maximize A=x(100‚ąíx). Set A\'=0 ‚Üí x=50. That\'s optimization.</div>`,
  formula:{display:'Critical points: f\'(x)=0 or undefined | f\'\'<0=max, f\'\'>0=min',caption:'Always check endpoints for absolute max/min on a closed interval'},
  examples:[
    {label:'Example 1',q:'Find and classify critical points: f(x)=x¬≥‚ąí6x¬≤+9x',steps:[
      {t:'f\'(x)=3x¬≤‚ąí12x+9=3(x¬≤‚ąí4x+3)=3(x‚ąí1)(x‚ąí3)',d:''},
      {t:'Critical points: x=1, x=3',d:''},
      {t:'f\'\'(x)=6x‚ąí12. f\'\'(1)=‚ąí6<0: local max. f\'\'(3)=6>0: local min',d:'<span class="math answer">Max at x=1, Min at x=3</span>'},
    ]},
  ],
  tryit:{q:'f(x)=x¬≤‚ąí4x+5. Where is the minimum?',opts:['x=0','x=4','x=2','x=‚ąí2'],ans:2,hint:'Set f\'(x)=0. f\'=2x‚ąí4=0.',feedback:'2x‚ąí4=0 ‚Üí x=2. f\'\'=2>0 so it\'s a minimum.'},
  mistakes:[
    {wrong:'Assuming f\'=0 always gives a local extreme',right:'f\'=0 is necessary but not sufficient. If f\' doesn\'t change sign, it\'s a saddle/inflection point, not an extreme.'},
    {wrong:'Forgetting to check endpoints on a closed interval',right:'Absolute max/min on [a,b] could be at endpoints or critical points. Always evaluate f at ALL of them.'},
  ],
  check:[
    {q:'f\'(x)=x(x‚ąí4). Local minimum is at:',opts:['x=0','x=4','x=2','x=‚ąí4'],ans:1,fb:'f\'=0 at x=0 and x=4. Sign chart: f\'<0 on (0,4), f\'>0 after x=4. Minimum at x=4.'},
    {q:'Second derivative test: f\'(c)=0 and f\'\'(c)=‚ąí3. This is a:',opts:['Local minimum','Local maximum','Saddle point','Inflection point'],ans:1,fb:'f\'\'<0 means concave down at c ‚Üí local maximum.'},
    {q:'Maximize A=xy with x+y=20. Maximum occurs at:',opts:['x=0,y=20','x=10,y=10','x=5,y=15','x=20,y=0'],ans:1,fb:'A=x(20‚ąíx). A\'=20‚ąí2x=0 ‚Üí x=10. y=10. A=100.'},
  ]
});

L('5-11',{
  tagline:"The Mean Value Theorem is one of the most important theorems in calculus. It's the rigorous foundation for everything from error estimates to speed limits.",
  concept:`<div class="big-idea">MVT: If f is continuous on [a,b] and differentiable on (a,b), then there exists c in (a,b) where f'(c) = (f(b)‚ąíf(a))/(b‚ąía).</div>
In plain English: somewhere on the interval, the instantaneous rate equals the average rate.
<br><br><strong>Geometric interpretation:</strong> somewhere on the curve, the tangent line is parallel to the secant line connecting the endpoints.
<br><br><strong>Rolle's Theorem:</strong> special case where f(a)=f(b). Then there exists c where f'(c)=0.
<br><br><strong>Application:</strong> if a car travels 100 miles in 1 hour, then at some moment it was going exactly 100 mph.
<div class="analogy">ūüí° MVT is like a speed camera average: if your average speed was 80 mph, you must have been going exactly 80 mph at some specific moment. The MVT guarantees that moment exists.</div>`,
  formula:{display:'f\'(c) = [f(b)‚ąíf(a)] / (b‚ąía) for some c in (a,b)',caption:'Requires: continuous on [a,b] AND differentiable on (a,b)'},
  examples:[
    {label:'Example 1',q:'Find c for f(x)=x¬≤ on [1,3].',steps:[
      {t:'Average rate: (9‚ąí1)/(3‚ąí1)=8/2=4',d:''},
      {t:'f\'(x)=2x. Set 2x=4',d:'x=2'},
      {t:'c=2 ‚ąą (1,3) ‚úď',d:'<span class="math answer">c=2</span>'},
    ]},
  ],
  tryit:{q:'MVT applies to f(x)=|x| on [‚ąí1,1]?',opts:['Yes ‚ÄĒ MVT guarantees a c','No ‚ÄĒ f is not differentiable at x=0','No ‚ÄĒ f is not continuous','Yes but c=0'],ans:1,hint:'Check the conditions: is f differentiable at every point in (‚ąí1,1)?',feedback:'|x| is not differentiable at x=0. MVT does not apply.'},
  mistakes:[
    {wrong:'Applying MVT without checking differentiability',right:'MVT requires f to be differentiable on the OPEN interval (a,b). If any point isn\'t differentiable, MVT doesn\'t apply.'},
    {wrong:'Thinking c is unique',right:'MVT guarantees AT LEAST one such c. There may be multiple values where the tangent slope equals the secant slope.'},
  ],
  check:[
    {q:'For f(x)=x¬≥ on [0,2], the MVT value c satisfies f\'(c)=',opts:['4/3','4','8','2'],ans:1,fb:'Average rate=(8‚ąí0)/(2‚ąí0)=4. f\'(c)=3c¬≤=4 ‚Üí c¬≤=4/3 ‚Üí c=2/‚ąö3. The average rate is 4.'},
    {q:'Rolle\'s Theorem requires f(a)=f(b). What does it guarantee?',opts:['f\'=0 everywhere','f\'(c)=0 for some c in (a,b)','f has a global minimum','f is linear'],ans:1,fb:'Rolle\'s: if f(a)=f(b), then somewhere in between f\'=0 (the function must turn around).'},
    {q:'If f is differentiable on (a,b) and f\'(x)=0 for all x, then f is:',opts:['Increasing','Decreasing','Constant','Zero only at endpoints'],ans:2,fb:'If f\'=0 everywhere, MVT implies f(x)‚ąíf(a)=0¬∑(x‚ąía)=0 for all x. So f is constant.'},
  ]
});

L('5-12',{
  tagline:"Antiderivatives reverse the derivative process. They're the first step toward the integral ‚ÄĒ and they let you recover position from velocity.",
  concept:`<div class="big-idea">An antiderivative of f(x) is any function F(x) where F'(x)=f(x). The general antiderivative includes +C.</div>
Why +C? Any constant has derivative 0, so F(x)+C is also an antiderivative. Without additional info, we can't determine C.
<br><br><strong>Key antiderivative rules:</strong>
<br>‚ÄĘ ‚ąęx‚ĀŅ dx = x‚ĀŅ‚Āļ¬Ļ/(n+1) + C (n‚Č†‚ąí1)
<br>‚ÄĘ ‚ąęeň£ dx = eň£ + C
<br>‚ÄĘ ‚ąę1/x dx = ln|x| + C
<br>‚ÄĘ ‚ąęcos(x) dx = sin(x) + C
<br>‚ÄĘ ‚ąęsin(x) dx = ‚ąícos(x) + C
<br>‚ÄĘ ‚ąęsec¬≤(x) dx = tan(x) + C
<br><br>Always verify: differentiate your answer and check you get back the original.
<div class="analogy">ūüí° If f(t) is velocity and you want position, you need the antiderivative. d/dt[position]=velocity means position=‚ąęvelocity dt. The +C represents not knowing where you started.</div>`,
  formula:{display:'‚ąęx‚ĀŅdx = x‚ĀŅ‚Āļ¬Ļ/(n+1)+C | ‚ąęeň£dx=eň£+C | ‚ąę(1/x)dx=ln|x|+C',caption:'Always add +C for indefinite integrals'},
  examples:[
    {label:'Example 1',q:'Find ‚ąę(3x¬≤+2x‚ąí5)dx',steps:[
      {t:'Antiderivative term by term',d:'3¬∑x¬≥/3 + 2¬∑x¬≤/2 ‚ąí 5x'},
      {t:'Simplify',d:'<span class="math answer">x¬≥+x¬≤‚ąí5x+C</span>'},
    ]},
    {label:'Example 2',q:'‚ąę(1/x+eň£)dx',steps:[
      {t:'‚ąę(1/x)dx=ln|x|',d:'‚ąęeň£dx=eň£'},
      {t:'',d:'<span class="math answer">ln|x|+eň£+C</span>'},
    ]},
  ],
  tryit:{q:'‚ąę(4x¬≥‚ąí6x)dx=?',opts:['x‚Āī‚ąí3x¬≤+C','12x¬≤‚ąí6+C','4x¬≤‚ąí6+C','x‚Āī+3x¬≤+C'],ans:0,hint:'Apply power rule in reverse: x‚ĀŅ ‚Üí x‚ĀŅ‚Āļ¬Ļ/(n+1).',feedback:'4x‚Āī/4‚ąí6x¬≤/2=x‚Āī‚ąí3x¬≤+C.'},
  mistakes:[
    {wrong:'Forgetting +C',right:'Every indefinite integral needs +C. Without it, you\'re saying there\'s only one antiderivative ‚ÄĒ but there are infinitely many (differing by a constant).'},
    {wrong:'‚ąęx‚ĀĽ¬Ļdx = x‚Āį/0 (undefined)',right:'‚ąę1/x dx = ln|x|+C ‚ÄĒ this is a special case that must be memorized separately.'},
  ],
  check:[
    {q:'‚ąęsin(x)dx=?',opts:['cos(x)+C','‚ąícos(x)+C','sin(x)+C','‚ąísin(x)+C'],ans:1,fb:'d/dx[‚ąícos(x)]=sin(x). So ‚ąęsin(x)dx=‚ąícos(x)+C.'},
    {q:'Verify: is x¬≥/3+2x+C an antiderivative of x¬≤+2?',opts:['Yes: d/dx[x¬≥/3+2x]=x¬≤+2','No: derivatives don\'t match','Only if C=0','Yes: integral of x¬≤+2 is x¬≥+2x'],ans:0,fb:'d/dx[x¬≥/3+2x+C]=x¬≤+2 ‚úď. C drops out when differentiating.'},
    {q:'‚ąę(x+1)¬≤ dx = ? (Hint: expand first)',opts:['(x+1)¬≥/3+C','x¬≥/3+x¬≤+x+C','x¬≤/2+x+C','(x+1)¬≤/2+C'],ans:1,fb:'(x+1)¬≤=x¬≤+2x+1. Integrate: x¬≥/3+x¬≤+x+C.'},
  ]
});

L('5-13',{
  tagline:"The definite integral computes signed area ‚ÄĒ and it's one of the most powerful tools in mathematics, connecting change to accumulation.",
  concept:`<div class="big-idea">‚ąę‚āźŠĶá f(x) dx = signed area between f(x) and the x-axis from x=a to x=b.</div>
<strong>Riemann sum interpretation:</strong> divide [a,b] into n rectangles, sum the areas, take the limit as n‚Üí‚ąě.

<br>‚ÄĘ ‚ąę‚āźŠĶá f dx = ‚ąí‚ąęŠĶ¶ŠĶÉ f dx
<br>‚ÄĘ ‚ąę‚āźŠĶá f dx = ‚ąę‚āźŠ∂ú f dx + ‚ąęŠ∂úŠĶá f dx
<br>‚ÄĘ Negative area: if f(x)<0, the integral is negative (below x-axis)
<div class="analogy">ūüí° If velocity v(t) is positive (moving forward), ‚ąęv dt = total distance traveled forward. If v goes negative (moving backward), it subtracts. The definite integral keeps track of net displacement.</div>`,
  formula:{display:'‚ąę‚āźŠĶá f(x)dx = F(b)‚ąíF(a) where F\'=f',caption:'Signed area: negative when function is below x-axis'},
  examples:[
    {label:'Example 1',q:'Compute ‚ąę‚āĀ¬≥ (x¬≤+1)dx',steps:[

  mistakes:[
    {wrong:'Forgetting to subtract F(a): just writing F(b)',right:'Always F(b)‚ąíF(a). Both endpoints contribute.'},
    {wrong:'Thinking negative integrals mean an error',right:'If the function is negative, the integral is negative. That\'s correct ‚ÄĒ it represents area below the axis.'},

    {q:'‚ąę‚āĀ¬≤ (1/x)dx=?',opts:['ln2','ln(1)','1','0'],ans:0,fb:'F(x)=ln x. ln(2)‚ąíln(1)=ln(2)‚ąí0=ln2.'},
    {q:'If ‚ąę‚āÄ‚Āī f dx=10 and ‚ąę‚āÄ¬≤ f dx=3, then ‚ąę‚āā‚Āī f dx=?',opts:['13','7','30','4'],ans:1,fb:'‚ąę‚āÄ‚Āī=‚ąę‚āÄ¬≤+‚ąę‚āā‚Āī. 10=3+‚ąę‚āā‚Āī. ‚ąę‚āā‚Āī=7.'},

L('6-01',{
  tagline:"U-substitution is the chain rule run backwards. It's the single most-used integration technique ‚ÄĒ master this before anything else.",
  concept:`<div class="big-idea">When the integrand contains f(g(x))¬∑g'(x), substitute u=g(x), du=g'(x)dx to get ‚ąęf(u)du.</div>
<strong>Process:</strong>

<br>4. Integrate ‚ąęf(u)du
<br>5. Substitute back to get the answer in x
<br><br>For definite integrals: either convert limits to u, or substitute back before evaluating.
<div class="analogy">ūüí° ‚ąę2x¬∑(x¬≤+1)‚ĀĶdx ‚ÄĒ if you expanded that, it would take forever. But let u=x¬≤+1, du=2x dx. Suddenly: ‚ąęu‚ĀĶdu=u‚Ā∂/6=((x¬≤+1)‚Ā∂)/6. U-sub turns messy integrals into simple ones.</div>`,
  formula:{display:'u=g(x) ‚Üí du=g\'(x)dx ‚Üí ‚ąęf(g(x))g\'(x)dx=‚ąęf(u)du',caption:'The derivative of u must appear in the integrand'},
  examples:[

L('6-03',{
  tagline:"Trig substitution is the technique for integrals with ‚ąö(a¬≤‚ąíx¬≤), ‚ąö(x¬≤+a¬≤), or ‚ąö(x¬≤‚ąía¬≤). You substitute a trig function to eliminate the radical.",
  concept:`<div class="big-idea">Replace x with a trig function to convert a radical into something you can integrate.</div>
<strong>Three substitutions:</strong>
<br>‚ÄĘ ‚ąö(a¬≤‚ąíx¬≤) ‚Üí let x=a¬∑sin(őł), then ‚ąö(a¬≤‚ąíx¬≤)=a¬∑cos(őł)
<br>‚ÄĘ ‚ąö(a¬≤+x¬≤) ‚Üí let x=a¬∑tan(őł), then ‚ąö(a¬≤+x¬≤)=a¬∑sec(őł)
<br>‚ÄĘ ‚ąö(x¬≤‚ąía¬≤) ‚Üí let x=a¬∑sec(őł), then ‚ąö(x¬≤‚ąía¬≤)=a¬∑tan(őł)
<br><br>After integrating, convert back to x using a reference triangle.
<br><br>This technique uses Pythagorean identities to eliminate radicals.
<div class="analogy">ūüí° ‚ąę‚ąö(4‚ąíx¬≤)dx is the area under a semicircle of radius 2. Geometrically it\'s ŌÄr¬≤/2=2ŌÄ. Trig sub (x=2sinőł) confirms this algebraically. The technique is literally using circle geometry.</div>`,
  formula:{display:'x=a¬∑sin(őł) for ‚ąö(a¬≤‚ąíx¬≤) | x=a¬∑tan(őł) for ‚ąö(a¬≤+x¬≤)',caption:'Build a reference triangle to convert back to x'},
  examples:[
    {label:'Example 1',q:'‚ąę‚ąö(9‚ąíx¬≤)dx',steps:[
      {t:'x=3sin(őł), dx=3cos(őł)dőł, ‚ąö(9‚ąíx¬≤)=3cos(őł)',d:''},
      {t:'‚ąę3cos(őł)¬∑3cos(őł)dőł=9‚ąęcos¬≤(őł)dőł',d:''},
      {t:'=9¬∑(őł/2+sin(2őł)/4)=(9/2)őł+(9/4)sin(2őł)',d:''},
      {t:'sin(őł)=x/3 ‚Üí őł=arcsin(x/3). sin(2őł)=2sinőłcosőł=2(x/3)(‚ąö(9‚ąíx¬≤)/3)',d:'<span class="math answer">=(9/2)arcsin(x/3)+(x/2)‚ąö(9‚ąíx¬≤)+C</span>'},
    ]},
  ],
  tryit:{q:'For ‚ąę1/‚ąö(1+x¬≤)dx, which substitution?',opts:['x=sin(őł)','x=tan(őł)','x=sec(őł)','x=cos(őł)'],ans:1,hint:'‚ąö(a¬≤+x¬≤) type. Here a=1.',feedback:'x=tan(őł). Then 1+x¬≤=1+tan¬≤őł=sec¬≤őł, and ‚ąö(1+x¬≤)=sec(őł).'},
  mistakes:[
    {wrong:'Using sine substitution for ‚ąö(a¬≤+x¬≤)',right:'Use tangent for ‚ąö(a¬≤+x¬≤), sine for ‚ąö(a¬≤‚ąíx¬≤). The sign tells you which identity to use.'},
    {wrong:'Forgetting to change limits for definite integrals',right:'Either convert limits using x=a¬∑sin(őł) ‚Üí őł=arcsin(x/a), or substitute back to x before evaluating.'},

    {q:'‚ąö(25‚ąíx¬≤) with x=5sin(őł) simplifies to:',opts:['5tan(őł)','5cos(őł)','25cos(őł)','5sec(őł)'],ans:1,fb:'25‚ąí25sin¬≤őł=25cos¬≤őł. ‚ąö(25cos¬≤őł)=5cos(őł).'},
    {q:'After trig sub, you get an answer in őł. To express in x:',opts:['Leave in őł ‚ÄĒ both are correct','Use inverse trig and reference triangle to convert','Multiply by x/őł','Substitute back x=a¬∑sin(őł)'],ans:1,fb:'Draw the right triangle with sin(őł)=x/a, find the other sides, then express sin/cos/tan in terms of x.'},

L('6-04',{
  tagline:"Partial fractions decompose rational functions into simple fractions you can integrate term by term. It's an algebra technique that enables integration.",
  concept:`<div class="big-idea">A rational function P(x)/Q(x) (where degree P < degree Q) can be decomposed into a sum of simpler fractions.</div>
<strong>Factoring types in denominator:</strong>
<br>‚ÄĘ Linear (x‚ąía): contributes A/(x‚ąía)
<br>‚ÄĘ Repeated linear (x‚ąía)¬≤: contributes A/(x‚ąía)+B/(x‚ąía)¬≤
<br>‚ÄĘ Irreducible quadratic (x¬≤+bx+c): contributes (Ax+B)/(x¬≤+bx+c)
<br><br><strong>Process:</strong>
<br>1. Factor denominator completely
<br>2. Set up partial fraction decomposition
<br>3. Multiply both sides by denominator
<br>4. Solve for A, B, C...
<br>5. Integrate each term (log or arctan)
<div class="analogy">ūüí° 1/(x(x+2)) = A/x + B/(x+2). You\'re splitting the fraction apart. Each piece is easy to integrate (just logarithms). Together, they\'re impossible. Split apart, they\'re trivial.</div>`,
  formula:{display:'P(x)/((x‚ąía)(x‚ąíb)) = A/(x‚ąía) + B/(x‚ąíb)',caption:'Multiply through by denominator, then match coefficients or plug in roots'},
  examples:[
    {label:'Example 1',q:'‚ąę 1/((x+1)(x‚ąí3)) dx',steps:[
      {t:'Decompose: A/(x+1) + B/(x‚ąí3)',d:'1 = A(x‚ąí3)+B(x+1)'},
      {t:'x=3: 1=4B ‚Üí B=1/4. x=‚ąí1: 1=‚ąí4A ‚Üí A=‚ąí1/4',d:''},
      {t:'‚ąę(‚ąí1/4)/(x+1)+(1/4)/(x‚ąí3)dx',d:'<span class="math answer">=(1/4)ln|x‚ąí3|‚ąí(1/4)ln|x+1|+C</span>'},
    ]},
  ],
  tryit:{q:'Decompose: 5/(x(x‚ąí5)) = A/x + B/(x‚ąí5). What is A?',opts:['1','‚ąí1','5','‚ąí5'],ans:1,hint:'Multiply both sides by x(x‚ąí5): 5=A(x‚ąí5)+Bx. Set x=0.',feedback:'x=0: 5=A(‚ąí5) ‚Üí A=‚ąí1.'},
  mistakes:[
    {wrong:'Using partial fractions when degree of numerator ‚Č• degree of denominator',right:'First do polynomial long division to reduce degree of numerator below degree of denominator.'},
    {wrong:'Forgetting to include all powers for repeated factors: (x‚ąía)¬≤ needs A/(x‚ąía)+B/(x‚ąía)¬≤',right:'Each power of a repeated factor needs its own term.'},

  check:[
    {q:'‚ąę 1/(x¬≤‚ąí1) dx. After factoring x¬≤‚ąí1=(x+1)(x‚ąí1), the decomposition is:',opts:['A/(x¬≤‚ąí1)','A/(x+1)+B/(x‚ąí1)','A/(x+1)¬∑B/(x‚ąí1)','Ax+B over x¬≤‚ąí1'],ans:1,fb:'Two distinct linear factors: A/(x+1)+B/(x‚ąí1).'},
    {q:'For the integral ‚ąę1/(x(x+1))dx, after partial fractions A=1 and B=‚ąí1. Result?',opts:['ln|x|‚ąíln|x+1|+C','ln|x(x+1)|+C','ln|x|+ln|x+1|+C','‚ąí1/x+1/(x+1)+C'],ans:0,fb:'‚ąę1/x dx‚ąí‚ąę1/(x+1)dx=ln|x|‚ąíln|x+1|+C.'},
    {q:'What is the form for: x/((x¬≤+1)(x‚ąí2))?',opts:['A/x + B/(x‚ąí2)','(Ax+B)/(x¬≤+1) + C/(x‚ąí2)','A/(x¬≤+1)+B/(x‚ąí2)','Ax/(x¬≤+1)+B/(x‚ąí2)'],ans:1,fb:'Irreducible quadratic gets (Ax+B) in numerator. Linear factor gets C.'},
  ]

L('6-05',{
  tagline:"Improper integrals extend integration to infinite intervals or unbounded functions. The key idea: replace the infinity with a limit.",
  concept:`<div class="big-idea">An improper integral has either an infinite limit of integration or an integrand that blows up inside the interval. Evaluate using limits.</div>
<strong>Type 1 (infinite limits):</strong>
<br>‚ąę‚āź^‚ąě f(x)dx = lim_{b‚Üí‚ąě} ‚ąę‚āźŠĶá f(x)dx
<br><br><strong>Type 2 (vertical asymptote):</strong>
<br>‚ąę‚āźŠĶá f(x)dx where f‚Üí‚ąě at c‚ąą[a,b]:
<br>= lim_{t‚Üíc‚ĀĽ} ‚ąę‚āźŠĶó f dx + lim_{t‚Üíc‚Āļ} ‚ąęŠĶóŠĶá f dx
<br><br><strong>Convergence vs Divergence:</strong>
<br>If the limit exists and is finite: converges.
<br>If the limit is ¬Ī‚ąě or DNE: diverges.
<br><br>‚ąę‚āĀ^‚ąě 1/xŠĶĖ dx: converges for p>1, diverges for p‚Č§1.
<div class="analogy">ūüí° ‚ąę‚āĀ^‚ąě 1/x¬≤ dx converges (=1). ‚ąę‚āĀ^‚ąě 1/x dx diverges. Though 1/x and 1/x¬≤ both go to zero, 1/x goes too slowly ‚ÄĒ there\'s still infinite area under it.</div>`,
  formula:{display:'‚ąę‚āź^‚ąě f dx = lim_{b‚Üí‚ąě} ‚ąę‚āźŠĶá f dx',caption:'Converges if limit is finite. Diverges if limit is ‚ąě or DNE.'},
  examples:[
    {label:'Example 1',q:'‚ąę‚āĀ^‚ąě 1/x¬≤ dx',steps:[
      {t:'lim_{b‚Üí‚ąě} ‚ąę‚āĀŠĶá x‚ĀĽ¬≤ dx = lim_{b‚Üí‚ąě} [‚ąí1/x]‚āĀŠĶá',d:''},
      {t:'= lim_{b‚Üí‚ąě}(‚ąí1/b + 1)',d:'= 0+1'},
      {t:'',d:'<span class="math answer">Converges to 1</span>'},
    ]},
    {label:'Example 2',q:'‚ąę‚āĀ^‚ąě 1/x dx',steps:[
      {t:'lim_{b‚Üí‚ąě} [ln x]‚āĀŠĶá = lim_{b‚Üí‚ąě} ln(b)',d:'= ‚ąě'},
      {t:'',d:'<span class="math answer">Diverges</span>'},

  ],
  tryit:{q:'‚ąę‚āÄ^‚ąě e^(‚ąíx) dx = ?',opts:['0','1','‚ąě','‚ąí1'],ans:1,hint:'lim_{b‚Üí‚ąě}[‚ąíe^(‚ąíx)]‚āÄŠĶá = lim(‚ąíe^(‚ąíb)+1).',feedback:'lim_{b‚Üí‚ąě}(‚ąíe^(‚ąíb)+1)=0+1=1. Converges to 1.'},
  mistakes:[
    {wrong:'Computing improper integrals without limits: just plugging in ‚ąě',right:'‚ąě is not a number ‚ÄĒ you can\'t plug it in. Always write as a limit first, then evaluate.'},
    {wrong:'Assuming ‚ąę‚āč‚ąě^‚ąě f dx exists just because f is symmetric',right:'‚ąę‚āč‚ąě^‚ąě f dx = lim_{a‚Üí‚ąí‚ąě, b‚Üí‚ąě} ‚ąę‚āźŠĶá f dx. Both limits must converge independently.'},
  ],
  check:[
    {q:'‚ąę‚āÄ^1 1/‚ąöx dx converges or diverges?',opts:['Diverges','Converges to 2','Converges to 1','Diverges (‚ąě)'],ans:1,fb:'lim_{t‚Üí0‚Āļ}[2‚ąöx]‚āú¬Ļ=2‚ąí0=2. Converges.'},
    {q:'For ‚ąę‚āĀ^‚ąě 1/xŠĶĖ dx, it converges when:',opts:['p<1','p=1','p>1','All p'],ans:2,fb:'‚ąę‚āĀ^‚ąě x‚ĀĽŠĶĖ dx = [x^(1‚ąíp)/(1‚ąíp)]‚āĀ^‚ąě. This converges only when 1‚ąíp<0, i.e., p>1.'},
    {q:'‚ąę‚āč‚ąě^0 eň£ dx = ?',opts:['1','‚ąí1','‚ąě','0'],ans:0,fb:'lim_{a‚Üí‚ąí‚ąě}[eň£]‚āź‚Āį=e‚Āį‚ąílim e^a=1‚ąí0=1.'},

L('6-06',{
  tagline:"A sequence is an ordered list of numbers generated by a formula. Understanding convergence of sequences is the foundation for understanding infinite series.",
  concept:`<div class="big-idea">A sequence {a‚āô} converges if lim_{n‚Üí‚ąě} a‚āô = L (a finite number). Otherwise it diverges.</div>
<strong>Convergence tests for sequences:</strong>

<br>‚ÄĘ Squeeze theorem: if a‚āô‚Č§b‚āô‚Č§c‚āô and a‚āô,c‚āô‚ÜíL, then b‚āô‚ÜíL.
<br>‚ÄĘ If f(x)‚ÜíL as x‚Üí‚ąě and a‚āô=f(n), then a‚āô‚ÜíL.
<br><br><strong>Common limits:</strong>

<br>‚ÄĘ (1+1/n)‚ĀŅ ‚Üí e

<div class="analogy">ūüí° Think of a sequence as the list of your bank balance at the end of each year. If it approaches a stable amount, it converges. If it grows without bound or oscillates, it diverges.</div>`,

  examples:[

    {label:'Example 2',q:'a‚āô = (‚ąí1)‚ĀŅ. Converge?',steps:[
      {t:'Terms: ‚ąí1, 1, ‚ąí1, 1, ...',d:'Oscillates, never settles'},

  tryit:{q:'a‚āô = 5/n¬≤. Does it converge?',opts:['Yes, to 5','Yes, to 0','No, diverges','Yes, to ‚ąě'],ans:1,hint:'What happens to 1/n¬≤ as n‚Üí‚ąě?',feedback:'5/n¬≤‚Üí5¬∑(0)=0. Converges to 0.'},

    {q:'a‚āô=sin(n)/n. Converge?',opts:['No ‚ÄĒ sin oscillates','Yes to 0 (squeeze theorem)','Yes to 1','Diverges to ‚ąě'],ans:1,fb:'|sin(n)|‚Č§1, so |sin(n)/n|‚Č§1/n‚Üí0. By squeeze, a‚āô‚Üí0.'},
    {q:'(1+1/n)‚ĀŅ as n‚Üí‚ąě approaches:',opts:['1','2','e','‚ąě'],ans:2,fb:'This is the definition of e‚Čą2.718. Classic limit.'},

L('6-08',{
  tagline:"Power series let you represent functions as infinite polynomials. This is how calculators compute sin, cos, and eň£ to arbitrary precision.",
  concept:`<div class="big-idea">A power series is ‚ąĎ c‚āô(x‚ąía)‚ĀŅ. It represents a function within its radius of convergence R.</div>
<strong>Radius of convergence:</strong> use the Ratio Test:
<br>R = lim_{n‚Üí‚ąě} |c‚āô/c‚āô‚āä‚āĀ|
<br>The series converges for |x‚ąía| < R, diverges for |x‚ąía| > R.
<br>At |x‚ąía| = R, test endpoints separately.
<br><br><strong>Key geometric series:</strong>
<br>1/(1‚ąíx) = ‚ąĎ x‚ĀŅ for |x|<1
<br><br><strong>Differentiation and integration of power series:</strong>
<br>Differentiate/integrate term by term within the radius of convergence.
<div class="analogy">ūüí° A power series is an infinite polynomial. A calculator computing cos(0.1) doesn\'t use a circle ‚ÄĒ it uses the first few terms of the power series 1 ‚ąí x¬≤/2! + x‚Āī/4! ‚ąí ... until the answer is accurate enough.</div>`,
  formula:{display:'‚ąĎc‚āôx‚ĀŅ converges for |x|<R where R=lim|c‚āô/c‚āô‚āä‚āĀ|',caption:'Ratio test gives radius. Check endpoints separately.'},
  examples:[

      {t:'As n‚Üí‚ąě: |x|¬∑1 = |x|',d:''},
      {t:'Converges when |x|<1, so R=1',d:'<span class="math answer">R=1</span>'},

  tryit:{q:'‚ąĎ(x/3)‚ĀŅ. Radius of convergence?',opts:['R=1','R=3','R=1/3','R=9'],ans:1,hint:'Ratio test: |x/3|<1 means |x|<3.',feedback:'|(x/3)^(n+1)/(x/3)^n|=|x/3|‚Üí|x/3|. Converges when |x/3|<1 ‚Üí |x|<3. R=3.'},
  mistakes:[
    {wrong:'Confusing radius R with the interval (‚ąíR,R)',right:'R=3 means the interval of convergence is (‚ąí3,3) ‚ÄĒ you still need to check endpoints ¬Ī3 separately.'},
    {wrong:'Differentiating a power series changes its radius',right:'Differentiation doesn\'t change R (though it can affect endpoint behavior).'},

  check:[

    {q:'If ‚ąĎc‚āôx‚ĀŅ has R=5, the series definitely converges at:',opts:['x=5','x=‚ąí5','x=3','x=6'],ans:2,fb:'|3|<5, so x=3 is within the radius. x=¬Ī5 are on the boundary ‚ÄĒ need separate check. x=6 is outside.'},

L('6-09',{
  tagline:"Taylor and Maclaurin series let you approximate ANY differentiable function as an infinite polynomial. This is foundational for numerical methods and physics.",
  concept:`<div class="big-idea">Taylor series of f(x) centered at a: f(x) = ‚ąĎ f‚ĀĹ‚ĀŅ‚Āĺ(a)/n! ¬∑ (x‚ąía)‚ĀŅ</div>
Maclaurin series: centered at a=0. f(x) = ‚ąĎ f‚ĀĹ‚ĀŅ‚Āĺ(0)/n! ¬∑ x‚ĀŅ
<br><br><strong>Key Maclaurin series (memorize these):</strong>
<br>‚ÄĘ eň£ = 1 + x + x¬≤/2! + x¬≥/3! + ... = ‚ąĎ x‚ĀŅ/n!
<br>‚ÄĘ sin(x) = x ‚ąí x¬≥/3! + x‚ĀĶ/5! ‚ąí ... = ‚ąĎ (‚ąí1)‚ĀŅx^(2n+1)/(2n+1)!
<br>‚ÄĘ cos(x) = 1 ‚ąí x¬≤/2! + x‚Āī/4! ‚ąí ... = ‚ąĎ (‚ąí1)‚ĀŅx^(2n)/(2n)!
<br>‚ÄĘ 1/(1‚ąíx) = 1+x+x¬≤+x¬≥+... = ‚ąĎ x‚ĀŅ, |x|<1
<br><br>Error is bounded by the first omitted term (for alternating series).
<div class="analogy">ūüí° Euler\'s Identity e^(iŌÄ)+1=0 comes from Taylor series. Plug ix into eň£ series, collect real and imaginary parts ‚ÄĒ you get cos and sin. The most beautiful equation in math is just Taylor series applied cleverly.</div>`,
  formula:{display:'f(x)=‚ąĎf‚ĀĹ‚ĀŅ‚Āĺ(a)/n!¬∑(x‚ąía)‚ĀŅ | eň£=‚ąĎx‚ĀŅ/n!',caption:'The coefficient of (x‚ąía)‚ĀŅ is the nth derivative at a, divided by n!'},
  examples:[
    {label:'Example 1',q:'Write the first 4 terms of Maclaurin series for eň£',steps:[
      {t:'f(x)=eň£, all derivatives equal eň£, all equal 1 at x=0',d:''},
      {t:'Terms: f(0)/0!+f\'(0)/1!¬∑x+f\'\'(0)/2!¬∑x¬≤+...',d:'= 1+x+x¬≤/2!+x¬≥/3!'},
      {t:'',d:'<span class="math answer">eň£ ‚Čą 1+x+x¬≤/2+x¬≥/6</span>'},

function getProgress(){ try{return JSON.parse(localStorage.getItem('apexmath_lessons')||'{}')}catch(e){return{}} }
function markDone(id){ const p=getProgress(); p[id]=true; localStorage.setItem('apexmath_lessons',JSON.stringify(p)); }

// ‚ĒÄ‚ĒÄ RENDER SIDEBAR ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
let currentLessonId = null;
let allLessonBtns = [];

function buildSidebar(){
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML='';
  const progress = getProgress();
  CURRICULUM.forEach((lvl,li)=>{
    const group = document.createElement('div'); group.className='level-group';
    const header = document.createElement('button');
    header.className='level-header'+(li===0?' open':'');
    header.innerHTML=`<span>${lvl.emoji} Level ${lvl.level} ‚ÄĒ ${lvl.name}</span><span class="level-arrow">‚Ė∂</span>`;
    header.onclick=()=>{
      const isOpen=header.classList.toggle('open');
      list.style.display=isOpen?'flex':'none';
    };
    const list = document.createElement('div'); list.className='lesson-list';
    list.style.display=li===0?'flex':'none';
    lvl.lessons.forEach(lesson=>{
      const btn = document.createElement('button'); btn.className='lesson-btn';
      btn.dataset.id=lesson.id;
      const isDone=progress[lesson.id];
      if(isDone) btn.classList.add('done');
      btn.innerHTML=`<div class="lb-dot"></div>${lesson.title}`;
      btn.onclick=()=>openLesson(lesson.id);
      list.appendChild(btn);
      allLessonBtns.push(btn);
    });
    group.appendChild(header); group.appendChild(list);
    nav.appendChild(group);
  });
}

function filterLessons(query){
  const q=query.toLowerCase().trim();
  allLessonBtns.forEach(btn=>{
    const match=!q||btn.textContent.toLowerCase().includes(q);
    btn.style.display=match?'':'none';
  });
  if(q){
    document.querySelectorAll('.level-header').forEach(h=>{h.classList.add('open');h.nextElementSibling.style.display='flex';});
  }
}

// ‚ĒÄ‚ĒÄ RENDER HOME ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function renderHome(){
  currentLessonId=null;
  const progress=getProgress();
  const main=document.getElementById('main-content');
  main.innerHTML='';
  const div=document.createElement('div'); div.className='home-screen';
  const totalDone=Object.keys(progress).length;
  const totalLessons=CURRICULUM.reduce((a,lvl)=>a+lvl.lessons.length,0);
  div.innerHTML=`
    <div class="home-eyebrow">ApexMath Lessons</div>
    <h1 class="home-h1">Learn the math.<br><em>All of it.</em></h1>
    <p class="home-sub">93 lessons from Arithmetic to Calculus II. Each one has a clear explanation, worked examples, guided practice, and a quick check at the end.</p>
    ${totalDone>0?`<div style="font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem">‚úď ${totalDone}/${totalLessons} lessons completed</div>`:''}
    <div class="level-cards">${CURRICULUM.map(lvl=>{
      const done=lvl.lessons.filter(l=>progress[l.id]).length;
      const pct=Math.round(done/lvl.lessons.length*100);
      return`<div class="level-card" onclick="openFirstLesson(${lvl.level})">
        <div class="lc-emoji">${lvl.emoji}</div>
        <div class="lc-name">Level ${lvl.level}: ${lvl.name}</div>
        <div class="lc-sub">${lvl.desc}</div>
        <div class="lc-count">${lvl.lessons.length} lessons ¬∑ ${done} done</div>
        <div class="lc-prog"><div class="lc-prog-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}</div>
  `;
  main.appendChild(div);
}

function openFirstLesson(levelNum){
  const lvl=CURRICULUM[levelNum];
  if(lvl&&lvl.lessons.length) openLesson(lvl.lessons[0].id);
}

// ‚ĒÄ‚ĒÄ RENDER LESSON ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
let checkAnswers={}, tryitAnswered=false, checkScores=[], hintShown=false;

function openLesson(id){
  currentLessonId=id;
  tryitAnswered=false; checkAnswers={}; checkScores=[];
  // Update sidebar
  allLessonBtns.forEach(b=>{
    b.classList.toggle('active',b.dataset.id===id);
    if(b.dataset.id===id){
      // Open that level group
      const list=b.closest('.lesson-list');
      const header=list?.previousElementSibling;
      if(header&&!header.classList.contains('open')){
        header.classList.add('open'); list.style.display='flex';
      }
      b.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  });
  const data = LESSONS[id] || getDefaultLesson(id);
  if(!data){ renderHome(); return; }
  // Find lesson metadata
  let lessonMeta=null, levelData=null, lessonIdx=0;
  for(const lvl of CURRICULUM){
    const idx=lvl.lessons.findIndex(l=>l.id===id);
    if(idx>=0){ lessonMeta=lvl.lessons[idx]; levelData=lvl; lessonIdx=idx; break; }
  }
  const allLessons=CURRICULUM.flatMap(l=>l.lessons);
  const globalIdx=allLessons.findIndex(l=>l.id===id);
  const prevLesson=globalIdx>0?allLessons[globalIdx-1]:null;
  const nextLesson=globalIdx<allLessons.length-1?allLessons[globalIdx+1]:null;
  const progress=getProgress();
  const totalInLevel=levelData.lessons.length;
  const doneInLevel=levelData.lessons.filter(l=>progress[l.id]).length;
  const progPct=Math.round(doneInLevel/totalInLevel*100);

  const main=document.getElementById('main-content');
  main.innerHTML='';
  const inner=document.createElement('div'); inner.className='main-inner';

  inner.innerHTML=`
    <div class="lesson-nav">
      <button class="lesson-nav-btn" onclick="${prevLesson?`openLesson('${prevLesson.id}')`:'renderHome()'}" ${!prevLesson?'disabled':''}>
        ‚Üź ${prevLesson?prevLesson.title.split(' ').slice(0,3).join(' ')+'‚Ä¶':'Home'}
      </button>
      <div class="lesson-crumb">Level ${levelData.level} ¬∑ ${lessonIdx+1} / ${totalInLevel}</div>
      <button class="lesson-nav-btn" onclick="${nextLesson?`openLesson('${nextLesson.id}')`:'renderHome()'}" ${!nextLesson?'disabled':''}>
        ${nextLesson?nextLesson.title.split(' ').slice(0,3).join(' ')+'‚Ä¶':'Home'} ‚Üí
      </button>
    </div>
    <div class="lesson-progress"><div class="lesson-progress-fill" style="width:${progPct}%"></div></div>
    <div class="lesson-eyebrow">${levelData.emoji} Level ${levelData.level} ‚ÄĒ ${levelData.name}</div>
    <h1 class="lesson-title">${lessonMeta.title}</h1>
    <p class="lesson-tagline">${data.tagline}</p>
    <span class="info-tag time">‚ŹĪ ~10 min</span>
    <span class="info-tag">ūüďĖ Read first, then practice</span>

    <!-- CONCEPT -->
    <div class="block">
      <div class="block-label"><span class="block-label-icon">ūüí°</span> The Concept</div>
      <div class="concept-box">${data.concept}</div>
    </div>

    ${data.formula?`<div class="block">
      <div class="block-label"><span class="block-label-icon">ūüďĆ</span> Key Formula</div>
      <div class="formula-box"><div class="formula-display">${data.formula.display}</div><div class="formula-caption">${data.formula.caption}</div></div>
    </div>`:''}

    <!-- EXAMPLES -->
    <div class="block">
      <div class="block-label"><span class="block-label-icon">ūüĒć</span> Worked Examples</div>
      ${data.examples.map((ex,ei)=>`
        <div class="example-card">
          <div class="example-header">
            <span class="example-label">${ex.label}</span>
            <span class="example-q">${ex.q}</span>
          </div>
          <div class="example-body">
            <div class="step-list">${ex.steps.map((s,si)=>`
              <div class="step">
                <div class="step-num">${si+1}</div>
                <div class="step-content"><strong>${s.t}</strong>${s.d?'<br>'+s.d:''}</div>
              </div>
            `).join('')}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- COMMON MISTAKES -->
    ${data.mistakes&&data.mistakes.length?`<div class="block">
      <div class="block-label"><span class="block-label-icon">‚ö†ÔłŹ</span> Common Mistakes</div>
      <div class="mistake-box">${data.mistakes.map(m=>`
        <div class="mistake-item"><span class="mistake-x">‚úó</span><span class="mistake-text"><strong>Wrong:</strong> ${m.wrong}<br><strong>Right:</strong> ${m.right}</span></div>
      `).join('')}</div>
    </div>`:''}

    <!-- TRY IT -->
    <div class="block">
      <div class="block-label"><span class="block-label-icon">‚úŹÔłŹ</span> Try It Yourself</div>
      <div class="tryit-card" id="tryit-card">
        <div class="tryit-q">${data.tryit.q}</div>
        ${data.tryit.hint?`<button class="tryit-hint-btn" id="tryit-hint-btn" onclick="showTryitHint()">ūüí° Need a hint?</button>
        <div class="tryit-hint" id="tryit-hint">${data.tryit.hint}</div>`:''}
        <div class="tryit-opts" id="tryit-opts">
          ${data.tryit.opts.map((opt,oi)=>`
            <button class="tryit-opt" onclick="handleTryit(${oi},${data.tryit.ans})">
              <span class="tryit-letter">${['A','B','C','D'][oi]}</span>${opt}
            </button>
          `).join('')}
        </div>
        <div class="tryit-feedback" id="tryit-fb"></div>
      </div>
    </div>

    <!-- QUICK CHECK -->
    <div class="block">
      <div class="block-label"><span class="block-label-icon">‚úÖ</span> Quick Check ‚ÄĒ 3 Questions</div>
      <div class="check-section">
        <div class="check-header">Answer all 3 before seeing your score.</div>
        <div class="check-body" id="check-body">
          ${data.check.map((q,qi)=>`
            <div class="check-item" data-idx="${qi}">
              <div class="check-q">${qi+1}. ${q.q}</div>
              <div class="check-opts" id="check-opts-${qi}">
                ${q.opts.map((opt,oi)=>`
                  <div class="check-opt" onclick="handleCheck(${qi},${oi},${q.ans},'${encodeURIComponent(q.fb)}')">
                    <span class="tryit-letter">${['A','B','C','D'][oi]}</span>${opt}
                  </div>
                `).join('')}
              </div>
              <div class="check-fb" id="check-fb-${qi}"></div>
            </div>
          `).join('')}
        </div>
        <div class="check-score" id="check-score"></div>
      </div>
    </div>

    <!-- DONE -->
    <div class="lesson-done" id="lesson-done">
      <div class="lesson-done-icon">ūüéČ</div>
      <div class="lesson-done-title">Lesson Complete!</div>
      <div class="lesson-done-sub" id="lesson-done-sub">You've finished this lesson. The next one is waiting.</div>
      ${nextLesson?`<button class="next-lesson-btn" onclick="openLesson('${nextLesson.id}')">Next: ${nextLesson.title} ‚Üí</button>`:'<button class="next-lesson-btn" onclick="renderHome()">‚Üź Back to All Lessons</button>'}
    </div>
  `;
  main.appendChild(inner);
  main.scrollTo(0,0);
  window.scrollTo(0,0);
}

function showTryitHint(){
  document.getElementById('tryit-hint')?.classList.add('show');
  document.getElementById('tryit-hint-btn')?.style.setProperty('display','none');
}

function handleTryit(chosen, correct){
  if(tryitAnswered) return;
  tryitAnswered=true;
  const opts=document.querySelectorAll('.tryit-opt');
  opts.forEach((o,i)=>{
    o.classList.add('disabled');
    if(i===correct) o.classList.add('correct');
    if(i===chosen&&chosen!==correct) o.classList.add('wrong');
  });
  const fb=document.getElementById('tryit-fb');
  const data=LESSONS[currentLessonId]||getDefaultLesson(currentLessonId);
  fb.className='tryit-feedback '+(chosen===correct?'right':'wrong');
  fb.innerHTML=chosen===correct?`<strong>‚úď Correct!</strong> ${data.tryit.feedback}`:`<strong>‚úó Not quite.</strong> ${data.tryit.feedback}`;
  const card=document.getElementById('tryit-card');
  if(card) card.className='tryit-card '+(chosen===correct?'answered-right':'answered-wrong');
}

let checkAnswered={};
function handleCheck(qi, chosen, correct, fbEncoded){
  if(checkAnswered[qi]) return;
  checkAnswered[qi]={chosen,correct};
  const opts=document.querySelectorAll(`#check-opts-${qi} .check-opt`);
  opts.forEach((o,i)=>{
    o.classList.add('disabled');
    if(i===correct) o.classList.add('correct');
    if(i===chosen&&chosen!==correct) o.classList.add('wrong');
  });
  const fb=document.getElementById(`check-fb-${qi}`);
  const isRight=chosen===correct;
  fb.className='check-fb show '+(isRight?'right':'wrong');
  fb.textContent=decodeURIComponent(fbEncoded);
  // Check if all answered
  const data=LESSONS[currentLessonId]||getDefaultLesson(currentLessonId);
  if(Object.keys(checkAnswered).length===data.check.length) showCheckScore(data);
}

function showCheckScore(data){
  const score=Object.values(checkAnswered).filter(a=>a.chosen===a.correct).length;
  const total=data.check.length;
  const scoreEl=document.getElementById('check-score');
  const msgs=['Keep at it ‚ÄĒ review the examples above and try again!','Getting there! Re-read the concept section.','Solid! You\'ve got the core idea.'];
  const msg=score===total?'Perfect! You nailed it. ūüéČ':msgs[Math.min(score,2)];
  scoreEl.innerHTML=`<div class="check-score-num">${score}/${total}</div><div class="check-score-label">Quick Check Score</div><div class="check-score-msg">${msg}</div>`;
  scoreEl.classList.add('show');
  if(score===total||(score/total>=0.67)){
    markDone(currentLessonId);
    document.getElementById('lesson-done')?.classList.add('show');
    buildSidebar();
  }
}

// ‚ĒÄ‚ĒÄ INIT ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
buildSidebar();
renderHome();
// Check URL hash for direct lesson
const hash=window.location.hash.slice(1);
if(hash&&CURRICULUM.some(l=>l.lessons.some(ll=>ll.id===hash))) openLesson(hash);
</script>
